<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0, viewport-fit=cover">
  <title>轉生龍蛋 · 終極版</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background: #0a0610; font-family: 'Noto Serif TC', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-image: radial-gradient(circle at 30% 30%, #2a1a35 0%, #03010a 90%); padding:8px; touch-action: manipulation; }
    #game-container { width:100%; max-width:960px; background: rgba(12,6,20,0.9); backdrop-filter: blur(10px); border:2px solid #7a5e8a; border-radius:32px; box-shadow:0 20px 50px rgba(100,60,160,0.4); display:flex; flex-direction:column; overflow:hidden; height:95vh; max-height:900px; }
    .top-ornament { height:4px; background:linear-gradient(90deg,transparent,#d9b3ff,#ffddaa,#d9b3ff,transparent); }
    #header { padding:8px 16px; text-align:center; border-bottom:1px solid #5a4670; background: rgba(15,8,22,0.9); }
    #header h1 { font-size:1.4rem; color:#ffe8b0; text-shadow:0 0 20px #b080e0; }
    .subtitle { font-size:0.65rem; color:#c0a0d0; }
    #status-bar { display:flex; justify-content:space-around; padding:8px 15px; background:rgba(0,0,0,0.7); border-bottom:1px solid #4a3a55; font-size:0.8rem; color:#e0d0f0; }
    #main-area { flex:1; display:flex; flex-direction:column; overflow:hidden; }
    #game-view { flex:1; overflow-y:auto; padding:12px; -webkit-overflow-scrolling:touch; }
    .panel { background:rgba(10,4,16,0.85); backdrop-filter:blur(8px); border:1px solid #7a5e8a; border-radius:20px; padding:14px; color:#f4e8ff; margin-bottom:10px; }
    .map-grid { display:grid; grid-template-columns:repeat(10,1fr); gap:2px; margin:10px 0; background:#110a18; border-radius:12px; padding:4px; }
    .map-cell { aspect-ratio:1; background:#1b1228; border:1px solid #3a2a48; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:0.9rem; color:#ccc; cursor:pointer; transition:0.2s; }
    .player-cell { background:#6b5078; border-color:#f8d080; box-shadow:0 0 20px #ffbb40; animation:playerGlow 1.5s infinite alternate; }
    @keyframes playerGlow { 0%{box-shadow:0 0 10px #ffbb40;} 100%{box-shadow:0 0 30px #ffdd70,0 0 60px #ffaa2060;} }
    .boss-cell { background:#4a1530; border-color:#ff6060; box-shadow:0 0 25px #ff4040; animation:bossPulse 1.2s infinite; }
    @keyframes bossPulse { 0%{box-shadow:0 0 15px #ff4040;} 50%{box-shadow:0 0 35px #ff8080;} 100%{box-shadow:0 0 15px #ff4040;} }
    .boss-disabled { background:#2a1a28; border-color:#555; }
    .chest-cell { background:#3a3018; border-color:#ffd700; }
    .merchant-cell { background:#1e3a2a; border-color:#80e0a0; }
    .portal-cell { background:#1e1e3a; border-color:#8080ff; }
    #control-area { padding:8px; background:rgba(0,0,0,0.8); border-top:1px solid #5a4070; display:flex; justify-content:center; }
    .direction-pad { display:flex; flex-direction:column; align-items:center; gap:5px; }
    .dir-row { display:flex; gap:30px; }
    .dir-btn { background:radial-gradient(circle at 30% 30%, #5a3e72, #2a1a3a); border:2px solid #a080c0; color:#ffe0c0; font-size:2rem; width:60px; height:60px; border-radius:18px; display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 5px 12px rgba(0,0,0,0.6); }
    .dir-btn:active { transform:scale(0.9); background:#7a5ea0; }
    .btn { background:linear-gradient(180deg,#3e2850,#21152e); border:1px solid #8a6a9a; color:#f0e0ff; padding:8px 18px; border-radius:25px; font-weight:600; font-size:0.8rem; cursor:pointer; box-shadow:0 4px 10px rgba(0,0,0,0.5); }
    .btn.primary { background:#5e3e62; border-color:#d8b0c0; }
    .btn.small { padding:5px 12px; font-size:0.7rem; }
    .btn:disabled { opacity:0.4; pointer-events:none; }
    .god-voice { background:#1e1028; border-left:5px solid #e6b422; padding:8px 12px; border-radius:12px; color:#ffe8a0; font-style:italic; margin:8px 0; }
    .race-card, .evolution-card { background:rgba(30,18,48,0.9); border:2px solid #553b60; border-radius:20px; padding:16px; text-align:center; cursor:pointer; width:140px; }
    .flex-row { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
    .shop-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:10px; margin:10px 0; }
    .shop-card { background:#1e1230; border:1px solid #4a3a60; border-radius:14px; padding:12px; text-align:center; }
    .hp-bar { width:100%; height:18px; background:#2a1028; border-radius:10px; overflow:hidden; border:1px solid #aa5588; }
    .hp-fill { height:100%; background:linear-gradient(90deg,#ff4466,#ff8866); border-radius:10px; transition:width 0.4s; }
    .shake { animation:shake 0.4s ease; }
    @keyframes shake { 0%,100%{transform:translateX(0);} 20%{transform:translateX(-10px);} 40%{transform:translateX(10px);} 60%{transform:translateX(-6px);} 80%{transform:translateX(6px);} }
    .pop-damage { animation:pop 0.7s ease-out; position:absolute; color:#ff4d4d; font-weight:bold; font-size:1.4rem; pointer-events:none; z-index:10; top:5px; right:10px; }
    @keyframes pop { 0%{opacity:1;transform:translateY(0);} 100%{opacity:0;transform:translateY(-35px);} }
    .death-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(200,0,0,0.5); z-index:99; animation:deathFlash 1.2s ease-out forwards; pointer-events:none; }
    @keyframes deathFlash { 0%{opacity:0.9;} 100%{opacity:0;} }
    @media (max-width:600px) { .dir-btn { width:48px; height:48px; font-size:1.5rem; } }
  </style>
</head>
<body>
<div id="game-container">
  <div class="top-ornament"></div>
  <div id="header"><h1>🐉 轉生龍蛋 · 終極版</h1><div class="subtitle">森林 · 礦洞 · 城堡 · 龍巢 · 海域 · 天堂</div></div>
  <div id="status-bar"></div>
  <div id="main-area"><div id="game-view"></div><div id="control-area"></div></div>
</div>
<script>
(function(){
const ELEMENTS = {fire:'火',water:'水',wind:'風',earth:'地',light:'光',dark:'闇',none:'無'};
const ELEMENT_WEAKNESS = {fire:'wind', wind:'earth', earth:'water', water:'fire', light:'dark', dark:'light'};
const LOOT_RARITY = {common:'普通',uncommon:'罕見',rare:'稀有',epic:'史詩',legendary:'傳說'};
const RACES = {
  human:{name:'人族',icon:'🧑',desc:'均衡·金幣+30%',baseHP:90,baseMP:40,atk:16,def:12,matk:12,mdef:11,spd:11,element:'none',passive:'gold'},
  demon:{name:'魔族',icon:'👿',desc:'高攻·傷害+20%',baseHP:78,baseMP:46,atk:20,def:9,matk:15,mdef:9,spd:14,element:'dark',passive:'dmg'},
  god:{name:'神族',icon:'👼',desc:'魔精·藥水強化',baseHP:100,baseMP:55,atk:11,def:15,matk:16,mdef:16,spd:9,element:'light',passive:'potion'},
  dragon:{name:'龍族',icon:'🐉',desc:'體魄·血魔+35%',baseHP:75,baseMP:30,atk:13,def:14,matk:10,mdef:12,spd:7,element:'none',passive:'bulk'}
};
const EVOLUTION_TREE = { /* 完整進化樹保持不變，省略顯示以節省空間，實際代碼中已包含全部 */ };
// 在完整代碼中，此處包含與先前回答相同的 EVOLUTION_TREE 物件
const SKILLS = { /* 完整技能列表保持不變 */ };
const ZONES = {
  forest:{name:'幽暗森林',icon:'🌲',terrains:['🌳','🌲','🌿','🍄']},
  cave:{name:'廢棄礦洞',icon:'🕳️',terrains:['🪨','⛰️','🕳️','💎']},
  castle:{name:'亡靈城堡',icon:'🏰',terrains:['🏰','💀','🌑','🕯️']},
  dragon_lair:{name:'龍之巢穴',icon:'🌋',terrains:['🌋','🔥','🐉','🌑']},
  sea:{name:'深邃海域',icon:'🌊',terrains:['🌊','🐚','🦀','🐠']},
  heaven:{name:'天空聖殿',icon:'☁️',terrains:['☁️','✨','🌟','🕊️']}
};
const LOOT_ITEMS = { /* 完整掉落物列表保持不變 */ };
const MONSTERS = { /* 完整怪物列表保持不變 */ };
const BOSSES = { /* 完整Boss列表保持不變 */ };
const EQUIPMENT_POOL = { /* 完整裝備池保持不變 */ };
const ZONE_MERCHANT_GRADES = {forest:['D','C'],cave:['D','C','B'],castle:['C','B','A'],dragon_lair:['B','A','S'],sea:['A','S'],heaven:['S','SS']};
const CRAFT_RECIPES = {D:{needs:{common:3},cost:50},C:{needs:{common:5,uncommon:2},cost:120},B:{needs:{uncommon:4,rare:2},cost:250},A:{needs:{rare:5,epic:1},cost:400},S:{needs:{epic:3,legendary:1},cost:600},SS:{needs:{legendary:3},cost:1000}};
const START_ZONE = 'forest', START_POS = {x:0,y:0}, BOSS_POS = {x:5,y:5};

// 經驗值系統常數
const EXP_PER_KILL = 25;
const EXP_PER_BOSS = 120;
const EXP_TO_LEVEL = (lv) => 50 + lv * 25;

const state = {
  race:null, player:null, enemy:null, voice:"", battle:false, dead:false,
  scene:'tutorial', zone:START_ZONE, pos:{...START_POS}, maps:{}, inv:[],
  buffs:{atk:0,spd:0,def:0,shield:0,weakDebuff:false},
  bossDefeated: new Set(), bossCooldown:0,
  equipment:{weapon:null,armor:null,accessory:null}, equipInv:[],
  escapeCounter:0, altarReturn:null, merchantBuyCount:0
};

function initPlayer(raceKey) {
  const race = RACES[raceKey];
  state.race = raceKey;
  const startForm = Object.keys(EVOLUTION_TREE[raceKey])[0];
  state.player = {
    form: startForm, lv:1, exp:0, gold:150,
    hp:race.baseHP, maxHp:race.baseHP, mp:race.baseMP, maxMp:race.baseMP,
    atk:race.atk, def:race.def, matk:race.matk, mdef:race.mdef, spd:race.spd,
    potions:{hp:3,mp:2,speed:1,atk:1,weak:1}
  };
  if(raceKey==='dragon'){
    state.player.maxHp = Math.floor(state.player.maxHp*1.35);
    state.player.maxMp = Math.floor(state.player.maxMp*1.35);
  }
  applyForm();
  state.player.hp = state.player.maxHp;
  state.player.mp = state.player.maxMp;
}

function applyForm(){
  const f = EVOLUTION_TREE[state.race][state.player.form];
  if(!f) return;
  Object.assign(state.player, {
    maxHp:f.hp, maxMp:f.mp, atk:f.atk, def:f.def, matk:f.matk, mdef:f.mdef, spd:f.spd
  });
}

function stats(){
  const p=state.player, eq={atk:0,def:0,spd:0,matk:0,mdef:0,hp:0,mp:0};
  Object.values(state.equipment).forEach(e=>{
    if(!e) return;
    if(e.atk) eq.atk+=e.atk; if(e.def) eq.def+=e.def; if(e.spd) eq.spd+=e.spd;
    if(e.matk) eq.matk+=e.matk; if(e.mdef) eq.mdef+=e.mdef;
    if(e.hp) eq.hp+=e.hp; if(e.mp) eq.mp+=e.mp;
    if(e.all){ eq.atk+=e.all; eq.def+=e.all; eq.spd+=e.all; eq.matk+=e.all; eq.mdef+=e.all; }
  });
  return {
    atk:p.atk+state.buffs.atk+eq.atk, def:p.def+state.buffs.def+eq.def,
    spd:p.spd+state.buffs.spd+eq.spd, matk:p.matk+eq.matk, mdef:p.mdef+eq.mdef,
    maxHp:p.maxHp+eq.hp, maxMp:p.maxMp+eq.mp
  };
}

function genMaps(){
  for(let z of Object.keys(ZONES)){
    state.maps[z] = {
      grid:Array(10).fill().map(()=>Array(10).fill().map(()=>ZONES[z].terrains[Math.floor(Math.random()*4)])),
      special:{}
    };
    for(let i=0;i<3;i++){
      let sx,sy;
      do{ sx=Math.floor(Math.random()*10); sy=Math.floor(Math.random()*10); }
      while((sx===BOSS_POS.x&&sy===BOSS_POS.y)||(sx===START_POS.x&&sy===START_POS.y));
      state.maps[z].special[`${sx},${sy}`] = ['chest','merchant','portal'][Math.floor(Math.random()*3)];
    }
  }
}

function move(dx,dy){
  if(state.battle||state.dead||state.scene!=='map') return;
  let nx=state.pos.x+dx, ny=state.pos.y+dy;
  if(nx<0||nx>=10||ny<0||ny>=10){
    const adj = {forest:{south:'cave'},cave:{north:'forest',south:'castle'},castle:{north:'cave',south:'dragon_lair'},dragon_lair:{north:'castle',south:'sea'},sea:{north:'dragon_lair',south:'heaven'},heaven:{north:'sea'}};
    const next = adj[state.zone]?.[dx<0?'west':dx>0?'east':dy<0?'north':dy>0?'south':null];
    if(next){ state.zone=next; state.pos={x:dx<0?9:dx>0?0:nx, y:dy<0?9:dy>0?0:ny}; }
    else return;
  } else { state.pos.x=nx; state.pos.y=ny; }
  if(state.bossCooldown>0) state.bossCooldown--;
  const key=`${state.pos.x},${state.pos.y}`;
  if(state.pos.x===BOSS_POS.x&&state.pos.y===BOSS_POS.y){
    if(!state.bossDefeated.has(state.zone)||state.bossCooldown<=0) startBoss(); else renderMap();
  } else if(state.maps[state.zone].special[key]) handleSpecial(state.maps[state.zone].special[key]);
  else if(Math.random()<0.28) startBattle();
  else if(Math.random()<0.18) triggerEvent();
  else renderMap();
}

function handleSpecial(type){
  if(type==='chest'){
    state.player.gold+=Math.floor(Math.random()*60)+40; addEquip('weapon','D');
    setVoice('📦 打開寶箱！'); delete state.maps[state.zone].special[`${state.pos.x},${state.pos.y}`];
  } else if(type==='merchant'){
    state.merchantBuyCount=0; state.scene='merchantShop'; renderMerchantShop(); return;
  } else if(type==='portal'){
    state.altarReturn={zone:state.zone,x:state.pos.x,y:state.pos.y}; state.scene='altar'; renderAltar(); return;
  }
  renderMap();
}

function startBattle(){
  const pool=MONSTERS[state.zone]||MONSTERS.forest;
  const m=pool[Math.floor(Math.random()*pool.length)];
  state.enemy={...m,maxHp:m.hp}; state.battle=true; state.dead=false; state.scene='battle';
  state.buffs={atk:0,spd:0,def:0,shield:0,weakDebuff:false}; state.escapeCounter=0;
  setVoice(`⚔️ ${m.name} 出現了！`); renderBattle();
}
function startBoss(){
  const boss=BOSSES[state.zone];
  state.enemy={...boss,maxHp:boss.hp,isBoss:true}; state.battle=true; state.dead=false; state.scene='battle';
  state.buffs={atk:0,spd:0,def:0,shield:0,weakDebuff:false}; state.escapeCounter=0;
  setVoice(`👑 Boss ${boss.name}！`); renderBattle();
}

function dmgCalc(atk,def,power=1,atkEl,defEl,isP=false){
  let base=Math.max(1,Math.floor(atk*power)-def);
  if(atkEl&&defEl&&atkEl!=='none'&&defEl!=='none'){
    if(ELEMENT_WEAKNESS[atkEl]===defEl) base=Math.floor(base*1.3);
    else if(ELEMENT_WEAKNESS[defEl]===atkEl) base=Math.floor(base*0.7);
  }
  let res=Math.max(1,base+Math.floor(Math.random()*8));
  if(isP&&state.race==='demon') res=Math.floor(res*1.20);
  if(!isP&&state.buffs.weakDebuff) res=Math.floor(res*1.2);
  return res;
}

function showDamage(el,dmg,col='#ff4d4d'){
  if(!el) return; const d=document.createElement('div'); d.className='pop-damage'; d.textContent=dmg; d.style.color=col;
  el.style.position='relative'; el.appendChild(d); setTimeout(()=>d.remove(),700);
}
function shakeEl(id){ const el=document.getElementById(id); if(el){ el.classList.add('shake'); setTimeout(()=>el.classList.remove('shake'),400); } }

function playerAtk(){
  if(state.dead||!state.battle) return;
  const f=EVOLUTION_TREE[state.race][state.player.form];
  const dmg=dmgCalc(stats().atk,state.enemy.def,1,f.element,state.enemy.el,true);
  state.enemy.hp-=dmg; setVoice(`造成 ${dmg} 傷害`); shakeEl('enemy-card'); showDamage(document.getElementById('enemy-card'),dmg);
  checkEnd();
}
function playerSkill(id){
  if(state.dead||!state.battle) return; const sk=SKILLS[id];
  if(!sk||state.player.mp<sk.mp) return;
  if((sk.attr==='heal'||sk.heal)&&state.race!=='god'){ setVoice('只有神族可使用治癒！'); return; }
  state.player.mp-=sk.mp;
  if(sk.attr==='heal'||sk.heal){
    const heal=sk.heal||18; state.player.hp=Math.min(state.player.maxHp,state.player.hp+heal);
    setVoice(`❤️ 回復${heal}HP`); showDamage(document.getElementById('player-card'),heal,'#4dff4d');
  } else if(sk.attr==='buff') setVoice('🛡️ 增益');
  else {
    const f=EVOLUTION_TREE[state.race][state.player.form];
    const dmg=dmgCalc(stats().atk,state.enemy.def,sk.power||1,sk.element||f.element,state.enemy.el,true);
    state.enemy.hp-=dmg; setVoice(`✨ ${sk.name}！ ${dmg} 傷害`); shakeEl('enemy-card'); showDamage(document.getElementById('enemy-card'),dmg);
  }
  checkEnd();
}
function playerDodge(){
  if(state.dead||!state.battle||state.player.mp<3) return;
  state.player.mp-=3;
  if(Math.random()<0.8){ setVoice('💨 閃避成功！'); state.escapeCounter++; if(state.escapeCounter>=3) setVoice('已可逃跑'); }
  else setVoice('閃避失敗…');
  checkEnd();
}
function tryRun(){
  if(state.dead||!state.battle) return;
  if(state.escapeCounter<3){ setVoice(`需累積閃避3次 (${state.escapeCounter}/3)`); return; }
  setVoice('🏃 逃跑成功！'); state.battle=false; state.enemy=null; state.scene='map'; renderMap();
}
function usePotion(type){
  const p=state.player, bonus=state.race==='god'?1.5:1;
  if(type==='hp'){ p.hp=Math.min(p.maxHp,p.hp+Math.floor(30*bonus)); p.potions.hp--; }
  else if(type==='mp'){ p.mp=Math.min(p.maxMp,p.mp+Math.floor(18*bonus)); p.potions.mp--; }
  else if(type==='speed'){ state.buffs.spd+=Math.floor(14*bonus); p.potions.speed--; }
  else if(type==='atk'){ state.buffs.atk+=Math.floor(14*bonus); p.potions.atk--; }
  else if(type==='weak'&&state.enemy){ state.buffs.weakDebuff=true; p.potions.weak--; setVoice('敵人虛弱，受傷+20%'); }
  else if(type==='weak') setVoice('無敵方');
  setVoice('藥水生效'); renderBattle();
}

function enemyTurn(){
  if(!state.enemy||state.enemy.hp<=0||state.dead) return;
  const dmg=dmgCalc(state.enemy.atk,stats().def,1,state.enemy.el,EVOLUTION_TREE[state.race][state.player.form].element);
  state.player.hp-=dmg; setVoice(`${state.enemy.name} 造成 ${dmg} 傷害`); shakeEl('player-card'); showDamage(document.getElementById('player-card'),dmg);
  if(state.player.hp<=0){ playerDeath(); return; }
  renderBattle();
}
function playerDeath(){
  state.player.hp=0; state.dead=true; state.battle=false; setVoice('被擊倒…返回起點');
  const overlay=document.createElement('div'); overlay.className='death-overlay'; document.body.appendChild(overlay); setTimeout(()=>overlay.remove(),1200);
  setTimeout(()=>{
    if(state.race!=='human'){ state.player.potions={hp:3,mp:2,speed:1,atk:1,weak:1}; state.equipment={weapon:null,armor:null,accessory:null}; state.equipInv=[]; }
    state.player.hp=state.player.maxHp; state.player.mp=state.player.maxMp; state.dead=false; state.zone=START_ZONE; state.pos={...START_POS}; state.scene='map'; renderMap();
  },1500);
  renderBattle();
}

function addEquip(type,grade){
  const pool=EQUIPMENT_POOL[type].filter(e=>e.grade===grade);
  if(pool.length){ const eq={...pool[Math.floor(Math.random()*pool.length)],type}; state.equipInv.push(eq); setVoice(`獲得${eq.name}`); }
}
function addToInv(id){
  const ex=state.inv.find(i=>i.id===id); if(ex) ex.qty++; else state.inv.push({id,name:LOOT_ITEMS[id].name,qty:1});
}
function dropLootFromPool(pool){
  if(!pool||!pool.length) return;
  for(let entry of pool){ if(Math.random()<entry.chance){ addToInv(entry.id); setVoice(`獲得 ${LOOT_ITEMS[entry.id].name} [${LOOT_RARITY[LOOT_ITEMS[entry.id].rarity]}]`); break; } }
}

function gainExp(amount){
  state.player.exp += amount;
  const needed = EXP_TO_LEVEL(state.player.lv);
  if(state.player.exp >= needed){
    state.player.exp -= needed;
    state.player.lv++;
    state.player.maxHp += 16; state.player.maxMp += 8; state.player.atk += 4; state.player.def += 3;
    state.player.hp = state.player.maxHp; state.player.mp = state.player.maxMp;
    setVoice(`🎉 升級！ Lv.${state.player.lv}`);
    if(state.player.lv%5===0 && EVOLUTION_TREE[state.race][state.player.form].evolutions?.length) setVoice('可進化！');
    // 遞迴檢查是否連續升級
    gainExp(0);
  }
}

function checkEnd(){
  if(state.enemy.hp<=0){
    state.enemy.hp=0;
    let gold = Math.floor(Math.random()*(state.enemy.goldMax-state.enemy.goldMin+1))+state.enemy.goldMin;
    if(state.race==='human') gold=Math.floor(gold*1.30);
    state.player.gold+=gold;
    // 經驗值獎勵
    const expGain = state.enemy.isBoss ? EXP_PER_BOSS : EXP_PER_KILL;
    gainExp(expGain);

    if(state.enemy.isBoss){
      dropLootFromPool(state.enemy.loot);
      if(Math.random()<0.5){
        const grades = [['C','B'],['B','A'],['A','S'],['S','SS'],['S','SS'],['SS']][['forest','cave','castle','dragon_lair','sea','heaven'].indexOf(state.zone)];
        addEquip(['weapon','armor','accessory'][Math.floor(Math.random()*3)], grades[Math.floor(Math.random()*grades.length)]);
      }
      state.bossDefeated.add(state.zone); state.bossCooldown=12;
    } else {
      dropLootFromPool(state.enemy.loot);
      if(Math.random()<0.2) addEquip(['weapon','armor','accessory'][Math.floor(Math.random()*3)],'D');
    }
    state.battle=false; state.dead=false; state.scene='map';
    setTimeout(()=>renderMap(),500);
  } else enemyTurn();
}

function forceLevelUp(t){ for(let i=0;i<t;i++) gainExp(EXP_TO_LEVEL(state.player.lv)); }

function evolve(id){
  state.player.form=id; state.player.lv=1; applyForm();
  state.player.hp=state.player.maxHp; state.player.mp=state.player.maxMp;
  setVoice(`進化！${EVOLUTION_TREE[state.race][id].name}`); state.scene='map'; renderMap();
}
function setVoice(m){ state.voice=`神之聲：${m}`; }

function updateStatusBar(){
  const p=state.player, f=EVOLUTION_TREE[state.race][p.form];
  const needed = EXP_TO_LEVEL(p.lv);
  document.getElementById('status-bar').innerHTML = `<span>${RACES[state.race].icon} ${f.name} Lv.${p.lv}</span><span>❤️${p.hp}/${p.maxHp}</span><span>💧${p.mp}/${p.maxMp}</span><span>💰${p.gold}</span><span>⭐${p.exp}/${needed}</span>`;
}

function renderMap(){
  updateStatusBar();
  const f=EVOLUTION_TREE[state.race][state.player.form];
  const canEvo = state.player.lv%5===0 && f.evolutions?.length;
  const map=state.maps[state.zone];
  let grid='';
  for(let y=0;y<10;y++) for(let x=0;x<10;x++){
    const isP=x===state.pos.x&&y===state.pos.y;
    const isBoss=x===BOSS_POS.x&&y===BOSS_POS.y;
    const ba=!state.bossDefeated.has(state.zone)||state.bossCooldown<=0;
    const key=`${x},${y}`; const sp=map.special[key];
    let cls='', icon=map.grid[y][x];
    if(isP){ cls='player-cell'; icon=f.icon; }
    else if(isBoss){ cls=ba?'boss-cell':'boss-disabled'; icon=ba?'👑':'💤'; }
    else if(sp){ if(sp==='chest'){cls='chest-cell';icon='📦';} else if(sp==='merchant'){cls='merchant-cell';icon='🏪';} else if(sp==='portal'){cls='portal-cell';icon='🌀';} }
    grid+=`<div class="map-cell ${cls}" data-x="${x}" data-y="${y}">${icon}</div>`;
  }
  document.getElementById('game-view').innerHTML = `
  <div class="panel">
  <h3>${ZONES[state.zone].icon} ${ZONES[state.zone].name}</h3>
  <div class="map-grid" id="mapGrid">${grid}</div>
  <div style="display:flex;justify-content:space-between;flex-wrap:wrap;">
    <span>📊 Lv.${state.player.lv} | 進化需${Math.ceil(state.player.lv/5)*5}級</span>
    <span>⭐ 經驗 ${state.player.exp}/${EXP_TO_LEVEL(state.player.lv)}</span>
  </div>
  <div class="god-voice">${state.voice}</div>
  <div class="flex-row">
    <button class="btn small" id="statusBtn">📋狀態</button>
    <button class="btn small" id="equipBtn">🛡️裝備</button>
    <button class="btn small" id="shopBtn">🛒商店</button>
    <button class="btn small" id="craftBtn">🔨打造</button>
    ${canEvo?`<button class="btn small primary" id="evoBtn">✨進化</button>`:''}
  </div></div>`;
  bindMapEvents();
  document.getElementById('statusBtn').onclick=()=>{ state.scene='status'; renderStatus(); };
  document.getElementById('equipBtn').onclick=()=>{ state.scene='equip'; renderEquip(); };
  document.getElementById('shopBtn').onclick=()=>{ state.scene='shop'; renderShop(); };
  document.getElementById('craftBtn').onclick=()=>{ state.scene='craft'; renderCraft(); };
  if(canEvo) document.getElementById('evoBtn').onclick=()=>{ state.scene='evo'; renderEvo(); };
}

function bindMapEvents(){
  document.querySelectorAll('.map-cell').forEach(cell=>{
    cell.onclick=(e)=>{
      if(state.battle||state.dead||state.scene!=='map') return;
      const tx=parseInt(e.currentTarget.dataset.x), ty=parseInt(e.currentTarget.dataset.y);
      const dx=tx-state.pos.x, dy=ty-state.pos.y;
      if(Math.abs(dx)+Math.abs(dy)===1) move(dx,dy);
    };
  });
  const mapGrid=document.getElementById('mapGrid');
  if(!mapGrid) return;
  let startX,startY;
  mapGrid.ontouchstart=e=>{ startX=e.touches[0].clientX; startY=e.touches[0].clientY; };
  mapGrid.ontouchend=e=>{
    if(state.battle||state.dead||state.scene!=='map') return;
    const dx=e.changedTouches[0].clientX-startX, dy=e.changedTouches[0].clientY-startY;
    if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>25) move(dx>0?1:-1,0);
    else if(Math.abs(dy)>Math.abs(dx)&&Math.abs(dy)>25) move(0,dy>0?1:-1);
  };
}

function renderBattle(){
  updateStatusBar();
  const e=state.enemy, p=state.player, f=EVOLUTION_TREE[state.race][p.form];
  const skills=f.skills||[];
  let skillBtns=skills.map(sid=>{ const sk=SKILLS[sid]; if(!sk||((sk.attr==='heal'||sk.heal)&&state.race!=='god')) return ''; return `<button class="btn small" ${p.mp<sk.mp||state.dead?'disabled':''} id="sk_${sid}">${sk.name}(${sk.mp}MP)</button>`; }).join('');
  const potDisabled=Object.values(p.potions).every(v=>v===0)||state.dead;
  const hpP=Math.max(0,e.hp/e.maxHp*100);
  document.getElementById('game-view').innerHTML=`
  <div class="panel ${e.isBoss?'boss-bg':''}">
  <div id="enemy-card" style="position:relative;background:#2a1028;border-radius:12px;padding:10px;">
  <span style="font-size:2rem;">${e.icon}</span><b>${e.name}</b>
  <div class="hp-bar"><div class="hp-fill" style="width:${hpP}%;"></div></div>
  <div style="text-align:right;">${e.hp}/${e.maxHp}</div></div>
  <div id="player-card" style="margin:10px 0;position:relative;"><b>${f.icon} ${f.name}</b> Lv.${p.lv} ❤️${p.hp}/${p.maxHp} 💧${p.mp}/${p.maxMp}</div>
  <div class="flex-row">
  <button class="btn" id="atkBtn" ${state.dead?'disabled':''}>⚔️攻擊</button>${skillBtns}
  <button class="btn" id="dodgeBtn" ${state.dead||p.mp<3?'disabled':''}>💨閃避</button>
  <button class="btn" id="runBtn" ${state.dead?'disabled':''}>🏃逃跑(${state.escapeCounter}/3)</button>
  <button class="btn" id="potBtn" ${potDisabled?'disabled':''}>🧪藥水</button></div>
  <div class="god-voice">${state.voice}</div>${state.dead?'<p style="color:#ff8080;">倒下中…</p>':''}</div>`;
  document.getElementById('atkBtn').onclick=playerAtk;
  skills.forEach(sid=>{ const btn=document.getElementById(`sk_${sid}`); if(btn) btn.onclick=()=>playerSkill(sid); });
  document.getElementById('dodgeBtn').onclick=playerDodge;
  document.getElementById('runBtn').onclick=tryRun;
  document.getElementById('potBtn').onclick=showPotions;
}
function showPotions(){
  const p=state.player; let html='<div class="panel"><h3>🧪 藥水</h3>';
  const add=(l,k,q)=>{ if(q>0) html+=`<button class="btn small" id="use_${k}">${l} (${q})</button>`; };
  add('❤️生命','hp',p.potions.hp); add('💧魔力','mp',p.potions.mp); add('💨速度','speed',p.potions.speed); add('⚔️攻擊','atk',p.potions.atk); add('☠️虛弱','weak',p.potions.weak);
  html+='<button class="btn small" id="cancelPotion">取消</button></div>';
  document.getElementById('game-view').innerHTML=html;
  ['hp','mp','speed','atk','weak'].forEach(k=>{ const btn=document.getElementById(`use_${k}`); if(btn) btn.onclick=()=>{usePotion(k);renderBattle();}; });
  document.getElementById('cancelPotion').onclick=()=>renderBattle();
}
function renderStatus(){
  const p=state.player, f=EVOLUTION_TREE[state.race][p.form], s=stats();
  document.getElementById('game-view').innerHTML=`<div class="panel"><h3>📋 狀態</h3><p>${f.icon} ${f.name} Lv.${p.lv}</p><p>❤️${p.hp}/${p.maxHp} 💧${p.mp}/${p.maxMp}</p><p>⚔️攻${s.atk} 🛡️防${s.def} 💨速${s.spd}</p><p>⭐ 經驗 ${p.exp}/${EXP_TO_LEVEL(p.lv)}</p><button class="btn" id="backMap">返回</button></div>`;
  document.getElementById('backMap').onclick=()=>{ state.scene='map'; renderMap(); };
}
function renderEquip(){ /* 保持不變 */ }
function renderShop(){ /* 保持不變 */ }
function renderMerchantShop(){ /* 保持不變 */ }
function renderCraft(){ /* 保持不變 */ }
function renderAltar(){ /* 保持不變 */ }
function returnFromAltar(){ /* 保持不變 */ }
function triggerEvent(){ /* 保持不變 */ }
function renderEvo(){ /* 保持不變 */ }
function setupControls(){
  document.getElementById('control-area').innerHTML=`
  <div class="direction-pad">
  <div class="dir-row"><div class="dir-btn" id="upBtn">↑</div></div>
  <div class="dir-row">
  <div class="dir-btn" id="leftBtn">←</div>
  <div class="dir-btn" id="downBtn">↓</div>
  <div class="dir-btn" id="rightBtn">→</div>
  </div></div>`;
  document.getElementById('upBtn').onclick=()=>move(0,-1);
  document.getElementById('downBtn').onclick=()=>move(0,1);
  document.getElementById('leftBtn').onclick=()=>move(-1,0);
  document.getElementById('rightBtn').onclick=()=>move(1,0);
}
window.addEventListener('keydown',e=>{
  if(state.scene!=='map'||state.battle||state.dead) return;
  if(e.key==='ArrowLeft'||e.key==='a'){ e.preventDefault(); move(-1,0); }
  if(e.key==='ArrowRight'||e.key==='d'){ e.preventDefault(); move(1,0); }
  if(e.key==='ArrowUp'||e.key==='w'){ e.preventDefault(); move(0,-1); }
  if(e.key==='ArrowDown'||e.key==='s'){ e.preventDefault(); move(0,1); }
});

function showTutorial(){
  state.scene='tutorial';
  document.getElementById('game-view').innerHTML=`<div class="panel"><h2>📖 終極冒險</h2><p>🧭 方向鍵/滑動地圖移動</p><p>⚔️ 戰鬥獲得經驗自動升級</p><p>✨ 每5級可選擇進化</p><p>🔨 鍛造需對應稀有度材料</p><button class="btn primary" id="toRaceSelect">選擇種族</button></div>`;
  document.getElementById('toRaceSelect').onclick=showRaceSelect;
}
function showRaceSelect(){
  state.scene='raceSelect';
  document.getElementById('game-view').innerHTML=`<div class="panel"><h3>選擇種族</h3><div class="flex-row">${Object.entries(RACES).map(([k,r])=>`<div class="race-card" data-race="${k}"><span style="font-size:2.5rem;">${r.icon}</span><h4>${r.name}</h4><p>${r.desc}</p></div>`).join('')}</div></div>`;
  document.querySelectorAll('.race-card').forEach(c=>c.onclick=e=>{
    initPlayer(e.currentTarget.dataset.race); genMaps(); state.bossDefeated.clear(); state.inv=[]; state.equipInv=[]; state.equipment={weapon:null,armor:null,accessory:null};
    state.scene='map'; state.zone=START_ZONE; state.pos={...START_POS}; setupControls(); renderMap();
  });
}
showTutorial();
})();
