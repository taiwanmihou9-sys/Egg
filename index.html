function initPlayer(raceKey){
  const race=RACES[raceKey]; state.race=raceKey;
  const startForm=Object.keys(EVOLUTION_TREE[raceKey])[0];
  state.player={
    form:startForm,lv:1,exp:0,gold:120,
    hp:race.baseHP,maxHp:race.baseHP,mp:race.baseMP,maxMp:race.baseMP,
    atk:race.atk,def:race.def,matk:race.matk,mdef:race.mdef,spd:race.spd,
    potions:{hp:3,mp:2,speed:1,atk:1,weak:1}
  };
  if(raceKey==='dragon'){ state.player.maxHp=Math.floor(state.player.maxHp*1.35); state.player.maxMp=Math.floor(state.player.maxMp*1.35); }
  applyForm(); state.player.hp=state.player.maxHp; state.player.mp=state.player.maxMp;
}
function applyForm(){ const f=EVOLUTION_TREE[state.race][state.player.form]; if(!f)return; Object.assign(state.player,{maxHp:f.hp,maxMp:f.mp,atk:f.atk,def:f.def,matk:f.matk,mdef:f.mdef,spd:f.spd}); }
function stats(){
  const p=state.player,eq={atk:0,def:0,spd:0,matk:0,mdef:0,hp:0,mp:0};
  Object.values(state.equipment).forEach(e=>{ if(!e)return; if(e.atk)eq.atk+=e.atk; if(e.def)eq.def+=e.def; if(e.spd)eq.spd+=e.spd; if(e.matk)eq.matk+=e.matk; if(e.mdef)eq.mdef+=e.mdef; if(e.hp)eq.hp+=e.hp; if(e.mp)eq.mp+=e.mp; if(e.all){eq.atk+=e.all;eq.def+=e.all;eq.spd+=e.all;eq.matk+=e.all;eq.mdef+=e.all;} });
  return {atk:p.atk+state.buffs.atk+eq.atk,def:p.def+state.buffs.def+eq.def,spd:p.spd+state.buffs.spd+eq.spd,matk:p.matk+eq.matk,mdef:p.mdef+eq.mdef,maxHp:p.maxHp+eq.hp,maxMp:p.maxMp+eq.mp};
}
function genMaps(){
  for(let z of Object.keys(ZONES)){
    state.maps[z]={grid:Array(10).fill().map(()=>Array(10).fill().map(()=>ZONES[z].terrains[Math.floor(Math.random()*4)])),special:{}};
    for(let i=0;i<3;i++){let sx,sy; do{sx=Math.floor(Math.random()*10);sy=Math.floor(Math.random()*10);}while((sx===BOSS_POS.x&&sy===BOSS_POS.y)||(sx===START_POS.x&&sy===START_POS.y)); state.maps[z].special[`${sx},${sy}`]=['chest','merchant','portal'][Math.floor(Math.random()*3)];}
  }
}
function move(dx,dy){
  if(state.battle||state.dead||state.scene!=='map')return;
  let nx=state.pos.x+dx,ny=state.pos.y+dy;
  if(nx<0||nx>=10||ny<0||ny>=10){
    const adj={forest:{south:'cave'},cave:{north:'forest',south:'castle'},castle:{north:'cave',south:'dragon_lair'},dragon_lair:{north:'castle',south:'sea'},sea:{north:'dragon_lair',south:'heaven'},heaven:{north:'sea'}};
    const next=adj[state.zone]?.[dx<0?'west':dx>0?'east':dy<0?'north':dy>0?'south':null];
    if(next){
      const curIdx = ZONE_ORDER.indexOf(state.zone);
      const nextIdx = ZONE_ORDER.indexOf(next);
      if(nextIdx > curIdx && !state.bossDefeated.has(state.zone)){
        setVoice(`必須擊敗${ZONES[state.zone].name}的Boss才能前往${ZONES[next].name}！`);
        renderMap();
        return;
      }
      state.zone=next;state.pos={x:dx<0?9:dx>0?0:nx,y:dy<0?9:dy>0?0:ny};
    }else return;
  }else{state.pos.x=nx;state.pos.y=ny;}
  if(state.bossCooldown>0)state.bossCooldown--;
  const key=`${state.pos.x},${state.pos.y}`;
  if(state.pos.x===BOSS_POS.x&&state.pos.y===BOSS_POS.y){
    if(!state.bossDefeated.has(state.zone)||state.bossCooldown<=0)startBoss();else renderMap();
  }else if(state.maps[state.zone].special[key])handleSpecial(state.maps[state.zone].special[key]);
  else if(Math.random()<0.28)startBattle();
  else if(Math.random()<0.18)triggerEvent();
  else renderMap();
}
function handleSpecial(type){
  if(type==='chest'){state.player.gold+=Math.floor(Math.random()*60)+40;addEquip('weapon','D');setVoice('📦 打開寶箱！');delete state.maps[state.zone].special[`${state.pos.x},${state.pos.y}`];}
  else if(type==='merchant'){state.merchantBuyCount=0;state.scene='merchantShop';renderMerchantShop();return;}
  else if(type==='portal'){state.altarReturn={zone:state.zone,x:state.pos.x,y:state.pos.y};state.scene='altar';renderAltar();return;}
  renderMap();
}
function startBattle(){
  const pool=MONSTERS[state.zone]||MONSTERS.forest; const m=pool[Math.floor(Math.random()*pool.length)];
  state.enemy={...m,maxHp:m.hp}; state.battle=true; state.dead=false; state.scene='battle';
  state.buffs={atk:0,spd:0,def:0,shield:0,weakDebuff:false}; state.escapeCounter=0;
  setVoice(`⚔️ ${m.name} 出現了！`); renderBattle();
}
function startBoss(){
  const boss=BOSSES[state.zone]; state.enemy={...boss,maxHp:boss.hp,isBoss:true}; state.battle=true; state.dead=false; state.scene='battle';
  state.buffs={atk:0,spd:0,def:0,shield:0,weakDebuff:false}; state.escapeCounter=0;
  setVoice(`👑 Boss ${boss.name}！`); renderBattle();
}
function dmgCalc(atk,def,power=1,atkEl,defEl,isP=false){
  let base=Math.max(1,Math.floor(atk*power)-def);
  if(atkEl&&defEl&&atkEl!=='none'&&defEl!=='none'){if(ELEMENT_WEAKNESS[atkEl]===defEl)base=Math.floor(base*1.3);else if(ELEMENT_WEAKNESS[defEl]===atkEl)base=Math.floor(base*0.7);}
  let res=Math.max(1,base+Math.floor(Math.random()*6));
  if(isP&&state.race==='demon')res=Math.floor(res*1.20);
  if(!isP&&state.buffs.weakDebuff)res=Math.floor(res*1.2);
  return res;
}
function showDamage(el,dmg,col='#ff4d4d'){if(!el)return;const d=document.createElement('div');d.className='pop-damage';d.textContent=dmg;d.style.color=col;el.style.position='relative';el.appendChild(d);setTimeout(()=>d.remove(),700);}
function shakeEl(id){const el=document.getElementById(id);if(el){el.classList.add('shake');setTimeout(()=>el.classList.remove('shake'),400);}}

function playerAtk(){
  if(state.dead||!state.battle)return;
  const f=EVOLUTION_TREE[state.race][state.player.form];
  const dmg=dmgCalc(stats().atk,state.enemy.def,1,f.element,state.enemy.el,true);
  state.enemy.hp-=dmg; setVoice(`造成 ${dmg} 傷害`); shakeEl('enemy-card'); showDamage(document.getElementById('enemy-card'),dmg);
  checkEnd();
}
function playerSkill(id){
  if(state.dead||!state.battle)return; const sk=SKILLS[id]; if(!sk||state.player.mp<sk.mp)return;
  if((sk.attr==='heal'||sk.heal)&&state.race!=='god'){setVoice('只有神族可使用治癒！');return;}
  state.player.mp-=sk.mp;
  if(sk.attr==='heal'||sk.heal){const heal=sk.heal||14; state.player.hp=Math.min(state.player.maxHp,state.player.hp+heal); setVoice(`❤️ 回復${heal}HP`); showDamage(document.getElementById('player-card'),heal,'#4dff4d');}
  else if(sk.attr==='buff')setVoice('🛡️ 增益');
  else{const f=EVOLUTION_TREE[state.race][state.player.form]; const dmg=dmgCalc(stats().atk,state.enemy.def,sk.power||1,sk.element||f.element,state.enemy.el,true); state.enemy.hp-=dmg; setVoice(`✨ ${sk.name}！ ${dmg} 傷害`); shakeEl('enemy-card'); showDamage(document.getElementById('enemy-card'),dmg);}
  checkEnd();
}
function playerDodge(){if(state.dead||!state.battle||state.player.mp<3)return; state.player.mp-=3; if(Math.random()<0.8){setVoice('💨 閃避成功！');state.escapeCounter++;if(state.escapeCounter>=3)setVoice('已可逃跑');}else setVoice('閃避失敗…'); checkEnd();}
function tryRun(){if(state.dead||!state.battle)return; if(state.escapeCounter<3){setVoice(`需累積閃避3次 (${state.escapeCounter}/3)`);return;} setVoice('🏃 逃跑成功！'); state.battle=false; state.enemy=null; state.scene='map'; renderMap();}
function usePotion(type){const p=state.player,bonus=state.race==='god'?1.5:1; if(type==='hp'){p.hp=Math.min(p.maxHp,p.hp+Math.floor(24*bonus));p.potions.hp--;}else if(type==='mp'){p.mp=Math.min(p.maxMp,p.mp+Math.floor(14*bonus));p.potions.mp--;}else if(type==='speed'){state.buffs.spd+=Math.floor(10*bonus);p.potions.speed--;}else if(type==='atk'){state.buffs.atk+=Math.floor(10*bonus);p.potions.atk--;}else if(type==='weak'&&state.enemy){state.buffs.weakDebuff=true;p.potions.weak--;setVoice('敵人虛弱，受傷+20%');}else if(type==='weak')setVoice('無敵方'); setVoice('藥水生效'); renderBattle();}
function enemyTurn(){if(!state.enemy||state.enemy.hp<=0||state.dead)return; const dmg=dmgCalc(state.enemy.atk,stats().def,1,state.enemy.el,EVOLUTION_TREE[state.race][state.player.form].element); state.player.hp-=dmg; setVoice(`${state.enemy.name} 造成 ${dmg} 傷害`); shakeEl('player-card'); showDamage(document.getElementById('player-card'),dmg); if(state.player.hp<=0){playerDeath();return;} renderBattle();}
function playerDeath(){
  state.player.hp=0; state.dead=true; state.battle=false; setVoice('被擊倒…返回起點');
  state.deathCount++; checkAchievements();
  const overlay=document.createElement('div'); overlay.className='death-overlay'; document.body.appendChild(overlay); setTimeout(()=>overlay.remove(),1200);
  setTimeout(()=>{if(state.race!=='human'){state.player.potions={hp:3,mp:2,speed:1,atk:1,weak:1};state.equipment={weapon:null,armor:null,accessory:null};state.equipInv=[];} state.player.hp=state.player.maxHp; state.player.mp=state.player.maxMp; state.dead=false; state.zone=START_ZONE; state.pos={...START_POS}; state.scene='map'; renderMap();},1500);
  renderBattle();
}
function addEquip(type,grade){const pool=EQUIPMENT_POOL[type].filter(e=>e.grade===grade); if(pool.length){const eq={...pool[Math.floor(Math.random()*pool.length)],type}; state.equipInv.push(eq); setVoice(`獲得${eq.name}`);}}
function addToInv(id){const ex=state.inv.find(i=>i.id===id); if(ex)ex.qty++; else state.inv.push({id,name:LOOT_ITEMS[id].name,qty:1});}
function dropLootFromPool(pool){if(!pool||!pool.length)return; for(let entry of pool){if(Math.random()<entry.chance){addToInv(entry.id); setVoice(`獲得 ${LOOT_ITEMS[entry.id].name} [${LOOT_RARITY[LOOT_ITEMS[entry.id].rarity]}]`); break;}}}
function gainExp(amount){
  state.player.exp+=amount; const needed=EXP_TO_LEVEL(state.player.lv);
  if(state.player.exp>=needed){
    state.player.exp-=needed; state.player.lv++;
    state.player.maxHp+=10; state.player.maxMp+=5; state.player.atk+=2; state.player.def+=2;
    state.player.hp=state.player.maxHp; state.player.mp=state.player.maxMp;
    setVoice(`🎉 升級！ Lv.${state.player.lv}`);
    if(state.player.lv%5===0&&EVOLUTION_TREE[state.race][state.player.form].evolutions?.length)setVoice('可進化！');
    checkAchievements();
    gainExp(0);
  }
}
function checkEnd(){
  if(state.enemy.hp<=0){
    state.enemy.hp=0; let gold=Math.floor(Math.random()*(state.enemy.goldMax-state.enemy.goldMin+1))+state.enemy.goldMin;
    if(state.race==='human')gold=Math.floor(gold*1.30); state.player.gold+=gold; state.totalGold+=gold;
    gainExp(state.enemy.isBoss?EXP_PER_BOSS:EXP_PER_KILL);
    if(state.enemy.isBoss){
      state.bossKills[state.zone] = (state.bossKills[state.zone] || 0) + 1;
      dropLootFromPool(state.enemy.loot);
      if(Math.random()<0.5){const grades=[['C','B'],['B','A'],['A','S'],['S','SS'],['S','SS'],['SS']][['forest','cave','castle','dragon_lair','sea','heaven'].indexOf(state.zone)]; addEquip(['weapon','armor','accessory'][Math.floor(Math.random()*3)],grades[Math.floor(Math.random()*grades.length)]);}
      state.bossDefeated.add(state.zone); state.bossCooldown=12;
      if(state.zone==='heaven' && !state.victoryShown){
        state.victoryShown = true;
        setTimeout(()=>showVictoryScreen(),600);
      }
    } else {
      state.totalKills++;
      dropLootFromPool(state.enemy.loot);
      if(Math.random()<0.2)addEquip(['weapon','armor','accessory'][Math.floor(Math.random()*3)],'D');
    }
    checkAchievements();
    state.battle=false; state.dead=false; state.scene='map'; setTimeout(()=>renderMap(),500);
  }else enemyTurn();
}
function forceLevelUp(t){for(let i=0;i<t;i++)gainExp(EXP_TO_LEVEL(state.player.lv));}
function evolve(id){
  state.player.form=id; state.player.lv=1; applyForm(); state.player.hp=state.player.maxHp; state.player.mp=state.player.maxMp;
  state.evolveCount++; checkAchievements();
  setVoice(`進化！${EVOLUTION_TREE[state.race][id].name}`); state.scene='map'; renderMap();
}
function setVoice(m){state.voice=`神之聲：${m}`;}
function updateStatusBar(){
  const p=state.player,f=EVOLUTION_TREE[state.race][p.form],needed=EXP_TO_LEVEL(p.lv);
  document.getElementById('status-bar').innerHTML=`<span>${RACES[state.race].icon} ${f.name} Lv.${p.lv}</span><span>❤️${p.hp}/${p.maxHp}</span><span>💧${p.mp}/${p.maxMp}</span><span>💰${p.gold}</span><span>⭐${p.exp}/${needed}</span>`;
}

// 成就系統
const ACHIEVEMENTS = {
  firstBoss:{name:'初次勝利', desc:'擊敗任意Boss', check:()=>Object.keys(state.bossKills).length>0},
  killer50:{name:'小怪獵手', desc:'擊殺50隻小怪', check:()=>state.totalKills>=50},
  killer200:{name:'屠殺者', desc:'擊殺200隻小怪', check:()=>state.totalKills>=200},
  gold500:{name:'財富累積', desc:'累計獲得500金幣', check:()=>state.totalGold>=500},
  gold5000:{name:'百萬富翁', desc:'累計獲得5000金幣', check:()=>state.totalGold>=5000},
  allBoss:{name:'全Boss征服', desc:'擊敗所有6個Boss', check:()=>ZONE_ORDER.every(z=>state.bossKills[z])},
  death5:{name:'不屈不撓', desc:'死亡5次', check:()=>state.deathCount>=5},
  evolve3:{name:'進化大師', desc:'進化3次', check:()=>state.evolveCount>=3},
  level20:{name:'登峰造極', desc:'達到20級', check:()=>state.player&&state.player.lv>=20},
  rich1000:{name:'富豪', desc:'累計獲得1000金幣', check:()=>state.totalGold>=1000},
  material50:{name:'材料狂人', desc:'持有50個材料', check:()=>state.inv.reduce((a,b)=>a+b.qty,0)>=50}
};
function checkAchievements(){
  for(let key in ACHIEVEMENTS){
    if(!state.achievements[key] && ACHIEVEMENTS[key].check()){
      state.achievements[key] = true;
    }
  }
}

// 勝利畫面
function showVictoryScreen(){
  const playTime = Math.floor((Date.now() - state.startTime)/1000);
  const mins = Math.floor(playTime/60), secs = playTime%60;
  const bossList = ZONE_ORDER.map(z=>`${ZONES[z].name} ${state.bossKills[z]?`x${state.bossKills[z]}`:'未擊敗'}`).join(' / ');
  const achHtml = Object.entries(state.achievements).filter(([k,v])=>v).map(([k])=>ACHIEVEMENTS[k].name).map(n=>`<span class="badge">🏆 ${n}</span>`).join('');

  document.getElementById('game-view').innerHTML = `
    <div class="victory-overlay" id="victory">
      <div id="confetti-container" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;"></div>
      <div class="victory-card">
        <h2>🎉 恭喜通關！</h2>
        <p style="font-size:1.2rem;">你擊敗了最終Boss 宙斯！</p>
        <div class="stats">
          <p>⏱️ 遊玩時間：${mins}分${secs}秒</p>
          <p>👾 擊殺小怪：${state.totalKills} 隻</p>
          <p>💰 累計金幣：${state.totalGold} G</p>
          <p>👑 Boss擊殺：${bossList}</p>
          <p>💀 死亡次數：${state.deathCount}</p>
          <p>🔄 進化次數：${state.evolveCount}</p>
        </div>
        <div class="achievements">${achHtml||'尚無成就'}</div>
        <p style="margin-top:10px; font-style:italic;">製作組：Deep Seek & 利恩碩</p>
        <button class="reward-btn" id="rewardBtn">🎁 給勇者的獎勵</button>
        <button class="reward-btn" id="rebirthBtn">🔄 重生</button>
        <div id="videoContainer" style="display:none;"></div>
      </div>
    </div>`;

  const container = document.getElementById('confetti-container');
  for(let i=0;i<80;i++){
    const conf = document.createElement('div');
    conf.className = 'confetti';
    conf.style.left = Math.random()*100+'%';
    conf.style.animationDuration = (Math.random()*3+2)+'s';
    conf.style.animationDelay = Math.random()*2+'s';
    conf.style.backgroundColor = ['#ff0','#f0f','#0ff','#f00','#0f0','#ff8800'][Math.floor(Math.random()*6)];
    container.appendChild(conf);
  }

  document.getElementById('rewardBtn').onclick = function(){
    const vidDiv = document.getElementById('videoContainer');
    vidDiv.style.display = 'block';
    vidDiv.innerHTML = `<div class="video-wrapper"><iframe src="https://www.youtube-nocookie.com/embed/dQw4w9WgXcQ?autoplay=1&mute=1" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe></div>`;
  };

  document.getElementById('rebirthBtn').onclick = function(){
    state.race = null; state.player = null; state.enemy = null; state.battle = false; state.dead = false;
    state.scene = 'raceSelect'; state.zone = START_ZONE; state.pos = {...START_POS};
    state.inv = []; state.buffs = {atk:0,spd:0,def:0,shield:0,weakDebuff:false};
    state.bossDefeated.clear(); state.bossCooldown = 0;
    state.equipment = {weapon:null,armor:null,accessory:null}; state.equipInv = [];
    state.escapeCounter = 0; state.altarReturn = null; state.merchantBuyCount = 0;
    state.startTime = 0; state.totalKills = 0; state.totalGold = 0; state.bossKills = {};
    state.deathCount = 0; state.evolveCount = 0; state.achievements = {}; state.victoryShown = false;
    document.getElementById('control-area').innerHTML = '';
    showRaceSelect();
  };

  document.getElementById('control-area').innerHTML = '';
}

// 渲染函數 (完整)
function renderMap(){
  updateStatusBar(); const f=EVOLUTION_TREE[state.race][state.player.form]; const canEvo=state.player.lv%5===0&&f.evolutions?.length;
  const map=state.maps[state.zone]; let grid='';
  for(let y=0;y<10;y++)for(let x=0;x<10;x++){
    const isP=x===state.pos.x&&y===state.pos.y; const isBoss=x===BOSS_POS.x&&y===BOSS_POS.y; const ba=!state.bossDefeated.has(state.zone)||state.bossCooldown<=0;
    const key=`${x},${y}`,sp=map.special[key]; let cls='',icon=map.grid[y][x];
    if(isP){cls='player-cell';icon=f.icon;}else if(isBoss){cls=ba?'boss-cell':'boss-disabled';icon=ba?'👑':'💤';}else if(sp){if(sp==='chest'){cls='chest-cell';icon='📦';}else if(sp==='merchant'){cls='merchant-cell';icon='🏪';}else if(sp==='portal'){cls='portal-cell';icon='🌀';}}
    grid+=`<div class="map-cell ${cls}" data-x="${x}" data-y="${y}">${icon}</div>`;
  }
  document.getElementById('game-view').innerHTML=`
  <div class="panel"><h3>${ZONES[state.zone].icon} ${ZONES[state.zone].name}</h3>
  <div class="map-grid" id="mapGrid">${grid}</div>
  <div style="display:flex;justify-content:space-between;flex-wrap:wrap;"><span>📊 Lv.${state.player.lv} | 進化需${Math.ceil(state.player.lv/5)*5}級</span><span>⭐ 經驗 ${state.player.exp}/${EXP_TO_LEVEL(state.player.lv)}</span></div>
  <div class="god-voice">${state.voice}</div>
  <div class="flex-row"><button class="btn small" id="statusBtn">📋狀態</button><button class="btn small" id="equipBtn">🛡️裝備</button><button class="btn small" id="shopBtn">🛒商店</button><button class="btn small" id="craftBtn">🔨打造</button>${canEvo?`<button class="btn small primary" id="evoBtn">✨進化</button>`:''}</div></div>`;
  bindMapEvents();
  document.getElementById('statusBtn').onclick=()=>{state.scene='status';renderStatus();};
  document.getElementById('equipBtn').onclick=()=>{state.scene='equip';renderEquip();};
  document.getElementById('shopBtn').onclick=()=>{state.scene='shop';renderShop();};
  document.getElementById('craftBtn').onclick=()=>{state.scene='craft';renderCraft();};
  if(canEvo)document.getElementById('evoBtn').onclick=()=>{state.scene='evo';renderEvo();};
}
function bindMapEvents(){
  document.querySelectorAll('.map-cell').forEach(cell=>{cell.onclick=(e)=>{if(state.battle||state.dead||state.scene!=='map')return;const tx=parseInt(e.currentTarget.dataset.x),ty=parseInt(e.currentTarget.dataset.y);const dx=tx-state.pos.x,dy=ty-state.pos.y;if(Math.abs(dx)+Math.abs(dy)===1)move(dx,dy);};});
  const mapGrid=document.getElementById('mapGrid'); if(!mapGrid)return; let startX,startY;
  mapGrid.ontouchstart=e=>{startX=e.touches[0].clientX;startY=e.touches[0].clientY;};
  mapGrid.ontouchend=e=>{if(state.battle||state.dead||state.scene!=='map')return;const dx=e.changedTouches[0].clientX-startX,dy=e.changedTouches[0].clientY-startY;if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>25)move(dx>0?1:-1,0);else if(Math.abs(dy)>Math.abs(dx)&&Math.abs(dy)>25)move(0,dy>0?1:-1);};
}
function renderBattle(){
  updateStatusBar(); const e=state.enemy,p=state.player,f=EVOLUTION_TREE[state.race][p.form]; const skills=f.skills||[];
  let skillBtns=skills.map(sid=>{const sk=SKILLS[sid];if(!sk||((sk.attr==='heal'||sk.heal)&&state.race!=='god'))return'';return`<button class="btn small" ${p.mp<sk.mp||state.dead?'disabled':''} id="sk_${sid}">${sk.name}(${sk.mp}MP)</button>`;}).join('');
  const potDisabled=Object.values(p.potions).every(v=>v===0)||state.dead; const hpP=Math.max(0,e.hp/e.maxHp*100);
  document.getElementById('game-view').innerHTML=`
  <div class="panel ${e.isBoss?'boss-bg':''}"><div id="enemy-card" style="position:relative;background:#2a1028;border-radius:12px;padding:10px;"><span style="font-size:2rem;">${e.icon}</span><b>${e.name}</b><div class="hp-bar"><div class="hp-fill" style="width:${hpP}%;"></div></div><div style="text-align:right;">${e.hp}/${e.maxHp}</div></div>
  <div id="player-card" style="margin:10px 0;position:relative;"><b>${f.icon} ${f.name}</b> Lv.${p.lv} ❤️${p.hp}/${p.maxHp} 💧${p.mp}/${p.maxMp}</div>
  <div class="flex-row"><button class="btn" id="atkBtn" ${state.dead?'disabled':''}>⚔️攻擊</button>${skillBtns}<button class="btn" id="dodgeBtn" ${state.dead||p.mp<3?'disabled':''}>💨閃避</button><button class="btn" id="runBtn" ${state.dead?'disabled':''}>🏃逃跑(${state.escapeCounter}/3)</button><button class="btn" id="potBtn" ${potDisabled?'disabled':''}>🧪藥水</button></div>
  <div class="god-voice">${state.voice}</div>${state.dead?'<p style="color:#ff8080;">倒下中…</p>':''}</div>`;
  document.getElementById('atkBtn').onclick=playerAtk; skills.forEach(sid=>{const btn=document.getElementById(`sk_${sid}`);if(btn)btn.onclick=()=>playerSkill(sid);});
  document.getElementById('dodgeBtn').onclick=playerDodge; document.getElementById('runBtn').onclick=tryRun; document.getElementById('potBtn').onclick=showPotions;
}
function showPotions(){const p=state.player;let html='<div class="panel"><h3>🧪 藥水</h3>';const add=(l,k,q)=>{if(q>0)html+=`<button class="btn small" id="use_${k}">${l} (${q})</button>`;};add('❤️生命','hp',p.potions.hp);add('💧魔力','mp',p.potions.mp);add('💨速度','speed',p.potions.speed);add('⚔️攻擊','atk',p.potions.atk);add('☠️虛弱','weak',p.potions.weak);html+='<button class="btn small" id="cancelPotion">取消</button></div>';document.getElementById('game-view').innerHTML=html;['hp','mp','speed','atk','weak'].forEach(k=>{const btn=document.getElementById(`use_${k}`);if(btn)btn.onclick=()=>{usePotion(k);renderBattle();};});document.getElementById('cancelPotion').onclick=()=>renderBattle();}
function renderStatus(){const p=state.player,f=EVOLUTION_TREE[state.race][p.form],s=stats();document.getElementById('game-view').innerHTML=`<div class="panel"><h3>📋 狀態</h3><p>${f.icon} ${f.name} Lv.${p.lv}</p><p>❤️${p.hp}/${p.maxHp} 💧${p.mp}/${p.maxMp}</p><p>⚔️攻${s.atk} 🛡️防${s.def} 💨速${s.spd}</p><p>⭐ 經驗 ${p.exp}/${EXP_TO_LEVEL(p.lv)}</p><button class="btn" id="backMap">返回</button></div>`;document.getElementById('backMap').onclick=()=>{state.scene='map';renderMap();};}
function renderEquip(){const slots={weapon:'武器',armor:'防具',accessory:'飾品'};let html='<div class="panel"><h3>🛡️ 裝備</h3>';for(let[s,n]of Object.entries(slots)){const eq=state.equipment[s];html+=`<p><b>${n}</b>：${eq?`${eq.name}(${eq.grade}) ${eq.atk?'+'+eq.atk+'攻':''}${eq.def?'+'+eq.def+'防':''}${eq.spd?'+'+eq.spd+'速':''}${eq.matk?'+'+eq.matk+'魔':''}${eq.mdef?'+'+eq.mdef+'魔防':''}${eq.hp?'+'+eq.hp+'血':''}${eq.all?'+'+eq.all+'全':''}`:'空'} ${eq?`<button class="btn small unequip" data-slot="${s}">卸</button><button class="btn small sellEquip" data-slot="${s}">賣25G</button>`:''}</p>`;}html+='<h4>背包裝備</h4>';state.equipInv.forEach((eq,i)=>{html+=`<div class="item-row"><span>${eq.name}(${eq.grade})</span><button class="btn small equipIt" data-idx="${i}">裝備</button><button class="btn small sellInv" data-idx="${i}">賣25G</button></div>`;});html+='<button class="btn" id="closeEquip">返回</button></div>';document.getElementById('game-view').innerHTML=html;document.getElementById('closeEquip').onclick=()=>{state.scene='map';renderMap();};document.querySelectorAll('.unequip').forEach(b=>b.onclick=e=>{const s=e.target.dataset.slot;const eq=state.equipment[s];if(eq){state.equipInv.push(eq);state.equipment[s]=null;renderEquip();}});document.querySelectorAll('.sellEquip').forEach(b=>b.onclick=e=>{const s=e.target.dataset.slot;const eq=state.equipment[s];if(eq){state.player.gold+=25;state.equipment[s]=null;renderEquip();}});document.querySelectorAll('.equipIt').forEach(b=>b.onclick=e=>{const i=parseInt(e.target.dataset.idx);const eq=state.equipInv.splice(i,1)[0];if(state.equipment[eq.type])state.equipInv.push(state.equipment[eq.type]);state.equipment[eq.type]=eq;renderEquip();});document.querySelectorAll('.sellInv').forEach(b=>b.onclick=e=>{const i=parseInt(e.target.dataset.idx);state.player.gold+=25;state.equipInv.splice(i,1);renderEquip();});}
function renderShop(){const p=state.player;let invHtml=state.inv.map((it,i)=>`<div class="item-row"><span>${it.name} x${it.qty}</span><button class="btn small" id="sell_${i}">賣25G</button></div>`).join('');document.getElementById('game-view').innerHTML=`<div class="panel"><h3>🛒 商店</h3><p>💰 ${p.gold}G</p><div class="shop-grid"><div class="shop-card">❤️生命藥水 (30HP) 100G <button class="btn small" id="buyHp">買</button></div><div class="shop-card">💧魔力藥水 (18MP) 80G <button class="btn small" id="buyMp">買</button></div><div class="shop-card">💨速度藥水 +14 130G <button class="btn small" id="buySpd">買</button></div><div class="shop-card">⚔️攻擊藥水 +14 140G <button class="btn small" id="buyAtk">買</button></div><div class="shop-card">☠️虛弱藥水 110G <button class="btn small" id="buyWeak">買</button></div><div class="shop-card">⭐升級藥水 +3級 500G <button class="btn small" id="buyLevel">買</button></div></div><h4>掉落物</h4>${invHtml||'無'}<button class="btn" id="closeShop">關閉</button></div>`;document.getElementById('buyHp').onclick=()=>{if(p.gold>=100){p.gold-=100;p.potions.hp++;renderShop();}};document.getElementById('buyMp').onclick=()=>{if(p.gold>=80){p.gold-=80;p.potions.mp++;renderShop();}};document.getElementById('buySpd').onclick=()=>{if(p.gold>=130){p.gold-=130;p.potions.speed++;renderShop();}};document.getElementById('buyAtk').onclick=()=>{if(p.gold>=140){p.gold-=140;p.potions.atk++;renderShop();}};document.getElementById('buyWeak').onclick=()=>{if(p.gold>=110){p.gold-=110;p.potions.weak++;renderShop();}};document.getElementById('buyLevel').onclick=()=>{if(p.gold>=500){p.gold-=500;forceLevelUp(3);renderShop();}};state.inv.forEach((_,i)=>{const btn=document.getElementById(`sell_${i}`);if(btn)btn.onclick=()=>{const it=state.inv[i];p.gold+=25;it.qty--;if(it.qty<=0)state.inv.splice(i,1);renderShop();};});document.getElementById('closeShop').onclick=()=>{state.scene='map';renderMap();};}
function renderMerchantShop(){const p=state.player;const gradePrice={D:35,C:70,B:140,A:210,S:350,SS:550};const allowedGrades=ZONE_MERCHANT_GRADES[state.zone]||['D','C'];let items='';for(let i=0;i<3;i++){const type=['weapon','armor','accessory'][i];const grade=allowedGrades[Math.floor(Math.random()*allowedGrades.length)];const pool=EQUIPMENT_POOL[type].filter(e=>e.grade===grade);if(pool.length){const eq=pool[Math.floor(Math.random()*pool.length)];const price=Math.floor(gradePrice[grade]*0.85);items+=`<div class="shop-card"><span>${eq.name} (${grade})</span><p class="price">${price}G</p><button class="btn small buyMerch" data-type="${type}" data-grade="${grade}" data-price="${price}">購買</button></div>`;}}document.getElementById('game-view').innerHTML=`<div class="panel"><h3>🏪 流浪商人 (85折) 已買${state.merchantBuyCount}/3</h3><p style="font-size:0.7rem;color:#c0a0d0;">📍 ${ZONES[state.zone].name} - 最高${allowedGrades[allowedGrades.length-1]}級</p><p>💰 ${p.gold}G</p><div class="shop-grid">${items}</div><button class="btn" id="closeMerchant">離開</button></div>`;document.querySelectorAll('.buyMerch').forEach(b=>b.onclick=e=>{if(state.merchantBuyCount>=3)return;const price=parseInt(e.target.dataset.price);if(p.gold<price)return;p.gold-=price;addEquip(e.target.dataset.type,e.target.dataset.grade);state.merchantBuyCount++;if(state.merchantBuyCount>=3){delete state.maps[state.zone].special[`${state.pos.x},${state.pos.y}`];state.scene='map';renderMap();}else renderMerchantShop();});document.getElementById('closeMerchant').onclick=()=>{state.scene='map';renderMap();};}
function renderCraft(){const invCounts={};state.inv.forEach(i=>{const r=LOOT_ITEMS[i.id].rarity;invCounts[r]=(invCounts[r]||0)+i.qty;});let html=`<div class="panel"><h3>🔨 鍛造 (材料分級)</h3><p>材料: `;for(let r in LOOT_RARITY)html+=`${LOOT_RARITY[r]}:${invCounts[r]||0} `;html+=`| 💰${state.player.gold}</p><div class="flex-row">`;for(let grade in CRAFT_RECIPES){const rec=CRAFT_RECIPES[grade];let can=true,missing=[];for(let r in rec.needs)if((invCounts[r]||0)<rec.needs[r]){can=false;missing.push(`${LOOT_RARITY[r]}缺${rec.needs[r]-(invCounts[r]||0)}`);}if(state.player.gold<rec.cost){can=false;missing.push('金幣不足');}html+=`<button class="btn small craftGrade" data-grade="${grade}" ${!can?'disabled':''}>${grade}級 ${rec.cost}G ${missing.length?'('+missing.join(',')+')':''}</button>`;}html+='</div><button class="btn" id="closeCraft">返回</button></div>';document.getElementById('game-view').innerHTML=html;document.querySelectorAll('.craftGrade').forEach(b=>b.onclick=e=>{const grade=e.target.dataset.grade;const rec=CRAFT_RECIPES[grade];if(state.player.gold<rec.cost)return;for(let r in rec.needs){let need=rec.needs[r];for(let i=state.inv.length-1;i>=0&&need>0;i--){if(LOOT_ITEMS[state.inv[i].id].rarity===r){const take=Math.min(state.inv[i].qty,need);state.inv[i].qty-=take;need-=take;if(state.inv[i].qty<=0)state.inv.splice(i,1);}}if(need>0)return;}state.player.gold-=rec.cost;addEquip(['weapon','armor','accessory'][Math.floor(Math.random()*3)],grade);renderCraft();});document.getElementById('closeCraft').onclick=()=>{state.scene='map';renderMap();};}
function renderAltar(){document.getElementById('game-view').innerHTML=`<div class="panel"><h3>🌀 暗影祭壇</h3><p>選擇一項永久提升</p><button class="btn" id="aAtk">⚔️攻擊+4</button><button class="btn" id="aDef">🛡️防禦+4</button><button class="btn" id="aSpd">💨速度+4</button><button class="btn" id="aHp">❤️生命+25</button><button class="btn" id="aMp">💧魔力+12</button></div>`;document.getElementById('aAtk').onclick=()=>{state.player.atk+=4;returnFromAltar();};document.getElementById('aDef').onclick=()=>{state.player.def+=4;returnFromAltar();};document.getElementById('aSpd').onclick=()=>{state.player.spd+=4;returnFromAltar();};document.getElementById('aHp').onclick=()=>{state.player.maxHp+=25;state.player.hp+=25;returnFromAltar();};document.getElementById('aMp').onclick=()=>{state.player.maxMp+=12;state.player.mp+=12;returnFromAltar();};}
function returnFromAltar(){if(state.altarReturn){state.zone=state.altarReturn.zone;state.pos={x:state.altarReturn.x,y:state.altarReturn.y};state.altarReturn=null;}delete state.maps[state.zone].special[`${state.pos.x},${state.pos.y}`];setVoice('獲得祝福並返回');state.scene='map';renderMap();}
function triggerEvent(){const events=[{name:'流浪商人',desc:'商人出現',effect:()=>{state.merchantBuyCount=0;state.scene='merchantShop';renderMerchantShop();}},{name:'偷襲',desc:'-15HP',effect:()=>{state.player.hp=Math.max(1,state.player.hp-15);setVoice('被偷襲！');}},{name:'幫助村民',desc:'獲得武器',effect:()=>addEquip('weapon','D')},{name:'聖光洗禮',desc:'獲得飾品',effect:()=>addEquip('accessory','C')},{name:'寶箱',desc:'+50G',effect:()=>{state.player.gold+=50;setVoice('+50G');}},{name:'陷阱',desc:'-10HP',effect:()=>{state.player.hp=Math.max(1,state.player.hp-10);}}];const ev=events[Math.floor(Math.random()*events.length)];state.scene='event';document.getElementById('game-view').innerHTML=`<div class="panel"><h3>${ev.name}</h3><p>${ev.desc}</p><button class="btn primary" id="acceptEvent">確認</button></div>`;document.getElementById('acceptEvent').onclick=()=>{ev.effect();if(state.scene==='event'){state.scene='map';renderMap();}};}
function renderEvo(){const opts=EVOLUTION_TREE[state.race][state.player.form].evolutions||[];document.getElementById('game-view').innerHTML=`<div class="panel"><h3>進化</h3><div class="flex-row">${opts.map(id=>`<div class="evolution-card" data-evo="${id}"><span style="font-size:2rem;">${EVOLUTION_TREE[state.race][id].icon}</span><h4>${EVOLUTION_TREE[state.race][id].name}</h4></div>`).join('')}</div></div>`;document.querySelectorAll('.evolution-card').forEach(c=>c.onclick=e=>evolve(e.currentTarget.dataset.evo));}

// ==================== 操作設定 ====================
function setupControls(){
  document.getElementById('control-area').innerHTML=`
  <div class="direction-pad">
  <div class="dir-row"><div class="dir-btn" id="upBtn">↑</div></div>
  <div class="dir-row">
  <div class="dir-btn" id="leftBtn">←</div>
  <div class="dir-btn" id="downBtn">↓</div>
  <div class="dir-btn" id="rightBtn">→</div>
  </div></div>`;
  document.getElementById('upBtn').onclick=()=>move(0,-1);
  document.getElementById('downBtn').onclick=()=>move(0,1);
  document.getElementById('leftBtn').onclick=()=>move(-1,0);
  document.getElementById('rightBtn').onclick=()=>move(1,0);
}
window.addEventListener('keydown',e=>{
  if(state.scene!=='map'||state.battle||state.dead)return;
  if(e.key==='ArrowLeft'||e.key==='a'){e.preventDefault();move(-1,0);}
  if(e.key==='ArrowRight'||e.key==='d'){e.preventDefault();move(1,0);}
  if(e.key==='ArrowUp'||e.key==='w'){e.preventDefault();move(0,-1);}
  if(e.key==='ArrowDown'||e.key==='s'){e.preventDefault();move(0,1);}
});

// ==================== 起始畫面 ====================
function showTutorial(){
  state.scene='tutorial';
  document.getElementById('game-view').innerHTML=`
    <div class="panel">
      <h2>📖 遊戲玩法說明</h2>
      <p>🗺️ <b>探索移動</b>：方向鍵/滑動地圖/點擊相鄰格子移動。</p>
      <p>⚔️ <b>回合戰鬥</b>：攻擊、技能、閃避(3次可逃)。</p>
      <p>🎯 <b>升級</b>：經驗自動升級。</p>
      <p>✨ <b>進化</b>：每5級可進化，重置等級。</p>
      <p>👑 <b>Boss挑戰</b>：擊敗當前區域Boss解鎖下一區域。</p>
      <p>🔨 <b>鍛造</b>：收集材料依稀有度打造裝備。</p>
      <p>🛒 <b>流浪商人</b>：依區域販售裝備。</p>
      <p>💀 <b>死亡</b>：返回起點，非人族丟失裝備。</p>
      <button class="btn primary" id="toRaceSelect">選擇種族</button>
    </div>`;
  document.getElementById('toRaceSelect').onclick = showRaceSelect;
}

function showRaceSelect(){
  state.scene='raceSelect';
  let html = '<div class="panel"><h3>選擇種族</h3><div class="flex-row" id="raceContainer">';
  for(let key in RACES){
    const r = RACES[key];
    html += `<div class="race-card" data-race="${key}"><span style="font-size:2.5rem;">${r.icon}</span><h4>${r.name}</h4><p>${r.desc}</p></div>`;
  }
  html += '</div></div>';
  document.getElementById('game-view').innerHTML = html;
  document.getElementById('raceContainer').onclick = function(e) {
    const card = e.target.closest('.race-card');
    if (!card) return;
    const raceKey = card.dataset.race;
    initPlayer(raceKey);
    genMaps();
    state.bossDefeated.clear();
    state.inv = []; state.equipInv = []; state.equipment = {weapon:null,armor:null,accessory:null};
    state.startTime = Date.now();
    state.totalKills = 0; state.totalGold = 0; state.bossKills = {}; state.deathCount = 0; state.evolveCount = 0;
    state.achievements = {}; state.victoryShown = false;
    state.scene = 'map'; state.zone = START_ZONE; state.pos = {...START_POS};
    setupControls();
    renderMap();
  };
}

// 啟動遊戲
showTutorial();
})();
</script>
