<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0">
  <title>轉生龍蛋～暗影進化傳說～ 半開放世界</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0b0710;
      font-family: 'Noto Serif TC', 'Cinzel', 'Microsoft JhengHei', serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 15px;
      background-image: radial-gradient(circle at 30% 30%, #2a1e35 0%, #05020a 90%);
    }
    #game-container {
      width: 100%;
      max-width: 750px;
      background: rgba(20, 12, 28, 0.95);
      border: 2px solid #6a4e7a;
      border-radius: 30px;
      box-shadow: 0 0 50px rgba(160, 100, 200, 0.4), inset 0 0 20px rgba(0,0,0,0.8);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .top-ornament {
      height: 4px;
      background: linear-gradient(90deg, transparent, #d9b3ff, #ffddaa, #d9b3ff, transparent);
    }
    #header {
      padding: 12px 18px;
      text-align: center;
      border-bottom: 1px solid #4c3a5a;
      background: rgba(30, 15, 40, 0.7);
    }
    #header h1 {
      font-size: 1.8rem;
      letter-spacing: 3px;
      color: #ffe8b0;
      text-shadow: 0 0 15px #b080e0, 0 2px 5px black;
      font-weight: 700;
    }
    .subtitle {
      font-size: 0.7rem;
      color: #c0a0d0;
      letter-spacing: 4px;
    }
    #main-view {
      flex: 1;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
      max-height: 55vh;
    }
    .panel {
      background: rgba(15, 8, 22, 0.85);
      border: 1px solid #5e4870;
      border-radius: 18px;
      padding: 14px;
      box-shadow: inset 0 1px 5px rgba(255,255,255,0.06);
      color: #f0e0ff;
    }
    .flex-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .btn {
      background: #2f203b;
      border: 1px solid #7a5c8c;
      color: #f0e0ff;
      padding: 10px 16px;
      border-radius: 28px;
      font-weight: 600;
      font-size: 0.9rem;
      letter-spacing: 1px;
      cursor: pointer;
      background: linear-gradient(180deg, #402a50 0%, #251830 100%);
      box-shadow: 0 4px 8px rgba(0,0,0,0.5);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: 0.2s;
      text-shadow: 0 1px 2px black;
    }
    .btn:hover {
      background: #533868;
      border-color: #c0a0d0;
      color: #ffffff;
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(160,120,200,0.5);
    }
    .btn.primary {
      background: #5a3860;
      border-color: #d4afb0;
      color: #fff3e0;
    }
    .btn.danger {
      background: #4a2028;
      border-color: #b87070;
    }
    .btn.small {
      padding: 6px 14px;
      font-size: 0.8rem;
    }
    .god-voice {
      background: #1e1028;
      border-left: 4px solid #e6b422;
      padding: 10px 14px;
      border-radius: 12px;
      color: #ffe8a0;
      font-style: italic;
      text-shadow: 0 1px 3px black;
      margin: 8px 0;
    }
    .map-grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 4px;
      margin: 10px 0;
    }
    .map-cell {
      aspect-ratio: 1;
      background: #1a1025;
      border: 1px solid #4a3a55;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: #ddd;
      transition: 0.2s;
    }
    .player-cell {
      background: #634e70;
      border-color: #f0d090;
      box-shadow: 0 0 12px #ffcc80;
    }
    .direction-pad {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      margin-top: 8px;
    }
    .dir-row {
      display: flex;
      gap: 20px;
    }
    .dir-btn {
      background: #3a2848;
      border: 2px solid #8a6c9c;
      color: #ffe8d0;
      font-size: 1.8rem;
      width: 50px;
      height: 50px;
      border-radius: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.15s;
      box-shadow: 0 3px 6px black;
      user-select: none;
    }
    .dir-btn:active {
      background: #5a4270;
      transform: scale(0.9);
    }
    .status-text {
      font-weight: 600;
      color: #ffe0c0;
      text-shadow: 0 0 6px #a060d0;
    }
    @media (max-width: 500px) {
      #header h1 { font-size: 1.4rem; }
      .map-cell { font-size: 1.2rem; }
    }
  </style>
</head>
<body>
<div id="game-container">
  <div class="top-ornament"></div>
  <div id="header">
    <h1>🐉 轉生龍蛋 · 暗影進化</h1>
    <div class="subtitle">半開放世界探索</div>
  </div>
  <div id="main-view"></div>
  <div id="control-area" style="padding:8px 16px 12px; background:rgba(0,0,0,0.5); border-top:1px solid #4a3a55;"></div>
</div>

<script>
  (function() {
    // ---------- 遊戲狀態 ----------
    const state = {
      player: null,
      currentEnemy: null,
      log: [],
      godVoice: "神之聲：你是一顆龍蛋，開始移動探索世界吧...",
      battleActive: false,
      currentScene: 'map', // map, battle, evolution, status, goals
      playerPos: { x: 3, y: 3 }, // 8x8地圖
      map: [], // 地圖地形
    };

    // 進化樹 (保留完整)
    const EVOLUTION_TREE = {
      'dragon_egg': { name:'龍蛋', icon:'🥚', grade:'F', maxLv:10, hp:40,mp:20,atk:6,def:10,matk:5,mdef:8,spd:4, skills:['roll'], evolutions:['whelp','draket','hatchling'] },
      'whelp': { name:'幼龍', icon:'🐉', grade:'D', maxLv:20, hp:110,mp:45,atk:24,def:22,matk:18,mdef:20,spd:12, skills:['roll','flame_breath','dragon_scales'], evolutions:['plague_whelp','rainbow_whelp','rock_whelp'] },
      'draket': { name:'小龍', icon:'🐲', grade:'D', maxLv:20, hp:90,mp:55,atk:30,def:14,matk:25,mdef:15,spd:16, skills:['roll','fireball','dragon_rage'], evolutions:['flame_draket','thunder_draket'] },
      'hatchling': { name:'雛龍', icon:'🐊', grade:'D', maxLv:20, hp:100,mp:50,atk:22,def:18,matk:20,mdef:22,spd:20, skills:['roll','wind_cutter','shadow_step'], evolutions:['wind_hatchling','shadow_hatchling'] },
      'plague_whelp':{ name:'厄病幼龍',icon:'☠️',grade:'C',maxLv:35,hp:200,mp:70,atk:42,def:35,matk:38,mdef:30,spd:18,skills:['toxic_breath'],evolutions:['calamity_drake','venom_drake']},
      'rainbow_whelp':{ name:'小虹龍',icon:'🌈',grade:'C',maxLv:35,hp:180,mp:80,atk:36,def:32,matk:50,mdef:45,spd:20,skills:['holy_light'],evolutions:['sacred_drake','sky_drake']},
      'rock_whelp':{ name:'岩石幼龍',icon:'🪨',grade:'C',maxLv:35,hp:260,mp:50,atk:38,def:55,matk:25,mdef:40,spd:10,skills:['stone_skin'],evolutions:['earth_drake','steel_drake']},
      'flame_draket':{ name:'炎龍幼體',icon:'🔥',grade:'C',maxLv:35,hp:160,mp:70,atk:52,def:22,matk:45,mdef:25,spd:22,skills:['inferno'],evolutions:['blast_drake','magma_drake']},
      'thunder_draket':{ name:'雷龍幼體',icon:'⚡',grade:'C',maxLv:35,hp:170,mp:75,atk:48,def:24,matk:52,mdef:28,spd:26,skills:['lightning_strike'],evolutions:['storm_drake','volt_drake']},
      'wind_hatchling':{ name:'風龍幼體',icon:'🌪️',grade:'C',maxLv:35,hp:155,mp:65,atk:42,def:26,matk:44,mdef:30,spd:32,skills:['gale_slash'],evolutions:['tempest_drake','sonic_drake']},
      'shadow_hatchling':{ name:'暗龍幼體',icon:'🌑',grade:'C',maxLv:35,hp:175,mp:68,atk:46,def:28,matk:48,mdef:32,spd:25,skills:['dark_claw'],evolutions:['abyss_drake','phantom_drake']},
      'calamity_drake':{ name:'災厄龍',icon:'💀',grade:'B',maxLv:55,hp:350,mp:110,atk:68,def:52,matk:62,mdef:48,spd:28,skills:['death_breath'],evolutions:['final_abyss','chaos_dragon']},
      'venom_drake':{ name:'毒龍',icon:'🧪',grade:'B',maxLv:55,hp:310,mp:100,atk:64,def:48,matk:70,mdef:55,spd:30,skills:['venom_storm'],evolutions:['plague_ancient']},
      'sacred_drake':{ name:'聖光龍',icon:'✨',grade:'B',maxLv:55,hp:330,mp:130,atk:58,def:50,matk:80,mdef:75,spd:26,skills:['divine_judgment'],evolutions:['light_king']},
      'sky_drake':{ name:'天翼龍',icon:'🕊️',grade:'B',maxLv:55,hp:290,mp:120,atk:62,def:45,matk:72,mdef:65,spd:38,skills:['sky_dive'],evolutions:['sky_lord']},
      'earth_drake':{ name:'地龍',icon:'⛰️',grade:'B',maxLv:55,hp:420,mp:80,atk:66,def:80,matk:45,mdef:60,spd:18,skills:['titan_smash'],evolutions:['earth_mother']},
      'steel_drake':{ name:'鋼龍',icon:'🛡️',grade:'B',maxLv:55,hp:380,mp:90,atk:70,def:75,matk:50,mdef:70,spd:20,skills:['steel_rend'],evolutions:['immortal_steel']},
      'blast_drake':{ name:'爆炎龍',icon:'💥',grade:'B',maxLv:55,hp:300,mp:110,atk:82,def:40,matk:68,mdef:45,spd:32,skills:['explosion'],evolutions:['inferno_king']},
      'magma_drake':{ name:'岩漿龍',icon:'🌋',grade:'B',maxLv:55,hp:340,mp:100,atk:76,def:55,matk:64,mdef:50,spd:24,skills:['lava_flow'],evolutions:['core_dragon']},
      'storm_drake':{ name:'風暴龍',icon:'⛈️',grade:'B',maxLv:55,hp:280,mp:120,atk:60,def:38,matk:78,mdef:48,spd:42,skills:['thunderstorm'],evolutions:['hurricane_god']},
      'sonic_drake':{ name:'音速龍',icon:'💨',grade:'B',maxLv:55,hp:270,mp:115,atk:65,def:36,matk:70,mdef:44,spd:48,skills:['sonic_boom'],evolutions:['time_dragon']},
      'abyss_drake':{ name:'暗黑龍',icon:'🖤',grade:'B',maxLv:55,hp:360,mp:105,atk:72,def:48,matk:76,mdef:52,spd:30,skills:['abyss_gaze'],evolutions:['void_lord']},
      'phantom_drake':{ name:'影龍',icon:'👻',grade:'B',maxLv:55,hp:310,mp:110,atk:68,def:42,matk:80,mdef:58,spd:36,skills:['phantom_dance'],evolutions:['nothingness']},
      'final_abyss':{ name:'終焉魔龍',icon:'👿',grade:'S',maxLv:80,hp:600,mp:180,atk:105,def:75,matk:95,mdef:70,spd:40 },
      'chaos_dragon':{ name:'混沌龍',icon:'🌀',grade:'S',maxLv:80,hp:550,mp:200,atk:100,def:70,matk:110,mdef:80,spd:38 },
      'plague_ancient':{ name:'瘟疫古龍',icon:'☣️',grade:'S',maxLv:80,hp:520,mp:170,atk:98,def:72,matk:108,mdef:82,spd:42 },
      'light_king':{ name:'光之龍王',icon:'👑',grade:'S',maxLv:80,hp:580,mp:220,atk:92,def:80,matk:120,mdef:110,spd:36 },
      'sky_lord':{ name:'天空霸主',icon:'🦅',grade:'S',maxLv:80,hp:500,mp:200,atk:96,def:68,matk:105,mdef:90,spd:55 },
      'earth_mother':{ name:'大地之母',icon:'🌍',grade:'S',maxLv:80,hp:700,mp:150,atk:88,def:120,matk:70,mdef:95,spd:22 },
      'immortal_steel':{ name:'不滅鋼龍',icon:'⚙️',grade:'S',maxLv:80,hp:650,mp:160,atk:102,def:110,matk:75,mdef:100,spd:26 },
      'inferno_king':{ name:'焚世炎龍',icon:'🔥',grade:'S',maxLv:80,hp:540,mp:190,atk:115,def:62,matk:98,mdef:68,spd:44 },
      'core_dragon':{ name:'地核巨龍',icon:'🌡️',grade:'S',maxLv:80,hp:620,mp:170,atk:108,def:85,matk:90,mdef:75,spd:30 },
      'hurricane_god':{ name:'颶風神龍',icon:'🌬️',grade:'S',maxLv:80,hp:490,mp:210,atk:90,def:58,matk:115,mdef:72,spd:60 },
      'time_dragon':{ name:'時空龍',icon:'⌛',grade:'S',maxLv:80,hp:510,mp:230,atk:95,def:60,matk:118,mdef:78,spd:58 },
      'void_lord':{ name:'虛無龍',icon:'🕳️',grade:'S',maxLv:80,hp:570,mp:195,atk:104,def:72,matk:112,mdef:80,spd:46 },
      'nothingness':{ name:'虛無',icon:'⚫',grade:'S',maxLv:80,hp:530,mp:205,atk:100,def:66,matk:120,mdef:88,spd:52 }
    };

    const SKILLS = {
      roll:{name:'滾動',mp:4,power:1.2,attr:'phys'},
      flame_breath:{name:'火焰吐息',mp:10,power:1.8,attr:'mag'},
      dragon_scales:{name:'龍鱗',type:'trait',desc:'DEF+15%'},
      fireball:{name:'火球術',mp:12,power:2.0,attr:'mag'},
      dragon_rage:{name:'龍之怒',mp:15,power:2.2,attr:'phys'},
      toxic_breath:{name:'毒息',mp:14,power:1.7,attr:'mag'},
      holy_light:{name:'聖光',mp:16,power:2.1,attr:'mag'},
      earthquake:{name:'地震',mp:18,power:2.0,attr:'phys'},
      inferno:{name:'地獄火',mp:20,power:2.4,attr:'mag'},
      lightning_strike:{name:'雷擊',mp:18,power:2.3,attr:'mag'},
      gale_slash:{name:'風刃',mp:12,power:1.9,attr:'phys'},
      dark_claw:{name:'暗爪',mp:14,power:2.0,attr:'phys'},
    };

    function initPlayer() {
      state.player = {
        formId: 'dragon_egg', level:1, exp:0, gold:100,
        hp:40, maxHp:40, mp:20, maxMp:20,
        baseAtk:6, baseDef:10, baseMatk:5, baseMdef:8, baseSpd:4,
        titles:[], equipment:{}, inventory:[], potions:{hp:3, mp:2},
        goalProgress:{kill:0}
      };
      applyFormStats();
      state.player.hp = state.player.maxHp;
      state.player.mp = state.player.maxMp;
    }

    function applyFormStats() {
      const f = EVOLUTION_TREE[state.player.formId];
      if(!f) return;
      state.player.maxHp=f.hp; state.player.maxMp=f.mp;
      state.player.baseAtk=f.atk; state.player.baseDef=f.def;
      state.player.baseMatk=f.matk; state.player.baseMdef=f.mdef;
      state.player.baseSpd=f.spd;
    }

    function getStats() {
      let p=state.player;
      return {atk:p.baseAtk,def:p.baseDef,matk:p.baseMatk,mdef:p.baseMdef,spd:p.baseSpd,maxHp:p.maxHp,maxMp:p.maxMp};
    }

    // 地圖生成
    function generateMap() {
      const terrains = ['🌳','🌲','🌿','🪨','⛰️','🌋','🏰','🌑'];
      state.map = Array(8).fill().map(()=>Array(8).fill().map(()=>terrains[Math.floor(Math.random()*terrains.length)]));
      state.map[3][3] = '🏡'; // 起始點
    }

    // 移動處理
    function movePlayer(dx, dy) {
      if(state.battleActive) return;
      let nx = state.playerPos.x + dx;
      let ny = state.playerPos.y + dy;
      if(nx<0||nx>7||ny<0||ny>7) return;
      state.playerPos.x = nx;
      state.playerPos.y = ny;
      // 隨機遇敵
      if(Math.random() < 0.25) {
        startRandomEncounter();
      } else {
        setGodVoice(`你移動到了 (${nx},${ny})`);
        renderMap();
      }
    }

    function startRandomEncounter() {
      const monsters = [
        {name:'哥布林',icon:'👹',hp:35,atk:10,def:4,exp:25,gold:15},
        {name:'巨狼',icon:'🐺',hp:55,atk:15,def:6,exp:40,gold:25},
        {name:'石傀儡',icon:'🗿',hp:100,atk:22,def:15,exp:80,gold:50},
        {name:'暗影蝙蝠',icon:'🦇',hp:70,atk:18,def:8,exp:60,gold:35}
      ];
      const enemy = {...monsters[Math.floor(Math.random()*monsters.length)], maxHp:0};
      enemy.maxHp = enemy.hp;
      state.currentEnemy = enemy;
      state.battleActive = true;
      state.currentScene = 'battle';
      setGodVoice(`⚔️ ${enemy.name} 出現了！`);
      renderBattle();
    }

    function playerAttack() {
      const dmg = Math.max(1, getStats().atk - (state.currentEnemy.def||0) + Math.floor(Math.random()*8));
      state.currentEnemy.hp -= dmg;
      setGodVoice(`造成 ${dmg} 傷害`);
      checkBattleEnd();
    }
    function playerSkill(skillId) {
      const skill = SKILLS[skillId];
      if(!skill || state.player.mp<skill.mp) return;
      state.player.mp -= skill.mp;
      const dmg = Math.max(1, Math.floor(getStats().atk*skill.power) - (state.currentEnemy.def||0));
      state.currentEnemy.hp -= dmg;
      setGodVoice(`✨ ${skill.name}！ ${dmg} 傷害`);
      checkBattleEnd();
    }
    function usePotion() {
      if(state.player.potions.hp>0 && state.player.hp<state.player.maxHp){
        state.player.hp = Math.min(state.player.maxHp, state.player.hp+40);
        state.player.potions.hp--;
        setGodVoice('使用藥水 +40HP');
      }
      enemyTurn();
    }
    function enemyTurn() {
      if(!state.currentEnemy||state.currentEnemy.hp<=0) return;
      const dmg = Math.max(1, (state.currentEnemy.atk||10) - getStats().def);
      state.player.hp -= dmg;
      setGodVoice(`${state.currentEnemy.name} 反擊 ${dmg} 傷害`);
      if(state.player.hp<=0) { state.player.hp=1; state.battleActive=false; state.currentScene='map'; setGodVoice('被打倒了...'); }
    }
    function checkBattleEnd() {
      if(state.currentEnemy.hp<=0){
        state.player.exp += state.currentEnemy.exp;
        state.player.gold += state.currentEnemy.gold;
        state.player.goalProgress.kill++;
        setGodVoice(`勝利！+${state.currentEnemy.exp}EXP`);
        checkLevelUp();
        state.battleActive=false;
        state.currentScene='map';
        renderMap();
      } else { enemyTurn(); renderBattle(); }
    }
    function checkLevelUp() {
      const form = EVOLUTION_TREE[state.player.formId];
      const need = form.maxLv*10;
      while(state.player.exp>=need && state.player.level<form.maxLv){
        state.player.exp-=need; state.player.level++;
        state.player.maxHp+=8; state.player.maxMp+=4;
        state.player.baseAtk+=3; state.player.baseDef+=2;
        state.player.hp=state.player.maxHp; state.player.mp=state.player.maxMp;
        setGodVoice(`🎉 Lv.${state.player.level}!`);
      }
    }

    function evolveTo(id) {
      state.player.formId=id; state.player.level=1; state.player.exp=0;
      applyFormStats(); state.player.hp=state.player.maxHp; state.player.mp=state.player.maxMp;
      setGodVoice(`進化！${EVOLUTION_TREE[id].name}`);
      state.currentScene='map'; renderMap();
    }

    // 渲染地圖
    function renderMap() {
      let html = `<div class="panel"><h3>🗺️ 世界地圖</h3><div class="map-grid">`;
      for(let y=0; y<8; y++){
        for(let x=0; x<8; x++){
          const isPlayer = (x===state.playerPos.x && y===state.playerPos.y);
          html += `<div class="map-cell ${isPlayer?'player-cell':''}">${isPlayer?EVOLUTION_TREE[state.player.formId].icon:state.map[y][x]}</div>`;
        }
      }
      html += `</div><p class="status-text">${EVOLUTION_TREE[state.player.formId].name} Lv.${state.player.level} | ❤️${state.player.hp}/${state.player.maxHp}</p>`;
      html += `<div class="god-voice">${state.godVoice}</div>`;
      html += `<div class="flex-row"><button class="btn small" id="statusBtn">📋狀態</button><button class="btn small" id="goalsBtn">🎯目標</button>`;
      if(state.player.level >= EVOLUTION_TREE[state.player.formId].maxLv && EVOLUTION_TREE[state.player.formId].evolutions)
        html += `<button class="btn small primary" id="evoBtn">✨進化</button>`;
      html += `</div></div>`;
      document.getElementById('main-view').innerHTML = html;
      document.getElementById('statusBtn')?.addEventListener('click',()=>{state.currentScene='status';renderStatus();});
      document.getElementById('goalsBtn')?.addEventListener('click',()=>{state.currentScene='goals';renderGoals();});
      document.getElementById('evoBtn')?.addEventListener('click',()=>{state.currentScene='evolution';renderEvolution();});
    }

    function renderBattle() {
      const e=state.currentEnemy; const p=state.player;
      document.getElementById('main-view').innerHTML = `
        <div class="panel">
          <div style="display:flex;align-items:center;gap:10px;"><span style="font-size:2.5rem;">${e.icon}</span><b>${e.name}</b> ❤️${e.hp}/${e.maxHp}</div>
          <p>${EVOLUTION_TREE[p.formId].icon} Lv.${p.level} ❤️${p.hp}/${p.maxHp} 💧${p.mp}/${p.maxMp}</p>
          <div class="flex-row">
            <button class="btn" id="atkBtn">⚔️攻擊</button>
            <button class="btn" id="skillBtn">🔥火焰吐息</button>
            <button class="btn" id="potionBtn">🧪藥水</button>
          </div>
          <div class="god-voice">${state.godVoice}</div>
        </div>`;
      document.getElementById('atkBtn').addEventListener('click',playerAttack);
      document.getElementById('skillBtn').addEventListener('click',()=>playerSkill('flame_breath'));
      document.getElementById('potionBtn').addEventListener('click',usePotion);
    }

    function renderEvolution() {
      const form = EVOLUTION_TREE[state.player.formId];
      const opts = form.evolutions||[];
      let btns = opts.map(id=>`<button class="btn primary" data-evo="${id}">${EVOLUTION_TREE[id].icon} ${EVOLUTION_TREE[id].name} (${EVOLUTION_TREE[id].grade})</button>`).join('');
      document.getElementById('main-view').innerHTML = `<div class="panel"><h3>選擇進化</h3><div class="flex-row">${btns}</div></div>`;
      document.querySelectorAll('[data-evo]').forEach(b=>b.addEventListener('click',(e)=>evolveTo(e.target.dataset.evo)));
    }

    function renderStatus() {
      const p=state.player; const f=EVOLUTION_TREE[p.formId];
      document.getElementById('main-view').innerHTML = `<div class="panel"><h3>狀態</h3><p>${f.icon} ${f.name} (${f.grade}) Lv.${p.level}</p><p>❤️${p.hp}/${p.maxHp} 💧${p.mp}/${p.maxMp}</p><button class="btn" id="backMap">返回地圖</button></div>`;
      document.getElementById('backMap').addEventListener('click',()=>{state.currentScene='map';renderMap();});
    }

    function renderGoals() {
      document.getElementById('main-view').innerHTML = `<div class="panel"><h3>目標</h3><p>擊殺怪物: ${state.player.goalProgress.kill}/5</p><button class="btn" id="backMap2">返回地圖</button></div>`;
      document.getElementById('backMap2').addEventListener('click',()=>{state.currentScene='map';renderMap();});
    }

    function setGodVoice(msg) { state.godVoice = `神之聲：${msg}`; }

    // 方向鍵控制
    function setupControls() {
      document.getElementById('control-area').innerHTML = `
        <div class="direction-pad">
          <div class="dir-row"><div class="dir-btn" id="upBtn">↑</div></div>
          <div class="dir-row">
            <div class="dir-btn" id="leftBtn">←</div>
            <div class="dir-btn" id="downBtn">↓</div>
            <div class="dir-btn" id="rightBtn">→</div>
          </div>
        </div>`;
      document.getElementById('upBtn').addEventListener('click',()=>movePlayer(0,-1));
      document.getElementById('downBtn').addEventListener('click',()=>movePlayer(0,1));
      document.getElementById('leftBtn').addEventListener('click',()=>movePlayer(-1,0));
      document.getElementById('rightBtn').addEventListener('click',()=>movePlayer(1,0));
    }

    // 啟動
    function start() {
      initPlayer();
      generateMap();
      state.currentScene='map';
      setupControls();
      renderMap();
    }
    start();
  })();
</script>
</body>
</html>
