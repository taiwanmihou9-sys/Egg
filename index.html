function dropLootFromPool(pool) {
    if(!pool || !pool.length) return;
    for(let entry of pool) {
        if(Math.random() < entry.chance) {
            addToInv(entry.id);
            setVoice(`獲得 ${LOOT_ITEMS[entry.id].name} [${LOOT_RARITY[LOOT_ITEMS[entry.id].rarity]}]`);
            break;
        }
    }
}

function checkEnd() {
    if(state.enemy.hp <= 0) {
        state.enemy.hp = 0;
        let gold = Math.floor(Math.random()*(state.enemy.goldMax-state.enemy.goldMin+1))+state.enemy.goldMin;
        if(state.race==='human') gold = Math.floor(gold*1.30);
        state.player.gold += gold;
        // 掉落區分
        if(state.enemy.isBoss) {
            dropLootFromPool(state.enemy.loot);
            // 額外裝備掉落
            if(Math.random()<0.5) {
                const grades = [['C','B'],['B','A'],['A','S'],['S','SS'],['S','SS'],['SS']][['forest','cave','castle','dragon_lair','sea','heaven'].indexOf(state.zone)];
                addEquip(['weapon','armor','accessory'][Math.floor(Math.random()*3)], grades[Math.floor(Math.random()*grades.length)]);
            }
            state.bossDefeated.add(state.zone);
            state.bossCooldown = 12;
        } else {
            dropLootFromPool(state.enemy.loot);
            if(Math.random()<0.2) addEquip(['weapon','armor','accessory'][Math.floor(Math.random()*3)],'D');
        }
        updateConditionProgress();
        levelUp();
        state.battle = false; state.dead = false; state.scene='map';
        setTimeout(()=>renderMap(),500);
    } else enemyTurn();
}

function renderCraft() {
    const invCounts = {}; state.inv.forEach(i=>{ const r=LOOT_ITEMS[i.id].rarity; invCounts[r]=(invCounts[r]||0)+i.qty; });
    let html = '<div class="panel"><h3>🔨 鍛造 (材料分級)</h3><p>材料統計: ';
    for(let r in LOOT_RARITY) html += `${LOOT_RARITY[r]}:${invCounts[r]||0} `;
    html += `| 💰${state.player.gold}</p><div class="flex-row">`;
    for(let grade in CRAFT_RECIPES) {
        const rec = CRAFT_RECIPES[grade];
        let canCraft = true, missing=[];
        for(let r in rec.needs) { if((invCounts[r]||0) < rec.needs[r]) { canCraft=false; missing.push(`${LOOT_RARITY[r]}缺${rec.needs[r]-(invCounts[r]||0)}`); } }
        if(state.player.gold < rec.cost) { canCraft=false; missing.push('金幣不足'); }
        html += `<button class="btn small craftGrade" data-grade="${grade}" ${!canCraft?'disabled':''}>${grade}級 ${rec.cost}G ${missing.length?'('+missing.join(',')+')':''}</button>`;
    }
    html += '</div><button class="btn" id="closeCraft">返回</button></div>';
    document.getElementById('game-view').innerHTML = html;
    document.querySelectorAll('.craftGrade').forEach(b=>b.addEventListener('click',e=>{
        const grade = e.target.dataset.grade;
        const rec = CRAFT_RECIPES[grade];
        if(state.player.gold < rec.cost) return;
        for(let r in rec.needs) {
            let need = rec.needs[r];
            for(let i=state.inv.length-1;i>=0 && need>0;i--) {
                if(LOOT_ITEMS[state.inv[i].id].rarity === r) {
                    let take = Math.min(state.inv[i].qty, need);
                    state.inv[i].qty -= take; need -= take;
                    if(state.inv[i].qty<=0) state.inv.splice(i,1);
                }
            }
            if(need>0) return;
        }
        state.player.gold -= rec.cost;
        const type = ['weapon','armor','accessory'][Math.floor(Math.random()*3)];
        addEquip(type, grade);
        renderCraft();
    }));
    document.getElementById('closeCraft').addEventListener('click',()=>{state.scene='map';renderMap();});
}
