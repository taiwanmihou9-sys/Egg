<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0, viewport-fit=cover">
    <title>иҪүз”ҹйҫҚиӣӢпҪһеӣӣеҹҹжҺўзҙўпҪһ 2DжІүжөёзүҲ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0610;
            font-family: 'Noto Serif TC', 'Microsoft JhengHei', 'PingFang TC', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at 30% 30%, #2a1a35 0%, #03010a 90%);
            padding: 8px;
            touch-action: manipulation;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        #game-container {
            width: 100%;
            max-width: 960px;
            background: rgba(18, 10, 25, 0.95);
            border: 2px solid #7a5e8a;
            border-radius: 28px;
            box-shadow: 0 0 55px rgba(150, 100, 210, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            height: 96vh;
            max-height: 880px;
            position: relative;
        }
        .top-ornament {
            height: 4px;
            background: linear-gradient(90deg, transparent, #d9b3ff, #ffddaa, #d9b3ff, transparent);
            flex-shrink: 0;
        }
        #header {
            padding: 6px 14px;
            text-align: center;
            border-bottom: 1px solid #5a4670;
            background: rgba(25, 12, 35, 0.9);
            flex-shrink: 0;
        }
        #header h1 {
            font-size: clamp(1.1rem, 2.5vw, 1.5rem);
            color: #ffe8b0;
            text-shadow: 0 0 15px #b080e0;
        }
        .subtitle {
            font-size: 0.6rem;
            color: #c0a0d0;
            letter-spacing: 2px;
        }
        #status-bar {
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-wrap: wrap;
            padding: 7px 12px;
            background: rgba(0, 0, 0, 0.75);
            border-bottom: 1px solid #4a3a55;
            font-size: 0.75rem;
            color: #e0d0f0;
            gap: 4px;
            flex-shrink: 0;
            min-height: 36px;
        }
        #main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            min-height: 0;
        }
        #game-view {
            flex: 1;
            overflow-y: auto;
            padding: 8px 10px;
            position: relative;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }
        .panel {
            background: rgba(12, 6, 18, 0.9);
            border: 1px solid #6a4e7a;
            border-radius: 16px;
            padding: 10px 12px;
            color: #f4e8ff;
            margin-bottom: 6px;
        }
        .map-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 2px;
            margin: 6px 0;
            background: #110a18;
            border-radius: 8px;
            padding: 3px;
            touch-action: manipulation;
        }
        .map-cell {
            aspect-ratio: 1;
            background: #1b1228;
            border: 1px solid #3a2a48;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(0.7rem, 1.6vw, 1rem);
            color: #ccc;
            transition: 0.15s;
            cursor: pointer;
            min-width: 0;
            overflow: hidden;
        }
        .player-cell {
            background: #6b5078;
            border-color: #f8d080;
            box-shadow: 0 0 10px #ffbb40;
            font-size: 1.2rem;
            z-index: 2;
            animation: playerGlow 1.2s infinite alternate;
        }
        @keyframes playerGlow {
            0% {
                box-shadow: 0 0 8px #ffbb40;
            }
            100% {
                box-shadow: 0 0 18px #ffdd70;
            }
        }
        .boss-cell {
            background: #5a2040;
            border-color: #ff6060;
            box-shadow: 0 0 15px #ff4040;
            animation: bossPulse 1.5s infinite;
        }
        .boss-disabled {
            background: #2a1a28;
            border-color: #666;
        }
        .chest-cell {
            background: #4a3a20;
            border-color: #ffd700;
        }
        .merchant-cell {
            background: #2a4a3a;
            border-color: #80e0a0;
        }
        .portal-cell {
            background: #2a2a4a;
            border-color: #8080ff;
        }
        @keyframes bossPulse {
            0% {
                box-shadow: 0 0 10px #ff4040;
            }
            50% {
                box-shadow: 0 0 28px #ff8080;
            }
            100% {
                box-shadow: 0 0 10px #ff4040;
            }
        }
        #control-area {
            padding: 6px 8px;
            background: rgba(0, 0, 0, 0.75);
            border-top: 1px solid #5a4070;
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .direction-pad {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 2px 0;
        }
        .dir-row {
            display: flex;
            gap: 28px;
        }
        .dir-btn {
            background: #372648;
            border: 2px solid #8a6ea0;
            color: #ffe0c0;
            font-size: clamp(1.4rem, 3vw, 2rem);
            width: clamp(44px, 10vw, 60px);
            height: clamp(44px, 10vw, 60px);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.1s;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.5);
            font-weight: bold;
        }
        .dir-btn:active {
            background: #5e4275;
            transform: scale(0.88);
            border-color: #ffd080;
            box-shadow: 0 0 15px rgba(200, 150, 255, 0.6);
        }
        .btn {
            background: #2f1f3a;
            border: 1px solid #8a6a9a;
            color: #f0e0ff;
            padding: 7px 14px;
            border-radius: 22px;
            font-weight: 600;
            font-size: 0.75rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: linear-gradient(180deg, #3e2850 0%, #21152e 100%);
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.5);
            transition: 0.2s;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            white-space: nowrap;
        }
        .btn:hover {
            background: #553b6a;
            border-color: #d0b0e0;
            color: #fff;
        }
        .btn:active {
            transform: scale(0.93);
            box-shadow: 0 0 12px rgba(180, 140, 220, 0.5);
        }
        .btn.primary {
            background: #5e3e62;
            border-color: #d8b0c0;
        }
        .btn.small {
            padding: 4px 10px;
            font-size: 0.68rem;
            border-radius: 16px;
        }
        .btn:disabled {
            opacity: 0.4;
            pointer-events: none;
        }
        .god-voice {
            background: #1e1028;
            border-left: 4px solid #e6b422;
            padding: 7px 10px;
            border-radius: 10px;
            color: #ffe8a0;
            font-style: italic;
            margin: 5px 0;
            font-size: 0.78rem;
        }
        .race-card {
            background: #1e1230;
            border: 2px solid #553b60;
            border-radius: 18px;
            padding: 14px;
            text-align: center;
            cursor: pointer;
            width: 145px;
            transition: 0.2s;
            touch-action: manipulation;
        }
        .race-card:hover {
            border-color: #e0b0f0;
            transform: scale(1.04);
        }
        .race-card:active {
            transform: scale(0.94);
            border-color: #ffd080;
        }
        .evolution-card {
            background: #1e1230;
            border: 2px solid #553b60;
            border-radius: 16px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            width: 120px;
            transition: 0.2s;
            touch-action: manipulation;
        }
        .evolution-card:hover {
            border-color: #e0b0f0;
            transform: scale(1.04);
        }
        .evolution-card:active {
            transform: scale(0.92);
            border-color: #ffd080;
        }
        .flex-row {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(135px, 1fr));
            gap: 8px;
            margin: 8px 0;
        }
        .shop-card {
            background: #1e1230;
            border: 1px solid #4a3a60;
            border-radius: 12px;
            padding: 8px;
            text-align: center;
            font-size: 0.72rem;
        }
        .shop-card h4 {
            color: #e0b0f0;
            margin: 4px 0;
            font-size: 0.78rem;
        }
        .price {
            color: #ffd700;
            font-weight: bold;
        }
        .item-row {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 4px 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            margin: 3px 0;
            font-size: 0.7rem;
            flex-wrap: wrap;
        }
        .shake {
            animation: shake 0.4s ease;
        }
        @keyframes shake {
            0%,
            100% {
                transform: translateX(0);
            }
            20% {
                transform: translateX(-8px);
            }
            40% {
                transform: translateX(8px);
            }
            60% {
                transform: translateX(-5px);
            }
            80% {
                transform: translateX(5px);
            }
        }
        .pop-damage {
            animation: pop 0.6s ease-out;
            position: absolute;
            color: #ff4d4d;
            font-weight: bold;
            font-size: 1.2rem;
            pointer-events: none;
            z-index: 10;
            top: 5px;
            right: 10px;
        }
        @keyframes pop {
            0% {
                opacity: 1;
                transform: translateY(0);
            }
            100% {
                opacity: 0;
                transform: translateY(-30px);
            }
        }
        .death-effect {
            animation: deathPop 0.5s ease-out;
        }
        @keyframes deathPop {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.3);
                opacity: 0.7;
            }
            100% {
                transform: scale(0);
                opacity: 0;
            }
        }
        .death-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 0, 0, 0.4);
            z-index: 99;
            animation: deathFlash 1s ease-out forwards;
            pointer-events: none;
        }
        @keyframes deathFlash {
            0% {
                opacity: 0.8;
            }
            50% {
                opacity: 0.3;
            }
            100% {
                opacity: 0;
            }
        }
        .boss-bg {
            background: radial-gradient(circle at center, #4a1020, #0a0610) !important;
            border: 2px solid #ff4040 !important;
            animation: bossBgPulse 2s infinite;
        }
        @keyframes bossBgPulse {
            0% {
                border-color: #ff4040;
                box-shadow: 0 0 15px #ff2020;
            }
            50% {
                border-color: #ff8080;
                box-shadow: 0 0 30px #ff5050;
            }
            100% {
                border-color: #ff4040;
                box-shadow: 0 0 15px #ff2020;
            }
        }
        .hp-bar {
            width: 100%;
            height: 16px;
            background: #2a1028;
            border-radius: 8px;
            margin-top: 3px;
            overflow: hidden;
            border: 1px solid #aa5588;
        }
        .hp-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff4466, #ff8866);
            border-radius: 8px;
            transition: width 0.3s;
        }
        /* жүӢж©ҹйҒ©й…Қ */
        @media (max-width: 600px) {
            #game-container {
                height: 98vh;
                max-height: none;
                border-radius: 16px;
            }
            #header h1 {
                font-size: 1rem;
            }
            .subtitle {
                font-size: 0.5rem;
                letter-spacing: 1px;
            }
            #game-view {
                padding: 4px 6px;
            }
            .panel {
                padding: 7px 9px;
                border-radius: 12px;
            }
            .map-grid {
                gap: 1px;
                padding: 2px;
            }
            .map-cell {
                border-radius: 2px;
                font-size: 0.6rem;
            }
            .dir-btn {
                width: 46px;
                height: 46px;
                border-radius: 12px;
                font-size: 1.3rem;
            }
            .dir-row {
                gap: 20px;
            }
            .btn {
                padding: 5px 10px;
                font-size: 0.68rem;
            }
            .btn.small {
                padding: 3px 8px;
                font-size: 0.6rem;
            }
            .race-card {
                width: 120px;
                padding: 10px;
            }
            .shop-grid {
                grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
                gap: 5px;
            }
        }
        @media (max-width: 380px) {
            .dir-btn {
                width: 38px;
                height: 38px;
                font-size: 1.1rem;
                border-radius: 10px;
            }
            .dir-row {
                gap: 14px;
            }
            .map-cell {
                font-size: 0.5rem;
            }
        }
    </style>
</head>

                equipInv: [],
                escapeCounter: 0,
                altarReturn: null,
                merchantBuyCount: 0,
            };

            function initPlayer(raceKey) {
                const race = RACES[raceKey];
                state.race = raceKey;
                state.player = {
                    form: Object.keys(EVOLUTION_TREE[raceKey])[0],
                    lv: 1,
                    exp: 0,
                    gold: 150,
                    hp: race.baseHP,
                    maxHp: race.baseHP,
                    mp: race.baseMP,
                    maxMp: race.baseMP,
                    atk: race.atk,
                    def: race.def,
                    matk: race.matk,
                    mdef: race.mdef,
                    spd: race.spd,
                    potions: { hp: 3, mp: 2, speed: 1, atk: 1, weak: 1 }
                };
                if (raceKey === 'dragon') {
                    state.player.maxHp = Math.floor(state.player.maxHp * 1.35);
                    state.player.maxMp = Math.floor(state.player.maxMp * 1.35);
                    state.player.hp = state.player.maxHp;
                    state.player.mp = state.player.maxMp;
                }
                applyForm();
                state.player.hp = state.player.maxHp;
                state.player.mp = state.player.maxMp;
                generateLevelCondition();
            }

            function generateLevelCondition() {
                state.levelCondition = { ...LEVEL_CONDITIONS[Math.floor(Math.random() * LEVEL_CONDITIONS.length)] };
                state.conditionProgress = 0;
                setVoice(`еҚҮзҙҡжўқд»¶пјҡ${state.levelCondition.desc}`);
            }

            function applyForm() {
                const f = EVOLUTION_TREE[state.race][state.player.form];
                if (!f) return;
                state.player.maxHp = f.hp;
                state.player.maxMp = f.mp;
                state.player.atk = f.atk;
                state.player.def = f.def;
                state.player.matk = f.matk;
                state.player.mdef = f.mdef;
                state.player.spd = f.spd;
            }

            function stats() {
                let p = state.player,
                    eq = { atk: 0, def: 0, spd: 0, matk: 0, mdef: 0, hp: 0, mp: 0 };
                Object.values(state.equipment).forEach(e => {
                    if (e) {
                        if (e.atk) eq.atk += e.atk;
                        if (e.def) eq.def += e.def;
                        if (e.spd) eq.spd += e.spd;
                        if (e.matk) eq.matk += e.matk;
                        if (e.mdef) eq.mdef += e.mdef;
                        if (e.hp) eq.hp += e.hp;
                        if (e.mp) eq.mp += e.mp;
                        if (e.all) { eq.atk += e.all;
                            eq.def += e.all;
                            eq.spd += e.all;
                            eq.matk += e.all;
                            eq.mdef += e.all; }
                    }
                });
                return {
                    atk: p.atk + state.buffs.atk + eq.atk,
                    def: p.def + state.buffs.def + eq.def,
                    spd: p.spd + state.buffs.spd + eq.spd,
                    matk: p.matk + eq.matk,
                    mdef: p.mdef + eq.mdef,
                    maxHp: p.maxHp + eq.hp,
                    maxMp: p.maxMp + eq.mp
                };
            }

            function genMaps() {
                for (let z of Object.keys(ZONES)) {
                    state.maps[z] = {
                        grid: Array(10).fill().map(() => Array(10).fill().map(() => ZONES[z].terrains[Math.floor(Math
                            .random() * 4)])),
                        special: {}
                    };
                    for (let i = 0; i < 3; i++) {
                        let sx = Math.floor(Math.random() * 10),
                            sy = Math.floor(Math.random() * 10);
                        if ((sx === BOSS_POS.x && sy === BOSS_POS.y) || (sx === START_POS.x && sy === START_POS
                            .y)) continue;
                        state.maps[z].special[`${sx},${sy}`] = ['chest', 'merchant', 'portal'][Math.floor(Math.random() *
                            3)];
                    }
                }
            }

            function move(dx, dy) {
                if (state.battle || state.dead) return;
                let nx = state.pos.x + dx,
                    ny = state.pos.y + dy;
                if (nx < 0 || nx >= 10 || ny < 0 || ny >= 10) {
                    const adj = { forest: { south: 'cave' }, cave: { north: 'forest', south: 'castle' }, castle: { north: 'cave',
                            south: 'dragon_lair' }, dragon_lair: { north: 'castle', south: 'sea' }, sea: { north: 'dragon_lair',
                            south: 'heaven' }, heaven: { north: 'sea' } };
                    const next = adj[state.zone]?.[dx < 0 ? 'west' : dx > 0 ? 'east' : dy < 0 ? 'north' : dy > 0 ?
                    'south' : null];
                    if (next) {
                        state.zone = next;
                        state.pos = { x: dx < 0 ? 9 : dx > 0 ? 0 : nx, y: dy < 0 ? 9 : dy > 0 ? 0 : ny };
                    } else return;
                } else { state.pos.x = nx;
                    state.pos.y = ny; }
                if (state.bossCooldown > 0) state.bossCooldown--;
                const key = `${state.pos.x},${state.pos.y}`;
                if (state.pos.x === BOSS_POS.x && state.pos.y === BOSS_POS.y) {
                    if (!state.bossDefeated.has(state.zone) || state.bossCooldown <= 0) startBoss();
                    else renderMap();
                } else if (state.maps[state.zone].special[key]) handleSpecial(state.maps[state.zone].special[key]);
                else if (Math.random() < 0.28) startBattle();
                else if (Math.random() < 0.18) triggerEvent();
                else renderMap();
            }

            function handleSpecial(type) {
                if (type === 'chest') {
                    state.player.gold += Math.floor(Math.random() * 60) + 40;
                    addEquip('weapon', 'D');
                    setVoice('рҹ“Ұ жү“й–ӢеҜ¶з®ұпјҒзҚІеҫ—йҮ‘е№ЈиҲҮиЈқеӮҷ');
                    delete state.maps[state.zone].special[`${state.pos.x},${state.pos.y}`];
                } else if (type === 'merchant') {
                    state.merchantBuyCount = 0;
                    setVoice('йҒҮеҲ°жөҒжөӘе•Ҷдәә(85жҠҳ)');
                    state.scene = 'merchantShop';
                    renderMerchantShop();
                    return;
                } else if (type === 'portal') {
                    state.altarReturn = { zone: state.zone, x: state.pos.x, y: state.pos.y };
                    state.scene = 'altar';
                    renderAltar();
                    return;
                }
                renderMap();
            }

            function startBattle() {
                const pool = MONSTERS[state.zone] || MONSTERS.forest;
                const m = pool[Math.floor(Math.random() * pool.length)];
                state.enemy = { ...m, maxHp: m.hp };
                state.battle = true;
                state.dead = false;
                state.scene = 'battle';
                state.buffs = { atk: 0, spd: 0, def: 0, shield: 0, weakDebuff: false };
                state.escapeCounter = 0;
                setVoice(`вҡ”пёҸ ${m.name} еҮәзҸҫдәҶпјҒ`);
                renderBattle();
            }

            function startBoss() {
                const boss = BOSSES[state.zone];
                state.enemy = { ...boss, maxHp: boss.hp, isBoss: true };
                state.battle = true;
                state.dead = false;
                state.scene = 'battle';
                state.buffs = { atk: 0, spd: 0, def: 0, shield: 0, weakDebuff: false };
                state.escapeCounter = 0;
                setVoice(`рҹ‘‘ Boss ${boss.name}пјҒ`);
                renderBattle();
            }

            function dmgCalc(atk, def, power = 1, atkEl, defEl, isP = false) {
                let base = Math.max(1, Math.floor(atk * power) - def);
                if (atkEl && defEl && atkEl !== 'none' && defEl !== 'none') {
                    if (ELEMENT_WEAKNESS[atkEl] === defEl) base = Math.floor(base * 1.3);
                    else if (ELEMENT_WEAKNESS[defEl] === atkEl) base = Math.floor(base * 0.7);
                }
                let res = Math.max(1, base + Math.floor(Math.random() * 8));
                if (isP && state.race === 'demon') res = Math.floor(res * 1.20);
                if (!isP && state.buffs.weakDebuff) res = Math.floor(res * 1.2);
                return res;
            }

            function showDamage(el, dmg, col = '#ff4d4d') {
                if (!el) return;
                const d = document.createElement('div');
                d.className = 'pop-damage';
                d.textContent = dmg;
                d.style.color = col;
                el.style.position = 'relative';
                el.appendChild(d);
                setTimeout(() => d.remove(), 600);
            }

            function playerAtk() {
                if (state.dead || !state.battle) return;
                const f = EVOLUTION_TREE[state.race][state.player.form];
                const dmg = dmgCalc(stats().atk, state.enemy.def, 1, f.element, state.enemy.el, true);
                state.enemy.hp -= dmg;
                setVoice(`йҖ жҲҗ ${dmg} еӮ·е®і`);
                shakeEl('enemy-card');
                showDamage(document.getElementById('enemy-card'), dmg);
                checkEnd();
            }

            function playerSkill(id) {
                if (state.dead || !state.battle) return;
                const sk = SKILLS[id];
                if (!sk || state.player.mp < sk.mp) return;
                if ((sk.attr === 'heal' || sk.heal) && state.race !== 'god') { setVoice('еҸӘжңүзҘһж—ҸеҸҜдҪҝз”ЁжІ»зҷ’пјҒ'); return; }
                state.player.mp -= sk.mp;
                if (sk.attr === 'heal' || sk.heal) {
                    const heal = sk.heal || 18;
                    state.player.hp = Math.min(state.player.maxHp, state.player.hp + heal);
                    setVoice(`вқӨпёҸ еӣһеҫ©${heal}HP`);
                    showDamage(document.getElementById('player-card'), heal, '#4dff4d');
                } else if (sk.attr === 'buff') setVoice('рҹӣЎпёҸ еўһзӣҠ');
                else {
                    const f = EVOLUTION_TREE[state.race][state.player.form];
                    const dmg = dmgCalc(stats().atk, state.enemy.def, sk.power || 1, sk.element || f.element, state.enemy
                        .el, true);
                    state.enemy.hp -= dmg;
                    setVoice(`вңЁ ${sk.name}пјҒ ${dmg} еӮ·е®і`);
                    shakeEl('enemy-card');
                    showDamage(document.getElementById('enemy-card'), dmg);
                }
                checkEnd();
            }

            function playerDodge() {
                if (state.dead || !state.battle || state.player.mp < 3) return;
                state.player.mp -= 3;
                if (Math.random() < 0.8) {
                    setVoice('рҹ’Ё й–ғйҒҝжҲҗеҠҹпјҒ');
                    state.escapeCounter++;
                    if (state.escapeCounter >= 3) setVoice('е·ІеҸҜйҖғи·‘');
                } else { setVoice('й–ғйҒҝеӨұж•—вҖҰ'); }
                checkEnd();
            }

            function tryRun() {
                if (state.dead || !state.battle) return;
                if (state.escapeCounter < 3) { setVoice(`йңҖзҙҜз©Қй–ғйҒҝ3ж¬Ў (${state.escapeCounter}/3)`); return; }
                setVoice('рҹҸғ йҖғи·‘жҲҗеҠҹпјҒ');
                state.battle = false;
                state.enemy = null;
                state.scene = 'map';
                renderMap();
            }

            function usePotion(type) {
                let p = state.player,
                    bonus = state.race === 'god' ? 1.5 : 1;
                if (type === 'hp') { p.hp = Math.min(p.maxHp, p.hp + Math.floor(30 * bonus));
                    p.potions.hp--; } else if (type === 'mp') { p.mp = Math.min(p.maxMp, p.mp + Math.floor(18 * bonus));
                    p.potions.mp--; } else if (type === 'speed') { state.buffs.spd += Math.floor(14 * bonus);
                    p.potions.speed--; } else if (type === 'atk') { state.buffs.atk += Math.floor(14 * bonus);
                    p.potions.atk--; } else if (type === 'weak' && state.enemy) { state.buffs.weakDebuff = true;
                    p.potions.weak--;
                    setVoice('ж•өдәәиҷӣејұпјҢеҸ—еӮ·+20%'); } else if (type === 'weak') setVoice('з„Ўж•өж–№');
                setVoice('и—Ҙж°ҙз”ҹж•Ҳ');
                renderBattle();
            }

            function enemyTurn() {
                if (!state.enemy || state.enemy.hp <= 0 || state.dead) return;
                let dmg = dmgCalc(state.enemy.atk, stats().def, 1, state.enemy.el, EVOLUTION_TREE[state.race][state.player
                    .form].element);
                state.player.hp -= dmg;
                setVoice(`${state.enemy.name} йҖ жҲҗ ${dmg} еӮ·е®і`);
                shakeEl('player-card');
                showDamage(document.getElementById('player-card'), dmg);
                if (state.player.hp <= 0) { playerDeath(); return; }
                renderBattle();
            }

            function playerDeath() {
                state.player.hp = 0;
                state.dead = true;
                state.battle = false;
                setVoice('иў«ж“ҠеҖ’вҖҰиҝ”еӣһиө·й»һ');
                const o = document.createElement('div');
                o.className = 'death-overlay';
                document.body.appendChild(o);
                setTimeout(() => o.remove(), 1000);
                setTimeout(() => {
                    if (state.race !== 'human') {
                        state.player.potions = { hp: 3, mp: 2, speed: 1, atk: 1, weak: 1 };
                        state.equipment = { weapon: null, armor: null, accessory: null };
                        state.equipInv = [];
                    }
                    state.player.hp = state.player.maxHp;
                    state.player.mp = state.player.maxMp;
                    state.dead = false;
                    state.zone = START_ZONE;
                    state.pos = { ...START_POS };
                    state.scene = 'map';
                    renderMap();
                }, 1500);
                renderBattle();
            }

            function addEquip(type, grade) {
                const pool = EQUIPMENT_POOL[type].filter(e => e.grade === grade);
                if (pool.length) {
                    const eq = { ...pool[Math.floor(Math.random() * pool.length)], type };
                    state.equipInv.push(eq);
                    setVoice(`зҚІеҫ—${eq.name}`);
                }
            }

            function dropLoot(lootPool) {
                if (!lootPool || !lootPool.length) return;
                const id = lootPool[Math.floor(Math.random() * lootPool.length)];
                addToInv(id);
                setVoice(`зҚІеҫ— ${LOOT_ITEMS[id].name}`);
            }

            function dropEquipment(isBoss) {
                if (isBoss) {
                    if (Math.random() < 0.5) {
                        const grades = [
                            ['C', 'B'],
                            ['B', 'A'],
                            ['A', 'S'],
                            ['S', 'SS'],
                            ['S', 'SS'],
                            ['SS']
                        ][['forest', 'cave', 'castle', 'dragon_lair', 'sea', 'heaven'].indexOf(state.zone)];
                        addEquip(['weapon', 'armor', 'accessory'][Math.floor(Math.random() * 3)], grades[Math.floor(Math
                            .random() * grades.length)]);
                    }
                    if (Math.random() < 0.8) dropLoot(state.enemy.loot);
                } else {
                    if (Math.random() < 0.2) addEquip(['weapon', 'armor', 'accessory'][Math.floor(Math.random() * 3)],
                    'D');
                    dropLoot(state.enemy.loot);
                }
            }

            function checkEnd() {
                if (state.enemy.hp <= 0) {
                    state.enemy.hp = 0;
                    let gold = Math.floor(Math.random() * (state.enemy.goldMax - state.enemy.goldMin + 1)) + state.enemy
                        .goldMin;
                    if (state.race === 'human') gold = Math.floor(gold * 1.30);
                    state.player.gold += gold;
                    dropEquipment(state.enemy.isBoss || false);
                    updateConditionProgress();
                    if (state.enemy.isBoss) { state.bossDefeated.add(state.zone);
                        state.bossCooldown = 12; }
                    levelUp();
                    state.battle = false;
                    state.dead = false;
                    state.scene = 'map';
                    setTimeout(() => renderMap(), 500);
                } else enemyTurn();
            }

            function updateConditionProgress() {
                if (!state.levelCondition) return;
                const c = state.levelCondition;
                if (c.type === 'kill') state.conditionProgress++;
                else if (c.type === 'boss' && state.enemy.isBoss) state.conditionProgress++;
                else if (c.type === 'collect') state.conditionProgress = state.inv.length;
                else if (c.type === 'explore') state.conditionProgress = new Set([...state.bossDefeated, state.zone]).size;
            }

            function levelUp() {
                if (!state.levelCondition) return;
                const c = state.levelCondition;
                let ok = false;
                if (c.type === 'kill' && state.conditionProgress >= c.target) ok = true;
                else if (c.type === 'boss' && state.conditionProgress >= c.target) ok = true;
                else if (c.type === 'collect' && state.conditionProgress >= c.target) ok = true;
                else if (c.type === 'explore' && state.conditionProgress >= c.target) ok = true;
                if (ok) {
                    state.player.lv++;
                    state.player.maxHp += 16;
                    state.player.maxMp += 8;
                    state.player.atk += 4;
                    state.player.def += 3;
                    state.player.hp = state.player.maxHp;
                    state.player.mp = state.player.maxMp;
                    setVoice(`рҹҺү еҚҮзҙҡпјҒ Lv.${state.player.lv}`);
                    generateLevelCondition();
                    if (state.player.lv % 5 === 0 && EVOLUTION_TREE[state.race][state.player.form].evolutions?.length)
                        setVoice('еҸҜйҖІеҢ–пјҒ');
                }
            }

            function forceLevelUp(t) {
                for (let i = 0; i < t; i++) {
                    state.player.lv++;
                    state.player.maxHp += 16;
                    state.player.maxMp += 8;
                    state.player.atk += 4;
                    state.player.def += 3;
                }
                state.player.hp = state.player.maxHp;
                state.player.mp = state.player.maxMp;
                setVoice(`еҚҮзҙҡи—Ҙж°ҙпјҡ+${t}зҙҡ`);
            }

            function addToInv(id) {
                const ex = state.inv.find(i => i.id === id);
                if (ex) ex.qty++;
                else state.inv.push({ id, name: LOOT_ITEMS[id].name, qty: 1 });
            }

            function evolve(id) {
                state.player.form = id;
                state.player.lv = 1;
                applyForm();
                state.player.hp = state.player.maxHp;
                state.player.mp = state.player.maxMp;
                setVoice(`йҖІеҢ–пјҒ${EVOLUTION_TREE[state.race][id].name}`);
                state.scene = 'map';
                renderMap();
            }

            function setVoice(m) { state.voice = `зҘһд№ӢиҒІпјҡ${m}`; }

            function shakeEl(id) {
                const el = document.getElementById(id);
                if (el) { el.classList.add('shake');
                    setTimeout(() => el.classList.remove('shake'), 400); }
            }

            function updateStatusBar() {
                const p = state.player,
                    f = EVOLUTION_TREE[state.race][p.form];
                document.getElementById('status-bar').innerHTML =
                    `<span>${RACES[state.race].icon} ${f.name} Lv.${p.lv}</span><span>вқӨпёҸ${p.hp}/${p.maxHp}</span><span>рҹ’§${p.mp}/${p.maxMp}</span><span>рҹ’°${p.gold}</span>`;
            }

            function renderMap() {
                updateStatusBar();
                const f = EVOLUTION_TREE[state.race][state.player.form];
                const canEvo = state.player.lv % 5 === 0 && f.evolutions?.length;
                const map = state.maps[state.zone];
                let grid = '';
                for (let y = 0; y < 10; y++)
                    for (let x = 0; x < 10; x++) {
                        const isP = x === state.pos.x && y === state.pos.y;
                        const isBoss = x === BOSS_POS.x && y === BOSS_POS.y;
                        const ba = !state.bossDefeated.has(state.zone) || state.bossCooldown <= 0;
                        const key = `${x},${y}`;
                        const sp = map.special[key];
                        let cls = '',
                            icon = map.grid[y][x];
                        if (isP) { cls = 'player-cell';
                            icon = f.icon; } else if (isBoss) { cls = ba ? 'boss-cell' : 'boss-disabled';
                            icon = ba ? 'рҹ‘‘' : 'рҹ’Ө'; } else if (sp) {
                            if (sp === 'chest') { cls = 'chest-cell';
                                icon = 'рҹ“Ұ'; } else if (sp === 'merchant') { cls = 'merchant-cell';
                                icon = 'рҹҸӘ'; } else if (sp === 'portal') { cls = 'portal-cell';
                                icon = 'рҹҢҖ'; }
                        }
                        grid +=
                        `<div class="map-cell ${cls}" data-x="${x}" data-y="${y}">${icon}</div>`;
                    }
                const cond = state.levelCondition;
                const prog = cond ? `${state.conditionProgress}/${cond.target}` : '0/0';
                document.getElementById('game-view').innerHTML = `
            <div class="panel">
            <h3>${ZONES[state.zone].icon} ${ZONES[state.zone].name}</h3>
            <div class="map-grid" id="mapGrid">${grid}</div>
            <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:4px;">
            <div>рҹ“Ҡ Lv.${state.player.lv} | йҖІеҢ–йңҖ${Math.ceil(state.player.lv/5)*5}зҙҡ</div>
            <div>рҹҺҜ ${cond?cond.desc:''}: ${prog}</div></div>
            <div class="god-voice">${state.voice}</div>
            <div class="flex-row">
            <button class="btn small" id="statusBtn">рҹ“ӢзӢҖж…Ӣ</button>
            <button class="btn small" id="equipBtn">рҹӣЎпёҸиЈқеӮҷ</button>
            <button class="btn small" id="shopBtn">рҹӣ’е•Ҷеә—</button>
            <button class="btn small" id="craftBtn">рҹ”Ёжү“йҖ </button>
            ${canEvo?`<button class="btn small primary" id="evoBtn">вңЁйҖІеҢ–</button>`:''}
            </div></div>`;
                document.getElementById('statusBtn').addEventListener('click', () => { state.scene = 'status';
                    renderStatus(); });
                document.getElementById('equipBtn').addEventListener('click', () => { state.scene = 'equip';
                    renderEquip(); });
                document.getElementById('shopBtn').addEventListener('click', () => { state.scene = 'shop';
                renderShop(); });
                document.getElementById('craftBtn').addEventListener('click', () => { state.scene = 'craft';
                renderCraft(); });
                if (canEvo) document.getElementById('evoBtn').addEventListener('click', () => { state.scene = 'evo';
                    renderEvo(); });
                // ең°ең–ж јеӯҗй»һж“Ҡз§»еӢ•
                document.querySelectorAll('.map-cell').forEach(cell => {
                    cell.addEventListener('click', (e) => {
                        if (state.battle || state.dead || state.scene !== 'map') return;
                        const tx = parseInt(e.currentTarget.dataset.x);
                        const ty = parseInt(e.currentTarget.dataset.y);
                        const dx = tx - state.pos.x;
                        const dy = ty - state.pos.y;
                        if (Math.abs(dx) + Math.abs(dy) === 1) move(dx, dy);
                    });
                });
                // ең°ең–ж»‘еӢ•ж”ҜжҸҙ
                setupMapSwipe();
            }

            function setupMapSwipe() {
                const mapGrid = document.getElementById('mapGrid');
                if (!mapGrid) return;
                let startX, startY;
                mapGrid.addEventListener('touchstart', (e) => {
                    startX = e.touches[0].clientX;
                    startY = e.touches[0].clientY;
                }, { passive: true });
                mapGrid.addEventListener('touchend', (e) => {
                    if (state.battle || state.dead || state.scene !== 'map') return;
                    if (startX === undefined || startY === undefined) return;
                    const endX = e.changedTouches[0].clientX;
                    const endY = e.changedTouches[0].clientY;
                    const dx = endX - startX;
                    const dy = endY - startY;
                    const threshold = 25;
                    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > threshold) {
                        move(dx > 0 ? 1 : -1, 0);
                    } else if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > threshold) {
                        move(0, dy > 0 ? 1 : -1);
                    }
                    startX = undefined;
                    startY = undefined;
                });
            }

            function renderBattle() {
                updateStatusBar();
                const e = state.enemy,
                    p = state.player,
                    f = EVOLUTION_TREE[state.race][p.form];
                const skills = f.skills || [];
                let skillBtns = skills.map(sid => {
                    const sk = SKILLS[sid];
                    if (!sk || ((sk.attr === 'heal' || sk.heal) && state.race !== 'god')) return '';
                    return `<button class="btn small" ${p.mp<sk.mp||state.dead?'disabled':''} id="sk_${sid}">${sk.name}(${sk.mp}MP)</button>`;
                }).join('');
                const potDisabled = Object.values(p.potions).every(v => v === 0) || state.dead;
                const isBoss = e.isBoss ? 'boss-bg' : '';
                const hpP = Math.max(0, e.hp / e.maxHp * 100);
                document.getElementById('game-view').innerHTML = `
            <div class="panel ${isBoss}">
            <div id="enemy-card" style="position:relative;background:#2a1028;border-radius:12px;padding:8px;">
            <div style="display:flex;align-items:center;gap:8px;"><span style="font-size:2rem;">${e.icon}</span><b>${e.name}</b></div>
            <div class="hp-bar"><div class="hp-fill" style="width:${hpP}%;"></div></div>
            <div style="text-align:right;">${e.hp}/${e.maxHp}</div></div>
            <div id="player-card" style="position:relative;margin:8px 0;"><b>${f.icon} ${f.name}</b> Lv.${p.lv} вқӨпёҸ${p.hp}/${p.maxHp} рҹ’§${p.mp}/${p.maxMp}</div>
            <div class="flex-row">
            <button class="btn" id="atkBtn" ${state.dead?'disabled':''}>вҡ”пёҸж”»ж“Ҡ</button>${skillBtns}
            <button class="btn" id="dodgeBtn" ${state.dead||p.mp<3?'disabled':''}>рҹ’Ёй–ғйҒҝ</button>
            <button class="btn" id="runBtn" ${state.dead?'disabled':''}>рҹҸғйҖғи·‘(${state.escapeCounter}/3)</button>
            <button class="btn" id="potBtn" ${potDisabled?'disabled':''}>рҹ§Әи—Ҙж°ҙ</button></div>
            <div class="god-voice">${state.voice}</div>${state.dead?'<p style="color:#ff8080;">еҖ’дёӢдёӯвҖҰ</p>':''}</div>`;
                document.getElementById('atkBtn').addEventListener('click', playerAtk);
                skills.forEach(sid => document.getElementById(`sk_${sid}`)?.addEventListener('click', () => playerSkill(
                    sid)));
                document.getElementById('dodgeBtn').addEventListener('click', playerDodge);
                document.getElementById('runBtn').addEventListener('click', tryRun);
                document.getElementById('potBtn').addEventListener('click', showPotions);
            }

            function showPotions() {
                let p = state.player,
                    html = `<div class="panel"><h3>рҹ§Ә и—Ҙж°ҙ</h3>`;
                const add = (l, k, q) => { if (q > 0) html +=
                        `<button class="btn small" id="use_${k}">${l} (${q})</button>`; };
                add('вқӨпёҸз”ҹе‘Ҫ', 'hp', p.potions.hp);
                add('рҹ’§йӯ”еҠӣ', 'mp', p.potions.mp);
                add('рҹ’ЁйҖҹеәҰ', 'speed', p.potions.speed);
                add('вҡ”пёҸж”»ж“Ҡ', 'atk', p.potions.atk);
                add('вҳ пёҸиҷӣејұ', 'weak', p.potions.weak);
                html += `<button class="btn small" id="cancelPotion">еҸ–ж¶Ҳ</button></div>`;
                document.getElementById('game-view').innerHTML = html;
                ['hp', 'mp', 'speed', 'atk', 'weak'].forEach(k => document.getElementById(`use_${k}`)?.addEventListener(
                    'click', () => { usePotion(k);
                        renderBattle(); }));
                document.getElementById('cancelPotion').addEventListener('click', () => renderBattle());
            }

            function renderStatus() {
                const p = state.player,
                    f = EVOLUTION_TREE[state.race][p.form],
                    s = stats();
                document.getElementById('game-view').innerHTML =
                    `<div class="panel"><h3>рҹ“Ӣ зӢҖж…Ӣ</h3><p>${f.icon} ${f.name} Lv.${p.lv}</p><p>вқӨпёҸ${p.hp}/${p.maxHp} рҹ’§${p.mp}/${p.maxMp}</p><p>вҡ”пёҸж”»${s.atk} рҹӣЎпёҸйҳІ${s.def} рҹ’ЁйҖҹ${s.spd}</p><button class="btn" id="backMap">иҝ”еӣһ</button></div>`;
                document.getElementById('backMap').addEventListener('click', () => { state.scene = 'map';
                    renderMap(); });
            }

            function renderEquip() {
                const slots = { weapon: 'жӯҰеҷЁ', armor: 'йҳІе…·', accessory: 'йЈҫе“Ғ' };
                let html = '<div class="panel"><h3>рҹӣЎпёҸ иЈқеӮҷ</h3>';
                for (let [s, n] of Object.entries(slots)) {
                    const eq = state.equipment[s];
                    html +=
                        `<p><b>${n}</b>пјҡ${eq?`${eq.name}(${eq.grade}) ${eq.atk?'+'+eq.atk+'ж”»':''}${eq.def?'+'+eq.def+'йҳІ':''}${eq.spd?'+'+eq.spd+'йҖҹ':''}${eq.matk?'+'+eq.matk+'йӯ”':''}${eq.mdef?'+'+eq.mdef+'йӯ”йҳІ':''}${eq.hp?'+'+eq.hp+'иЎҖ':''}${eq.all?'+'+eq.all+'е…Ё':''}`:'з©ә'} ${eq?`<button class="btn small unequip" data-slot="${s}">еҚё</button><button class="btn small sellEquip" data-slot="${s}">иіЈ25G</button>`:''}</p>`;
                }
                html += '<h4>иғҢеҢ…иЈқеӮҷ</h4>';
                state.equipInv.forEach((eq, i) => {
                    html +=
                        `<div class="item-row"><span>${eq.name}(${eq.grade})</span><button class="btn small equipIt" data-idx="${i}">иЈқеӮҷ</button><button class="btn small sellInv" data-idx="${i}">иіЈ25G</button></div>`;
                });
                html += '<button class="btn" id="closeEquip">иҝ”еӣһ</button></div>';
                document.getElementById('game-view').innerHTML = html;
                document.getElementById('closeEquip').addEventListener('click', () => { state.scene = 'map';
                    renderMap(); });
                document.querySelectorAll('.unequip').forEach(b => b.addEventListener('click', e => {
                    const s = e.target.dataset.slot;
                    const eq = state.equipment[s];
                    if (eq) { state.equipInv.push(eq);
                        state.equipment[s] = null;
                        setVoice(`еҚёдёӢ${eq.name}`);
                        renderEquip(); }
                }));
                document.querySelectorAll('.sellEquip').forEach(b => b.addEventListener('click', e => {
                    const s = e.target.dataset.slot;
                    const eq = state.equipment[s];
                    if (eq) { state.player.gold += 25;
                        state.equipment[s] = null;
                        setVoice(`иіЈеҮә${eq.name}`);
                        renderEquip(); }
                }));
                document.querySelectorAll('.equipIt').forEach(b => b.addEventListener('click', e => {
                    const i = parseInt(e.target.dataset.idx);
                    const eq = state.equipInv.splice(i, 1)[0];
                    const s = eq.type;
                    if (state.equipment[s]) state.equipInv.push(state.equipment[s]);
                    state.equipment[s] = eq;
                    setVoice(`иЈқеӮҷ${eq.name}`);
                    renderEquip();
                }));
                document.querySelectorAll('.sellInv').forEach(b => b.addEventListener('click', e => {
                    const i = parseInt(e.target.dataset.idx);
                    const eq = state.equipInv.splice(i, 1)[0];
                    state.player.gold += 25;
                    setVoice(`иіЈеҮә${eq.name}`);
                    renderEquip();
                }));
            }

            function renderShop() {
                const p = state.player;
                let invHtml = state.inv.map((it, i) =>
                    `<div class="item-row"><span>${it.name} x${it.qty}</span><button class="btn small" id="sell_${i}">иіЈ25G</button></div>`
                ).join('');
                document.getElementById('game-view').innerHTML = `
            <div class="panel"><h3>рҹӣ’ е•Ҷеә—</h3><p>рҹ’° ${p.gold}G</p>
            <div class="shop-grid">
            <div class="shop-card">вқӨпёҸз”ҹе‘Ҫи—Ҙж°ҙ (30HP) 100G <button class="btn small" id="buyHp">иІ·</button></div>
            <div class="shop-card">рҹ’§йӯ”еҠӣи—Ҙж°ҙ (18MP) 80G <button class="btn small" id="buyMp">иІ·</button></div>
            <div class="shop-card">рҹ’ЁйҖҹеәҰи—Ҙж°ҙ +14 130G <button class="btn small" id="buySpd">иІ·</button></div>
            <div class="shop-card">вҡ”пёҸж”»ж“Ҡи—Ҙж°ҙ +14 140G <button class="btn small" id="buyAtk">иІ·</button></div>
            <div class="shop-card">вҳ пёҸиҷӣејұи—Ҙж°ҙ 110G <button class="btn small" id="buyWeak">иІ·</button></div>
            <div class="shop-card">вӯҗеҚҮзҙҡи—Ҙж°ҙ +3зҙҡ 500G <button class="btn small" id="buyLevel">иІ·</button></div></div>
            <h4>жҺүиҗҪзү©</h4>${invHtml||'з„Ў'}<button class="btn" id="closeShop">й—ңй–ү</button></div>`;
                document.getElementById('buyHp').addEventListener('click', () => { if (p.gold >= 100) { p.gold -= 100;
                        p.potions.hp++;
                        renderShop(); } });
                document.getElementById('buyMp').addEventListener('click', () => { if (p.gold >= 80) { p.gold -= 80;
                        p.potions.mp++;
                        renderShop(); } });
                document.getElementById('buySpd').addEventListener('click', () => { if (p.gold >= 130) { p.gold -= 130;
                        p.potions.speed++;
                        renderShop(); } });
                document.getElementById('buyAtk').addEventListener('click', () => { if (p.gold >= 140) { p.gold -= 140;
                        p.potions.atk++;
                        renderShop(); } });
                document.getElementById('buyWeak').addEventListener('click', () => { if (p.gold >= 110) { p.gold -= 110;
                        p.potions.weak++;
                        renderShop(); } });
                document.getElementById('buyLevel').addEventListener('click', () => { if (p.gold >= 500) { p.gold -= 500;
                        forceLevelUp(3);
                        renderShop(); } });
                state.inv.forEach((_, i) => document.getElementById(`sell_${i}`)?.addEventListener('click', () => {
                    const it = state.inv[i];
                    p.gold += 25;
                    it.qty--;
                    if (it.qty <= 0) state.inv.splice(i, 1);
                    renderShop();
                }));
                document.getElementById('closeShop').addEventListener('click', () => { state.scene = 'map';
                    renderMap(); });
            }

            function renderMerchantShop() {
                const p = state.player;
                const gradePrice = { D: 35, C: 70, B: 140, A: 210, S: 350, SS: 550 };
                // рҹ”Ҙ ж №ж“ҡеҚҖеҹҹйҷҗеҲ¶еҸҜеҮәзҸҫзҡ„иЈқеӮҷзӯүзҙҡ
                const allowedGrades = ZONE_MERCHANT_GRADES[state.zone] || ['D', 'C'];
                let items = '';
                for (let i = 0; i < 3; i++) {
                    const type = ['weapon', 'armor', 'accessory'][i];
                    const grade = allowedGrades[Math.floor(Math.random() * allowedGrades.length)];
                    const pool = EQUIPMENT_POOL[type].filter(e => e.grade === grade);
                    if (pool.length) {
                        const eq = pool[Math.floor(Math.random() * pool.length)];
                        const price = Math.floor(gradePrice[grade] * 0.85);
                        items +=
                            `<div class="shop-card"><span>${eq.name} (${grade})</span><p class="price">${price}G</p><button class="btn small buyMerch" data-type="${type}" data-grade="${grade}" data-price="${price}">иіјиІ·</button></div>`;
                    }
                }
                document.getElementById('game-view').innerHTML = `
            <div class="panel"><h3>рҹҸӘ жөҒжөӘе•Ҷдәә (85жҠҳ) е·ІиІ·${state.merchantBuyCount}/3</h3>
            <p style="font-size:0.7rem;color:#c0a0d0;">рҹ“Қ ${ZONES[state.zone].name} - жңҖй«ҳеҸҜеҮәзҸҫ${allowedGrades[allowedGrades.length-1]}зҙҡиЈқеӮҷ</p>
            <p>рҹ’° ${p.gold}G</p><div class="shop-grid">${items}</div><button class="btn" id="closeMerchant">йӣўй–Ӣ</button></div>`;
                document.querySelectorAll('.buyMerch').forEach(b => b.addEventListener('click', e => {
                    if (state.merchantBuyCount >= 3) return;
                    const price = parseInt(e.target.dataset.price);
                    if (p.gold < price) return;
                    p.gold -= price;
                    addEquip(e.target.dataset.type, e.target.dataset.grade);
                    state.merchantBuyCount++;
                    if (state.merchantBuyCount >= 3) {
                        delete state.maps[state.zone].special[`${state.pos.x},${state.pos.y}`];
                        setVoice('е•Ҷдәәйӣўй–ӢдәҶ');
                        state.scene = 'map';
                        renderMap();
                    } else renderMerchantShop();
                }));
                document.getElementById('closeMerchant').addEventListener('click', () => { state.scene = 'map';
                    renderMap(); });
            }

            function renderCraft() {
                const total = state.inv.reduce((a, b) => a + b.qty, 0);
                const grades = ['D', 'C', 'B', 'A', 'S', 'SS'];
                const costs = [50, 100, 150, 200, 250, 300];
                let btns = '';
                grades.forEach((g, i) => {
                    btns +=
                        `<button class="btn small craftGrade" data-grade="${g}" data-cost="${costs[i]}" ${total<5||state.player.gold<costs[i]?'disabled':''}>${g}зҙҡ (${costs[i]}G)</button>`;
                });
                document.getElementById('game-view').innerHTML =
                    `<div class="panel"><h3>рҹ”Ё жү“йҖ </h3><p>жқҗж–ҷ:${total} | рҹ’°${state.player.gold}</p><div class="flex-row">${btns}</div><button class="btn" id="closeCraft">иҝ”еӣһ</button></div>`;
                document.querySelectorAll('.craftGrade').forEach(b => b.addEventListener('click', e => {
                    const cost = parseInt(e.target.dataset.cost),
                        grade = e.target.dataset.grade;
                    if (total < 5 || state.player.gold < cost) return;
                    let rem = 0;
                    for (let i = state.inv.length - 1; i >= 0 && rem < 5; i--) {
                        let it = state.inv[i];
                        let take = Math.min(it.qty, 5 - rem);
                        it.qty -= take;
                        rem += take;
                        if (it.qty <= 0) state.inv.splice(i, 1);
                    }
                    state.player.gold -= cost;
                    const type = ['weapon', 'armor', 'accessory'][Math.floor(Math.random() * 3)];
                    addEquip(type, grade);
                    renderCraft();
                }));
                document.getElementById('closeCraft').addEventListener('click', () => { state.scene = 'map';
                    renderMap(); });
            }

            function renderAltar() {
                document.getElementById('game-view').innerHTML =
                    `<div class="panel"><h3>рҹҢҖ жҡ—еҪұзҘӯеЈҮ</h3><p>йҒёж“ҮдёҖй …ж°ёд№…жҸҗеҚҮ</p><button class="btn" id="aAtk">вҡ”пёҸж”»ж“Ҡ+4</button><button class="btn" id="aDef">рҹӣЎпёҸйҳІзҰҰ+4</button><button class="btn" id="aSpd">рҹ’ЁйҖҹеәҰ+4</button><button class="btn" id="aHp">вқӨпёҸз”ҹе‘Ҫ+25</button><button class="btn" id="aMp">рҹ’§йӯ”еҠӣ+12</button></div>`;
                document.getElementById('aAtk').addEventListener('click', () => { state.player.atk += 4;
                    returnFromAltar(); });
                document.getElementById('aDef').addEventListener('click', () => { state.player.def += 4;
                    returnFromAltar(); });
                document.getElementById('aSpd').addEventListener('click', () => { state.player.spd += 4;
                    returnFromAltar(); });
                document.getElementById('aHp').addEventListener('click', () => { state.player.maxHp += 25;
                    state.player.hp += 25;
                    returnFromAltar(); });
                document.getElementById('aMp').addEventListener('click', () => { state.player.maxMp += 12;
                    state.player.mp += 12;
                    returnFromAltar(); });
            }

            function returnFromAltar() {
                if (state.altarReturn) { state.zone = state.altarReturn.zone;
                    state.pos = { x: state.altarReturn.x, y: state.altarReturn.y };
                    state.altarReturn = null; }
                delete state.maps[state.zone].special[`${state.pos.x},${state.pos.y}`];
                setVoice('зҚІеҫ—зҘқзҰҸдёҰиҝ”еӣһ');
                state.scene = 'map';
                renderMap();
            }

            function triggerEvent() {
                const events = [{ name: 'жөҒжөӘе•Ҷдәә', desc: 'е•ҶдәәеҮәзҸҫ', effect: () => { state.merchantBuyCount = 0;
                        state.scene = 'merchantShop';
                        renderMerchantShop(); } }, { name: 'еҒ·иҘІ', desc: '-15HP', effect: () => { state.player.hp = Math
                            .max(1, state.player.hp - 15);
                        setVoice('иў«еҒ·иҘІпјҒ'); } }, { name: 'е№«еҠ©жқ‘ж°‘', desc: 'зҚІеҫ—жӯҰеҷЁ', effect: () => addEquip('weapon', 'D') },
                    { name: 'иҒ–е…үжҙ—зҰ®', desc: 'зҚІеҫ—йЈҫе“Ғ', effect: () => addEquip('accessory', 'C') }, { name: 'еҜ¶з®ұ', desc: '+50G',
                        effect: () => { state.player.gold += 50;
                            setVoice('+50G'); } }, { name: 'йҷ·йҳұ', desc: '-10HP', effect: () => { state.player.hp = Math.max(
                                1, state.player.hp - 10); } }
                ];
                const ev = events[Math.floor(Math.random() * events.length)];
                state.scene = 'event';
                document.getElementById('game-view').innerHTML =
                    `<div class="panel"><h3>${ev.name}</h3><p>${ev.desc}</p><button class="btn primary" id="acceptEvent">зўәиӘҚ</button></div>`;
                document.getElementById('acceptEvent').addEventListener('click', () => { ev.effect(); if (state.scene ===
                        'event') { state.scene = 'map';
                        renderMap(); } });
            }

            function renderEvo() {
                const opts = EVOLUTION_TREE[state.race][state.player.form].evolutions || [];
                document.getElementById('game-view').innerHTML =
                    `<div class="panel"><h3>йҖІеҢ–</h3><div class="flex-row">${opts.map(id=>`<div class="evolution-card" data-evo="${id}"><span style="font-size:2rem;">${EVOLUTION_TREE[state.race][id].icon}</span><h4>${EVOLUTION_TREE[state.race][id].name}</h4></div>`).join('')}</div></div>`;
                document.querySelectorAll('.evolution-card').forEach(c => c.addEventListener('click', e => evolve(e
                    .currentTarget.dataset.evo)));
            }

            function setupControls() {
                document.getElementById('control-area').innerHTML = `
            <div class="direction-pad">
            <div class="dir-row"><div class="dir-btn" id="upBtn">вҶ‘</div></div>
            <div class="dir-row">
            <div class="dir-btn" id="leftBtn">вҶҗ</div>
            <div class="dir-btn" id="downBtn">вҶ“</div>
            <div class="dir-btn" id="rightBtn">вҶ’</div>
            </div></div>`;
                document.getElementById('upBtn').addEventListener('click', () => move(0, -1));
                document.getElementById('downBtn').addEventListener('click', () => move(0, 1));
                document.getElementById('leftBtn').addEventListener('click', () => move(-1, 0));
                document.getElementById('rightBtn').addEventListener('click', () => move(1, 0));
            }
            // йҚөзӣӨж“ҚжҺ§
            window.addEventListener('keydown', e => {
                if (state.scene !== 'map' || state.battle || state.dead) return;
                if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') { e.preventDefault();
                    move(-1, 0); }
                if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') { e.preventDefault();
                    move(1, 0); }
                if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') { e.preventDefault();
                    move(0, -1); }
                if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') { e.preventDefault();
                    move(0, 1); }
            });

            function showTutorial() {
                state.scene = 'tutorial';
                document.getElementById('game-view').innerHTML = `
            <div class="panel"><h2>рҹ“– иӘӘжҳҺ</h2>
            <p>рҹ§ӯ з§»еӢ•жҺўзҙўпјҢBossеңЁ(5,5)</p>
            <p>вҡ”пёҸ еӣһеҗҲжҲ°й¬ҘпјҢй–ғйҒҝ3ж¬ЎеҸҜйҖғ(80%жҲҗеҠҹпјҢеҸҜзҙҜз©Қ)</p>
            <p>рҹӣЎпёҸ иЈқеӮҷзі»зөұ | рҹ’Җ жӯ»дәЎеҫ©жҙ»(дәәж—Ҹдҝқз•ҷзү©е“Ғ)</p>
            <p>рҹ“ұ жүӢж©ҹпјҡж–№еҗ‘йҚө/ж»‘еӢ•ең°ең–/й»һж“Ҡзӣёй„°ж ј</p>
            <p>вҢЁпёҸ йӣ»и…ҰпјҡWASD/ж–№еҗ‘йҚөз§»еӢ•</p>
            <p style="color:#ffd080;">рҹ”Ҙ ж•ёеҖје·Іеј·еҢ–пјҢж–°жүӢжқ‘жӣҙе®үе…ЁпјҒ</p>
            <button class="btn primary" id="toRaceSelect">йҒёж“ҮзЁ®ж—Ҹ</button></div>`;
                document.getElementById('toRaceSelect').addEventListener('click', showRaceSelect);
            }

            function showRaceSelect() {
                state.scene = 'raceSelect';
                document.getElementById('game-view').innerHTML =
                    `<div class="panel"><h3>йҒёж“ҮзЁ®ж—Ҹ</h3><div class="flex-row">${Object.entries(RACES).map(([k,r])=>`<div class="race-card" data-race="${k}"><span style="font-size:2.5rem;">${r.icon}</span><h4>${r.name}</h4><p>${r.desc}</p></div>`).join('')}</div></div>`;
                document.querySelectorAll('.race-card').forEach(c => c.addEventListener('click', e => {
                    initPlayer(e.currentTarget.dataset.race);
                    genMaps();
                    state.bossDefeated.clear();
                    state.inv = [];
                    state.equipInv = [];
                    state.equipment = { weapon: null, armor: null, accessory: null };
                    state.scene = 'map';
                    state.zone = START_ZONE;
                    state.pos = { ...START_POS };
                    setupControls();
                    renderMap();
                }));
            }
            showTutorial();
        })();
    </script>
</body>
</html>
