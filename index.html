<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0">
  <title>轉生龍蛋～四域探索～ 最終版</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #0a0610; font-family: 'Noto Serif TC', 'Microsoft JhengHei', sans-serif;
      display: flex; justify-content: center; align-items: center; min-height: 100vh;
      background-image: radial-gradient(circle at 30% 30%, #2a1a35 0%, #03010a 90%);
      padding: 10px;
    }
    #game-container {
      width: 100%; max-width: 900px; background: rgba(18,10,25,0.95);
      border: 2px solid #7a5e8a; border-radius: 30px;
      box-shadow: 0 0 55px rgba(150,100,210,0.5);
      display: flex; flex-direction: column; overflow: hidden;
      height: 95vh;
    }
    .top-ornament { height: 4px; background: linear-gradient(90deg, transparent, #d9b3ff, #ffddaa, #d9b3ff, transparent); }
    #header {
      padding: 8px 16px; text-align: center; border-bottom: 1px solid #5a4670;
      background: rgba(25,12,35,0.9); flex-shrink: 0;
    }
    #header h1 { font-size: 1.5rem; color: #ffe8b0; text-shadow: 0 0 15px #b080e0; }
    .subtitle { font-size: 0.65rem; color: #c0a0d0; letter-spacing: 3px; }
    #status-bar {
      display: flex; justify-content: space-around; align-items: center; flex-wrap: wrap;
      padding: 8px 15px; background: rgba(0,0,0,0.7); border-bottom: 1px solid #4a3a55;
      font-size: 0.8rem; color: #e0d0f0; gap: 5px; flex-shrink: 0;
    }
    #main-area {
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
    }
    #game-view {
      flex: 1; overflow-y: auto; padding: 10px;
    }
    .panel {
      background: rgba(12,6,18,0.9); border: 1px solid #6a4e7a; border-radius: 18px;
      padding: 12px; color: #f4e8ff; margin-bottom: 8px;
    }
    .map-grid {
      display: grid; grid-template-columns: repeat(12, 1fr); gap: 2px;
      margin: 8px 0; background: #110a18; border-radius: 8px; padding: 4px;
    }
    .map-cell {
      aspect-ratio: 1; background: #1b1228; border: 1px solid #3a2a48;
      border-radius: 4px; display: flex; align-items: center; justify-content: center;
      font-size: 1rem; color: #ccc; cursor: default;
    }
    .player-cell { background: #6b5078; border-color: #f8d080; box-shadow: 0 0 8px #ffbb40; }
    .boss-cell { background: #5a2040; border-color: #ff6060; box-shadow: 0 0 8px #ff4040; }
    .direction-pad { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 8px 0; }
    .dir-row { display: flex; gap: 30px; }
    .dir-btn {
      background: #372648; border: 2px solid #8a6ea0; color: #ffe0c0;
      font-size: 1.8rem; width: 50px; height: 50px; border-radius: 15px;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
      transition: 0.1s; user-select: none;
    }
    .dir-btn:active { background: #5e4275; transform: scale(0.9); }
    .btn {
      background: #2f1f3a; border: 1px solid #8a6a9a; color: #f0e0ff;
      padding: 8px 16px; border-radius: 24px; font-weight: 600; font-size: 0.8rem;
      cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 5px;
      background: linear-gradient(180deg, #3e2850 0%, #21152e 100%);
      box-shadow: 0 3px 6px rgba(0,0,0,0.5);
    }
    .btn:hover { background: #553b6a; border-color: #d0b0e0; color: #fff; }
    .btn.primary { background: #5e3e62; border-color: #d8b0c0; }
    .btn.small { padding: 5px 12px; font-size: 0.7rem; }
    .god-voice { background: #1e1028; border-left: 4px solid #e6b422; padding: 8px 12px; border-radius: 10px; color: #ffe8a0; font-style: italic; margin: 6px 0; }
    .evolution-card { background: #1e1230; border: 2px solid #553b60; border-radius: 18px; padding: 12px; text-align: center; cursor: pointer; width: 130px; }
    .evolution-card:hover { border-color: #e0b0f0; transform: scale(1.03); }
    .flex-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
    .item-row { display: flex; align-items: center; gap: 6px; padding: 5px; background: rgba(255,255,255,0.05); border-radius: 8px; margin: 4px 0; }
    .shake { animation: shake 0.4s ease; }
    @keyframes shake { 0%,100%{transform:translateX(0);} 20%{transform:translateX(-6px);} 40%{transform:translateX(6px);} 60%{transform:translateX(-4px);} 80%{transform:translateX(4px);} }
    .flash { animation: flash 0.3s ease; }
    @keyframes flash { 0%{opacity:0.5; background:#fff;} 100%{opacity:1;} }
  </style>
</head>
<body>
<div id="game-container">
  <div class="top-ornament"></div>
  <div id="header"><h1>🐉 轉生龍蛋 · 四域探索</h1><div class="subtitle">森林 · 礦洞 · 城堡 · 龍巢</div></div>
  <div id="status-bar"></div>
  <div id="main-area">
    <div id="game-view"></div>
    <div id="control-area" style="padding:6px 10px; background:rgba(0,0,0,0.7); border-top:1px solid #5a4070;"></div>
  </div>
</div>

<script>
  (function() {
    const ELEMENTS = { fire:'火', water:'水', wind:'風', earth:'地', light:'光', dark:'闇', none:'無' };
    const ELEMENT_WEAKNESS = { fire:'wind', wind:'earth', earth:'water', water:'fire', light:'dark', dark:'light' };

    const EVOLUTION_TREE = {
      'dragon_egg': { name:'龍蛋', icon:'🥚', grade:'F', maxLv:5, element:'none', hp:40,mp:20,atk:6,def:10,matk:5,mdef:8,spd:4, skills:['roll'], evolutions:['whelp','draket','hatchling'] },
      'whelp': { name:'幼龍', icon:'🐉', grade:'D', maxLv:5, element:'fire', hp:110,mp:45,atk:24,def:22,matk:18,mdef:20,spd:12, skills:['roll','flame_breath'], evolutions:['plague_whelp','rainbow_whelp'] },
      'draket': { name:'小龍', icon:'🐲', grade:'D', maxLv:5, element:'wind', hp:90,mp:55,atk:30,def:14,matk:25,mdef:15,spd:16, skills:['roll','fireball'], evolutions:['flame_draket','thunder_draket'] },
      'hatchling': { name:'雛龍', icon:'🐊', grade:'D', maxLv:5, element:'water', hp:100,mp:50,atk:22,def:18,matk:20,mdef:22,spd:20, skills:['roll','wind_cutter'], evolutions:['wind_hatchling','shadow_hatchling'] },
      'plague_whelp':{ name:'厄病幼龍',icon:'☠️',grade:'C',maxLv:5,element:'dark',hp:200,mp:70,atk:42,def:35,matk:38,mdef:30,spd:18,skills:['toxic_breath'],evolutions:['calamity_drake']},
      'rainbow_whelp':{ name:'小虹龍',icon:'🌈',grade:'C',maxLv:5,element:'light',hp:180,mp:80,atk:36,def:32,matk:50,mdef:45,spd:20,skills:['holy_light'],evolutions:['sacred_drake']},
      'flame_draket':{ name:'炎龍幼體',icon:'🔥',grade:'C',maxLv:5,element:'fire',hp:160,mp:70,atk:52,def:22,matk:45,mdef:25,spd:22,skills:['inferno'],evolutions:['blast_drake']},
      'thunder_draket':{ name:'雷龍幼體',icon:'⚡',grade:'C',maxLv:5,element:'wind',hp:170,mp:75,atk:48,def:24,matk:52,mdef:28,spd:26,skills:['lightning_strike'],evolutions:['storm_drake']},
      'wind_hatchling':{ name:'風龍幼體',icon:'🌪️',grade:'C',maxLv:5,element:'wind',hp:155,mp:65,atk:42,def:26,matk:44,mdef:30,spd:32,skills:['gale_slash'],evolutions:['tempest_drake']},
      'shadow_hatchling':{ name:'暗龍幼體',icon:'🌑',grade:'C',maxLv:5,element:'dark',hp:175,mp:68,atk:46,def:28,matk:48,mdef:32,spd:25,skills:['dark_claw'],evolutions:['abyss_drake']},
      'calamity_drake':{ name:'災厄龍',icon:'💀',grade:'B',maxLv:100,element:'dark',hp:350,mp:110,atk:68,def:52,matk:62,mdef:48,spd:28,skills:['death_breath'], evolutions:null },
      'sacred_drake':{ name:'聖光龍',icon:'✨',grade:'B',maxLv:100,element:'light',hp:330,mp:130,atk:58,def:50,matk:80,mdef:75,spd:26,skills:['divine_judgment'], evolutions:null },
      'blast_drake':{ name:'爆炎龍',icon:'💥',grade:'B',maxLv:100,element:'fire',hp:300,mp:110,atk:82,def:40,matk:68,mdef:45,spd:32,skills:['explosion'], evolutions:null },
      'storm_drake':{ name:'風暴龍',icon:'⛈️',grade:'B',maxLv:100,element:'wind',hp:280,mp:120,atk:60,def:38,matk:78,mdef:48,spd:42,skills:['thunderstorm'], evolutions:null },
      'tempest_drake':{ name:'颶風龍',icon:'🌪️',grade:'B',maxLv:100,element:'wind',hp:260,mp:115,atk:55,def:35,matk:82,mdef:50,spd:48,skills:['sonic_boom'], evolutions:null },
      'abyss_drake':{ name:'暗黑龍',icon:'🖤',grade:'B',maxLv:100,element:'dark',hp:360,mp:105,atk:72,def:48,matk:76,mdef:52,spd:30,skills:['abyss_gaze'], evolutions:null },
    };

    const SKILLS = {
      roll:{name:'滾動',mp:4,power:1.2,attr:'phys'}, flame_breath:{name:'火焰吐息',mp:10,power:1.8,attr:'mag',element:'fire'},
      fireball:{name:'火球術',mp:12,power:2.0,attr:'mag',element:'fire'}, wind_cutter:{name:'風刃',mp:8,power:1.5,attr:'phys',element:'wind'},
      toxic_breath:{name:'毒息',mp:14,power:1.7,attr:'mag',element:'dark'}, holy_light:{name:'聖光',mp:16,power:2.1,attr:'mag',element:'light'},
      inferno:{name:'地獄火',mp:20,power:2.4,attr:'mag',element:'fire'}, lightning_strike:{name:'雷擊',mp:18,power:2.3,attr:'mag',element:'wind'},
      gale_slash:{name:'風刃',mp:12,power:1.9,attr:'phys',element:'wind'}, dark_claw:{name:'暗爪',mp:14,power:2.0,attr:'phys',element:'dark'},
      death_breath:{name:'死亡吐息',mp:25,power:2.8,attr:'mag',element:'dark'}, divine_judgment:{name:'神聖審判',mp:20,power:2.5,attr:'mag',element:'light'},
    };

    const ZONES = {
      forest: { name:'幽暗森林', icon:'🌲' }, cave: { name:'廢棄礦洞', icon:'🕳️' },
      castle: { name:'亡靈城堡', icon:'🏰' }, dragon_lair: { name:'龍之巢穴', icon:'🌋' },
    };
    const START_ZONE = 'forest', START_POS = {x:5,y:5};
    const BOSS_POS = {x:6, y:6}; // 每個區域Boss固定位置

    const MONSTERS = {
      forest:[
        {name:'哥布林',icon:'👹',el:'earth',hp:30,atk:8,def:3,exp:20,gold:12},
        {name:'火狐',icon:'🦊',el:'fire',hp:35,atk:12,def:4,exp:25,gold:18}
      ],
      cave:[
        {name:'石傀儡',icon:'🗿',el:'earth',hp:90,atk:20,def:16,exp:70,gold:45},
        {name:'暗影蝙蝠',icon:'🦇',el:'dark',hp:65,atk:17,def:9,exp:60,gold:38}
      ],
      castle:[
        {name:'骷髏騎士',icon:'💀',el:'dark',hp:160,atk:30,def:20,exp:140,gold:85},
        {name:'聖光祭司',icon:'🧙',el:'light',hp:140,atk:26,def:17,exp:130,gold:80}
      ],
      dragon_lair:[
        {name:'火龍',icon:'🐉',el:'fire',hp:260,atk:38,def:28,exp:280,gold:180}
      ]
    };

    // Boss定義
    const BOSSES = {
      forest: {name:'森林巨魔',icon:'👾',el:'earth',hp:120,atk:18,def:12,exp:150,gold:100, loot:[{id:'goblin_tooth',chance:0.8}]},
      cave: {name:'礦洞之王',icon:'👿',el:'dark',hp:250,atk:28,def:22,exp:300,gold:200, loot:[{id:'stone_core',chance:0.9}]},
      castle: {name:'亡靈領主',icon:'🧛',el:'dark',hp:380,atk:38,def:30,exp:500,gold:350, loot:[{id:'dark_bone',chance:1}]},
      dragon_lair: {name:'遠古巨龍',icon:'🐲',el:'fire',hp:550,atk:50,def:40,exp:1000,gold:700, loot:[{id:'dragon_scale',chance:1}]},
    };

    const state = {
      player: null, enemy: null, voice: "", battle: false, dead: false,
      scene: 'map', zone: START_ZONE, pos: {...START_POS}, maps: {}, inv: [],
      goalIdx:0, prog:{kill:0,evo:false,collect:new Set(),explore:new Set([START_ZONE])},
      buffs:{atk:0,spd:0}, bossDefeated: new Set()
    };

    function init() {
      state.player = {
        form:'dragon_egg', lv:1, exp:0, gold:150,
        hp:40, maxHp:40, mp:20, maxMp:20,
        atk:6, def:10, matk:5, mdef:8, spd:4,
        potions:{hp:3,mp:2,speed:1,atk:1,weak:1}
      };
      applyForm(); state.player.hp=state.player.maxHp; state.player.mp=state.player.maxMp;
      state.prog = {kill:0,evo:false,collect:new Set(),explore:new Set([START_ZONE])};
      state.goalIdx=0; state.inv=[]; state.bossDefeated.clear();
      genMaps();
      setVoice('方向鍵移動，Boss在(6,6)👑。死亡回森林。');
    }

    function applyForm() {
      const f=EVOLUTION_TREE[state.player.form]; if(!f) return;
      state.player.maxHp=f.hp; state.player.maxMp=f.mp;
      state.player.atk=f.atk; state.player.def=f.def;
      state.player.matk=f.matk; state.player.mdef=f.mdef;
      state.player.spd=f.spd;
    }

    function stats() {
      let p=state.player;
      return {atk:p.atk+state.buffs.atk, def:p.def, spd:p.spd+state.buffs.spd};
    }

    function genMaps() {
      for(let z of Object.keys(ZONES)) {
        state.maps[z] = Array(12).fill().map(()=>Array(12).fill('🌿'));
      }
    }

    function move(dx,dy) {
      if(state.battle||state.dead) return;
      let nx=state.pos.x+dx, ny=state.pos.y+dy;
      if(nx<0||nx>=12||ny<0||ny>=12) {
        const adj = { forest:{south:'cave'}, cave:{north:'forest',south:'castle'}, castle:{north:'cave',south:'dragon_lair'}, dragon_lair:{north:'castle'} };
        const next = adj[state.zone]?.[dx<0?'west':dx>0?'east':dy<0?'north':dy>0?'south':null];
        if(next) { state.zone=next; state.pos={x:dx<0?11:dx>0?0:nx, y:dy<0?11:dy>0?0:ny}; state.prog.explore.add(next); }
        else return;
      } else {
        state.pos.x=nx; state.pos.y=ny;
      }
      // 檢查是否踩到Boss格
      if(state.pos.x===BOSS_POS.x && state.pos.y===BOSS_POS.y && !state.bossDefeated.has(state.zone)) {
        startBossBattle();
      } else if(Math.random()<0.25) {
        startBattle();
      } else {
        renderMap();
      }
    }

    function startBattle() {
      const pool = MONSTERS[state.zone]||MONSTERS.forest;
      const m = pool[Math.floor(Math.random()*pool.length)];
      state.enemy = {...m, maxHp:m.hp, el:m.el};
      state.battle=true; state.dead=false; state.scene='battle';
      state.buffs={atk:0,spd:0};
      setVoice(`⚔️ ${m.name} (${ELEMENTS[m.el]}) 出現了！`);
      document.getElementById('game-view').classList.add('flash');
      setTimeout(()=>document.getElementById('game-view').classList.remove('flash'),300);
      renderBattle();
    }

    function startBossBattle() {
      const boss = BOSSES[state.zone];
      if(!boss) return;
      state.enemy = {...boss, maxHp:boss.hp, el:boss.el, isBoss:true};
      state.battle=true; state.dead=false; state.scene='battle';
      state.buffs={atk:0,spd:0};
      setVoice(`👑 Boss ${boss.name} 出現了！`);
      document.getElementById('game-view').classList.add('flash');
      setTimeout(()=>document.getElementById('game-view').classList.remove('flash'),300);
      renderBattle();
    }

    function dmgCalc(atk,def,power=1,atkEl,defEl) {
      let base = Math.max(1, Math.floor(atk*power)-def);
      if(atkEl&&defEl&&atkEl!=='none'&&defEl!=='none') {
        if(ELEMENT_WEAKNESS[atkEl]===defEl) base=Math.floor(base*1.3);
        else if(ELEMENT_WEAKNESS[defEl]===atkEl) base=Math.floor(base*0.7);
      }
      return Math.max(1, base+Math.floor(Math.random()*6));
    }

    function playerAtk() {
      if(state.dead||!state.battle) return;
      const dmg = dmgCalc(stats().atk, state.enemy.def, 1, EVOLUTION_TREE[state.player.form].element, state.enemy.el);
      state.enemy.hp-=dmg; setVoice(`造成 ${dmg} 傷害`);
      document.getElementById('enemy-card')?.classList.add('shake');
      setTimeout(()=>document.getElementById('enemy-card')?.classList.remove('shake'),400);
      checkEnd();
    }

    function playerSkill(id) {
      if(state.dead||!state.battle) return;
      const sk=SKILLS[id]; if(!sk||state.player.mp<sk.mp) return;
      state.player.mp-=sk.mp;
      const dmg = dmgCalc(stats().atk, state.enemy.def, sk.power, sk.element, state.enemy.el);
      state.enemy.hp-=dmg; setVoice(`✨ ${sk.name}！ ${dmg} 傷害`);
      document.getElementById('enemy-card')?.classList.add('shake');
      setTimeout(()=>document.getElementById('enemy-card')?.classList.remove('shake'),400);
      checkEnd();
    }

    function showPotions() {
      let p=state.player; let html=`<div class="panel"><h3>🧪 藥水</h3>`;
      const add=(lab,key,q)=>{ if(q>0) html+=`<button class="btn small" id="use_${key}">${lab} (${q})</button>`; };
      add('❤️生命','hp',p.potions.hp); add('💧魔力','mp',p.potions.mp);
      add('💨速度','speed',p.potions.speed); add('⚔️攻擊','atk',p.potions.atk); add('☠️虛弱','weak',p.potions.weak);
      html+=`<button class="btn small" id="cancelPotion">取消</button></div>`;
      document.getElementById('game-view').innerHTML=html;
      ['hp','mp','speed','atk','weak'].forEach(k=>document.getElementById(`use_${k}`)?.addEventListener('click',()=>usePotion(k)));
      document.getElementById('cancelPotion').addEventListener('click',()=>renderBattle());
    }

    function usePotion(type) {
      let p=state.player;
      if(type==='hp'){ p.hp=Math.min(p.maxHp,p.hp+40); p.potions.hp--; }
      else if(type==='mp'){ p.mp=Math.min(p.maxMp,p.mp+25); p.potions.mp--; }
      else if(type==='speed'){ state.buffs.spd+=20; p.potions.speed--; }
      else if(type==='atk'){ state.buffs.atk+=20; p.potions.atk--; }
      else if(type==='weak'&&state.enemy){ state.enemy.atk=Math.floor(state.enemy.atk*0.8); state.enemy.hp=Math.floor(state.enemy.hp*0.85); p.potions.weak--; }
      setVoice('藥水生效');
      renderBattle();
    }

    function enemyTurn() {
      if(!state.enemy||state.enemy.hp<=0) return;
      if(state.dead) return;
      const dodge = 0.05 + stats().spd/200;
      if(Math.random()<dodge) { setVoice('✨ 閃避！'); renderBattle(); return; }
      const dmg = dmgCalc(state.enemy.atk, stats().def, 1, state.enemy.el, EVOLUTION_TREE[state.player.form].element);
      state.player.hp -= dmg;
      setVoice(`${state.enemy.name} 造成 ${dmg} 傷害`);
      document.getElementById('player-card')?.classList.add('shake');
      setTimeout(()=>document.getElementById('player-card')?.classList.remove('shake'),400);
      if(state.player.hp<=0) {
        state.player.hp=0; state.dead=true; state.battle=false;
        setVoice('被擊倒…返回森林起點');
        setTimeout(()=>{
          state.player.hp=Math.floor(state.player.maxHp*0.3);
          state.player.mp=Math.floor(state.player.maxMp*0.3);
          state.dead=false; state.zone=START_ZONE; state.pos={...START_POS};
          state.scene='map'; renderMap();
        },1500);
        renderBattle();
        return;
      }
      renderBattle();
    }

    function checkEnd() {
      if(state.enemy.hp<=0) {
        state.enemy.hp=0;
        state.player.exp+=state.enemy.exp; state.player.gold+=state.enemy.gold;
        state.prog.kill++;
        // Boss擊敗標記
        if(state.enemy.isBoss) {
          state.bossDefeated.add(state.zone);
          setVoice(`🏆 擊敗Boss ${state.enemy.name}！`);
        }
        // 掉落物
        if(state.enemy.loot) {
          state.enemy.loot.forEach(l=>{
            if(Math.random()<l.chance) {
              const existing = state.inv.find(i=>i.id===l.id);
              if(existing) existing.qty++;
              else state.inv.push({id:l.id, name:LOOT_ITEMS[l.id]?.name||l.id, qty:1});
            }
          });
        }
        document.getElementById('enemy-card')?.classList.add('explode');
        setTimeout(()=>{
          levelUp(); state.battle=false; state.dead=false; state.scene='map'; renderMap();
        },500);
        renderBattle();
      } else enemyTurn();
    }

    function levelUp() {
      const need=20+state.player.lv*5;
      while(state.player.exp>=need) {
        state.player.exp-=need; state.player.lv++;
        state.player.maxHp+=12; state.player.maxMp+=6;
        state.player.atk+=3; state.player.def+=2;
        state.player.hp=state.player.maxHp; state.player.mp=state.player.maxMp;
        setVoice(`🎉 升級 Lv.${state.player.lv}`);
      }
    }

    function evolve(id) {
      state.player.form=id; state.player.lv=1; state.player.exp=0;
      applyForm(); state.player.hp=state.player.maxHp; state.player.mp=state.player.maxMp;
      setVoice(`進化！${EVOLUTION_TREE[id].name}`);
      state.scene='map'; renderMap();
    }

    function updateStatusBar() {
      const p=state.player; const f=EVOLUTION_TREE[p.form];
      document.getElementById('status-bar').innerHTML = `
        <span>${f.icon} ${f.name} Lv.${p.lv}</span>
        <span>❤️${p.hp}/${p.maxHp}</span>
        <span>💧${p.mp}/${p.maxMp}</span>
        <span>💰${p.gold}</span>
        <span>屬性:${ELEMENTS[f.element]}</span>`;
    }

    function renderMap() {
      updateStatusBar();
      const f=EVOLUTION_TREE[state.player.form];
      const canEvo = (state.player.lv%5===0 && f.evolutions?.length);
      const nextLv = Math.ceil(state.player.lv/5)*5;
      let grid='';
      for(let y=0;y<12;y++) for(let x=0;x<12;x++) {
        const isP=(x===state.pos.x&&y===state.pos.y);
        const isBoss = (x===BOSS_POS.x && y===BOSS_POS.y && !state.bossDefeated.has(state.zone));
        let cellClass = 'map-cell';
        if(isP) cellClass += ' player-cell';
        else if(isBoss) cellClass += ' boss-cell';
        grid+=`<div class="${cellClass}">${isP?f.icon:(isBoss?'👑':'🌿')}</div>`;
      }
      document.getElementById('game-view').innerHTML = `
        <div class="panel">
          <h3>${ZONES[state.zone].icon} ${ZONES[state.zone].name}</h3>
          <div class="map-grid">${grid}</div>
          <p>下一進化：${canEvo?'可進化！':`Lv.${nextLv} (差${nextLv-state.player.lv}級)`}</p>
          <div class="god-voice">${state.voice}</div>
          <div class="flex-row">
            <button class="btn small" id="statusBtn">📋</button>
            <button class="btn small" id="goalBtn">🎯</button>
            <button class="btn small" id="shopBtn">🛒</button>
            ${canEvo?`<button class="btn small primary" id="evoBtn">✨進化</button>`:''}
          </div>
        </div>`;
      document.getElementById('statusBtn').addEventListener('click',()=>{state.scene='status';renderStatus();});
      document.getElementById('goalBtn').addEventListener('click',()=>{state.scene='goal';renderGoal();});
      document.getElementById('shopBtn').addEventListener('click',()=>{state.scene='shop';renderShop();});
      document.getElementById('evoBtn')?.addEventListener('click',()=>{state.scene='evo';renderEvo();});
    }

    function renderBattle() {
      updateStatusBar();
      const e=state.enemy, p=state.player, f=EVOLUTION_TREE[p.form];
      const skills = f.skills||[];
      let skillBtns = skills.map(sid=>{
        const sk=SKILLS[sid]; if(!sk) return '';
        return `<button class="btn small" ${p.mp<sk.mp||state.dead?'disabled':''} id="sk_${sid}">${sk.name}(${sk.mp}MP)</button>`;
      }).join('');
      const potDisabled = Object.values(p.potions).every(v=>v===0)||state.dead;
      document.getElementById('game-view').innerHTML = `
        <div class="panel">
          <div id="enemy-card" style="display:flex;align-items:center;gap:8px;background:#2a1028;border-radius:12px;padding:8px;">
            <span style="font-size:2rem;">${e.icon}</span><b>${e.name}</b> (${ELEMENTS[e.el]}) ❤️${e.hp}/${e.maxHp}
          </div>
          <div id="player-card" style="margin:8px 0;"><b>${f.icon} ${f.name}</b> Lv.${p.lv} ❤️${p.hp}/${p.maxHp} 💧${p.mp}/${p.maxMp}</div>
          <div class="flex-row">
            <button class="btn" id="atkBtn" ${state.dead?'disabled':''}>⚔️攻擊</button>
            ${skillBtns}
            <button class="btn" id="potBtn" ${potDisabled?'disabled':''}>🧪藥水</button>
          </div>
          <div class="god-voice">${state.voice}</div>
          ${state.dead?'<p style="color:#ff8080;">倒下中…</p>':''}
        </div>`;
      document.getElementById('atkBtn').addEventListener('click',playerAtk);
      skills.forEach(sid=>document.getElementById(`sk_${sid}`)?.addEventListener('click',()=>playerSkill(sid)));
      document.getElementById('potBtn').addEventListener('click',showPotions);
    }

    function renderStatus() {
      const p=state.player, f=EVOLUTION_TREE[p.form];
      document.getElementById('game-view').innerHTML = `
        <div class="panel"><h3>狀態</h3><p>${f.icon} ${f.name} (${f.grade}) Lv.${p.lv} ${ELEMENTS[f.element]}</p>
        <p>❤️${p.hp}/${p.maxHp} 💧${p.mp}/${p.maxMp}</p><button class="btn" id="backMap">返回</button></div>`;
      document.getElementById('backMap').addEventListener('click',()=>{state.scene='map';renderMap();});
    }

    function renderGoal() {
      const p=state.player; const f=EVOLUTION_TREE[p.form];
      const needExp = 20 + p.lv*5;
      const nextEvoLv = Math.ceil(p.lv/5)*5;
      document.getElementById('game-view').innerHTML = `
        <div class="panel">
          <h3>📊 進度</h3>
          <p>經驗值: ${p.exp}/${needExp} (升級Lv.${p.lv+1})</p>
          <p>進化需求: Lv.${nextEvoLv} (目前Lv.${p.lv})</p>
          <h4>🎯 目標</h4>
          ${GOALS.map((g,i)=>`<p>${i===state.goalIdx?'➤':''}${g.desc} (${i===0?state.prog.kill+'/5':i===1?(state.prog.evo?'完成':'未完成'):i===2?state.inv.length+'/3':state.prog.explore.size+'/4'})</p>`).join('')}
          <button class="btn" id="backMap">返回</button>
        </div>`;
      document.getElementById('backMap').addEventListener('click',()=>{state.scene='map';renderMap();});
    }

    const GOALS = [
      { desc:'擊敗5隻怪物', type:'kill', target:5 },
      { desc:'進化到D級', type:'evo' },
      { desc:'收集3種掉落物', type:'collect', target:3 },
      { desc:'探索全部區域', type:'explore', target:4 },
    ];

    function renderShop() {
      let invHtml = state.inv.map((it,idx)=>`<div class="item-row"><span>${it.name} x${it.qty}</span><button class="btn small" id="sell_${idx}">賣</button></div>`).join('');
      document.getElementById('game-view').innerHTML = `
        <div class="panel"><h3>商店</h3><p>💰${state.player.gold}</p>
        <button class="btn small" id="buyHp">❤️20G</button><button class="btn small" id="buyMp">💧15G</button>
        <button class="btn small" id="buySpd">💨30G</button><button class="btn small" id="buyAtk">⚔️30G</button><button class="btn small" id="buyWeak">☠️25G</button>
        ${invHtml}<button class="btn" id="closeShop">關閉</button></div>`;
      document.getElementById('buyHp').addEventListener('click',()=>{if(state.player.gold>=20){state.player.gold-=20;state.player.potions.hp++;renderShop();}});
      document.getElementById('buyMp').addEventListener('click',()=>{if(state.player.gold>=15){state.player.gold-=15;state.player.potions.mp++;renderShop();}});
      document.getElementById('closeShop').addEventListener('click',()=>{state.scene='map';renderMap();});
    }

    function renderEvo() {
      const opts = EVOLUTION_TREE[state.player.form].evolutions||[];
      document.getElementById('game-view').innerHTML = `
        <div class="panel"><h3>進化</h3><div class="flex-row">${opts.map(id=>`<div class="evolution-card" data-evo="${id}"><span style="font-size:2rem;">${EVOLUTION_TREE[id].icon}</span><h4>${EVOLUTION_TREE[id].name}</h4></div>`).join('')}</div></div>`;
      document.querySelectorAll('.evolution-card').forEach(c=>c.addEventListener('click',(e)=>evolve(e.currentTarget.dataset.evo)));
    }

    const LOOT_ITEMS = {
      goblin_tooth: {name:'哥布林牙齒',icon:'🦷',sellPrice:15},
      stone_core: {name:'石核',icon:'🪨',sellPrice:40},
      dark_bone: {name:'暗黑骨',icon:'🦴',sellPrice:60},
      dragon_scale: {name:'龍鱗',icon:'🔶',sellPrice:120},
    };

    function setVoice(msg){ state.voice=`神之聲：${msg}`; }

    function setupControls(){
      document.getElementById('control-area').innerHTML = `
        <div class="direction-pad">
          <div class="dir-row"><div class="dir-btn" id="upBtn">↑</div></div>
          <div class="dir-row"><div class="dir-btn" id="leftBtn">←</div><div class="dir-btn" id="downBtn">↓</div><div class="dir-btn" id="rightBtn">→</div></div>
        </div>`;
      document.getElementById('upBtn').addEventListener('click',()=>move(0,-1));
      document.getElementById('downBtn').addEventListener('click',()=>move(0,1));
      document.getElementById('leftBtn').addEventListener('click',()=>move(-1,0));
      document.getElementById('rightBtn').addEventListener('click',()=>move(1,0));
    }

    function showTutorial() {
      document.getElementById('game-view').innerHTML = `
        <div class="panel">
          <h2>📖 遊戲說明</h2>
          <p>🧭 <b>移動：</b>方向鍵探索，地圖(6,6)有Boss👑。</p>
          <p>⚔️ <b>戰鬥：</b>回合制，技能或藥水，死亡回森林。</p>
          <p>🧬 <b>進化：</b>每5級可選擇新形態。</p>
          <p>🎯 <b>目標：</b>點擊目標查看經驗與進化需求。</p>
          <button class="btn primary" id="startGame">開始冒險</button>
        </div>`;
      document.getElementById('startGame').addEventListener('click',()=>{
        state.scene='map'; renderMap();
      });
    }

    init(); setupControls(); showTutorial();
  })();
</script>
</body>
</html>
