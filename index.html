<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0, viewport-fit=cover">
    <title>轉生龍蛋 · 終極3A沉浸版</title>
    <style>
        :root {
            --bg: #0a0610;
            --panel: rgba(10, 5, 18, 0.92);
            --gold: #ffd700;
            --accent: #c0a0f0;
            --danger: #ff4d6a;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: radial-gradient(ellipse at 40% 40%, #1e1028 0%, #03010a 80%);
            font-family: 'Segoe UI', 'Noto Serif TC', 'Microsoft JhengHei', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
            touch-action: manipulation;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
        }
        /* 動態粒子背景 */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><circle cx="20" cy="30" r="2" fill="%23ffffff22"/><circle cx="150" cy="80" r="1.5" fill="%23ffd70033"/><circle cx="70" cy="160" r="2.5" fill="%23c0a0f022"/><circle cx="180" cy="140" r="1" fill="%23ffffff22"/></svg>');
            background-size: 200px 200px;
            animation: particleMove 20s linear infinite;
            pointer-events: none;
            z-index: 0;
        }
        @keyframes particleMove {
            0% {
                transform: translate(0, 0);
            }
            100% {
                transform: translate(-50px, -50px);
            }
        }
        #game-container {
            width: 100%;
            max-width: 960px;
            background: rgba(12, 6, 20, 0.9);
            backdrop-filter: blur(10px);
            border: 2px solid #7a5e8a;
            border-radius: 32px;
            box-shadow: 0 20px 50px rgba(100, 60, 160, 0.4), inset 0 0 30px rgba(255, 200, 150, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            height: 95vh;
            max-height: 900px;
            position: relative;
            z-index: 1;
        }
        .top-ornament {
            height: 4px;
            background: linear-gradient(90deg, transparent, #d9b3ff, #ffddaa, #d9b3ff, transparent);
            flex-shrink: 0;
        }
        #header {
            padding: 8px 16px;
            text-align: center;
            border-bottom: 1px solid #5a4670;
            background: rgba(15, 8, 22, 0.9);
            flex-shrink: 0;
        }
        #header h1 {
            font-size: clamp(1.1rem, 2.5vw, 1.6rem);
            color: #ffe8b0;
            text-shadow: 0 0 20px #b080e0, 0 0 8px #ffbb40;
            letter-spacing: 2px;
        }
        .subtitle {
            font-size: 0.65rem;
            color: #c0a0d0;
            letter-spacing: 2px;
            text-shadow: 0 0 8px #a060c0;
        }
        #status-bar {
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-wrap: wrap;
            padding: 8px 15px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            border-bottom: 1px solid #4a3a55;
            font-size: 0.8rem;
            color: #e0d0f0;
            gap: 6px;
            flex-shrink: 0;
        }
        #main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
        }
        #game-view {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            position: relative;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }
        .panel {
            background: rgba(10, 4, 16, 0.85);
            backdrop-filter: blur(8px);
            border: 1px solid #7a5e8a;
            border-radius: 20px;
            padding: 14px;
            color: #f4e8ff;
            margin-bottom: 10px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5), inset 0 0 15px rgba(255, 200, 150, 0.05);
            transition: transform 0.2s ease;
        }
        .panel:hover {
            transform: translateY(-2px);
        }
        .map-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 2px;
            margin: 10px 0;
            background: #110a18;
            border-radius: 12px;
            padding: 4px;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.8);
        }
        .map-cell {
            aspect-ratio: 1;
            background: #1b1228;
            border: 1px solid #3a2a48;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(0.65rem, 1.5vw, 1rem);
            color: #ccc;
            transition: all 0.2s;
            cursor: pointer;
            box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.5);
            text-shadow: 0 0 4px #fff5;
        }
        .map-cell:active {
            transform: scale(0.9);
            background: #3a2a55;
        }
        .player-cell {
            background: #6b5078;
            border-color: #f8d080;
            box-shadow: 0 0 20px #ffbb40, inset 0 0 10px #ffdd8080;
            animation: playerGlow 1.5s infinite alternate;
            font-size: 1.2rem;
            z-index: 2;
        }
        @keyframes playerGlow {
            0% {
                box-shadow: 0 0 10px #ffbb40;
            }
            100% {
                box-shadow: 0 0 30px #ffdd70, 0 0 60px #ffaa2060;
            }
        }
        .boss-cell {
            background: #4a1530;
            border-color: #ff6060;
            box-shadow: 0 0 25px #ff4040;
            animation: bossPulse 1.2s infinite;
        }
        @keyframes bossPulse {
            0% {
                box-shadow: 0 0 15px #ff4040;
            }
            50% {
                box-shadow: 0 0 35px #ff8080;
            }
            100% {
                box-shadow: 0 0 15px #ff4040;
            }
        }
        .boss-disabled {
            background: #2a1a28;
            border-color: #555;
        }
        .chest-cell {
            background: #3a3018;
            border-color: #ffd700;
        }
        .merchant-cell {
            background: #1e3a2a;
            border-color: #80e0a0;
        }
        .portal-cell {
            background: #1e1e3a;
            border-color: #8080ff;
        }
        #control-area {
            padding: 8px 10px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border-top: 1px solid #5a4070;
            flex-shrink: 0;
            display: flex;
            justify-content: center;
        }
        .direction-pad {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .dir-row {
            display: flex;
            gap: 30px;
        }
        .dir-btn {
            background: radial-gradient(circle at 30% 30%, #5a3e72, #2a1a3a);
            border: 2px solid #a080c0;
            color: #ffe0c0;
            font-size: clamp(1.5rem, 3.5vw, 2.2rem);
            width: clamp(48px, 12vw, 65px);
            height: clamp(48px, 12vw, 65px);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 5px 12px rgba(0, 0, 0, 0.6), inset 0 1px 3px rgba(255, 255, 255, 0.2);
            transition: all 0.1s;
            text-shadow: 0 0 8px #ffdd80;
        }
        .dir-btn:active {
            background: radial-gradient(circle at 40% 40%, #7a5ea0, #4a2e5a);
            transform: scale(0.9);
            border-color: #ffd080;
            box-shadow: 0 0 25px #c080ff;
        }
        .btn {
            background: linear-gradient(180deg, #3e2850 0%, #21152e 100%);
            border: 1px solid #8a6a9a;
            color: #f0e0ff;
            padding: 8px 18px;
            border-radius: 25px;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5), inset 0 1px 3px rgba(255, 255, 255, 0.1);
            transition: all 0.2s;
            letter-spacing: 0.5px;
        }
        .btn:hover {
            background: #553b6a;
            border-color: #d0b0e0;
            color: #fff;
            box-shadow: 0 6px 15px rgba(150, 100, 200, 0.5);
        }
        .btn:active {
            transform: scale(0.95);
            background: #6a4e80;
        }
        .btn.primary {
            background: linear-gradient(180deg, #6e406e, #3a1e3a);
            border-color: #e0b0d0;
        }
        .btn.small {
            padding: 5px 12px;
            font-size: 0.7rem;
        }
        .btn:disabled {
            opacity: 0.35;
            pointer-events: none;
            filter: grayscale(0.6);
        }
        .god-voice {
            background: #1e1028;
            border-left: 5px solid #e6b422;
            padding: 8px 12px;
            border-radius: 12px;
            color: #ffe8a0;
            font-style: italic;
            margin: 8px 0;
            font-size: 0.85rem;
            box-shadow: 0 0 15px rgba(230, 180, 34, 0.3);
        }
        .race-card,
        .evolution-card {
            background: rgba(30, 18, 48, 0.9);
            backdrop-filter: blur(5px);
            border: 2px solid #553b60;
            border-radius: 20px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            width: 140px;
            transition: all 0.25s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
        }
        .race-card:hover,
        .evolution-card:hover {
            border-color: #e0b0f0;
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 12px 25px rgba(150, 80, 200, 0.4);
        }
        .flex-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
            margin: 10px 0;
        }
        .shop-card {
            background: #1e1230;
            border: 1px solid #4a3a60;
            border-radius: 14px;
            padding: 12px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
        }
        .hp-bar {
            width: 100%;
            height: 18px;
            background: #2a1028;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #aa5588;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.6);
        }
        .hp-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff4466, #ff8866);
            border-radius: 10px;
            transition: width 0.4s;
            box-shadow: 0 0 12px #ff4466aa;
        }
        .shake {
            animation: shake 0.4s ease;
        }
        @keyframes shake {
            0%,
            100% {
                transform: translateX(0);
            }
            20% {
                transform: translateX(-10px);
            }
            40% {
                transform: translateX(10px);
            }
            60% {
                transform: translateX(-6px);
            }
            80% {
                transform: translateX(6px);
            }
        }
        .pop-damage {
            animation: pop 0.7s ease-out;
            position: absolute;
            color: var(--danger);
            font-weight: bold;
            font-size: 1.4rem;
            pointer-events: none;
            z-index: 10;
            top: 5px;
            right: 10px;
            text-shadow: 0 0 8px black;
        }
        @keyframes pop {
            0% {
                opacity: 1;
                transform: translateY(0);
            }
            100% {
                opacity: 0;
                transform: translateY(-35px);
            }
        }
        .death-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(200, 0, 0, 0.5);
            z-index: 99;
            animation: deathFlash 1.2s ease-out forwards;
            pointer-events: none;
        }
        @keyframes deathFlash {
            0% {
                opacity: 0.9;
            }
            50% {
                opacity: 0.4;
            }
            100% {
                opacity: 0;
            }
        }
        /* 適應手機 */
        @media (max-width: 600px) {
            #game-container {
                height: 98vh;
                max-height: none;
                border-radius: 20px;
            }
            .race-card {
                width: 110px;
                padding: 12px;
            }
            .dir-btn {
                width: 48px;
                height: 48px;
                font-size: 1.4rem;
            }
        }
    </style>
</head>

                dragon_lair: { name: '遠古巨龍', icon: '🐲', el: 'fire', hp: 850, atk: 68, def: 56, exp: 520, goldMin: 300,
                    goldMax: 400, loot: [{ id: 'phoenix_feather', chance: 0.5 }, { id: 'world_core', chance: 0.2 }] },
                sea: { name: '海妖', icon: '🧜‍♀️', el: 'water', hp: 1000, atk: 78, def: 62, exp: 650, goldMin: 300,
                    goldMax: 400, loot: [{ id: 'divine_essence', chance: 0.5 }, { id: 'phoenix_feather',
                    chance: 0.3 }] },
                heaven: { name: '宙斯', icon: '⚡', el: 'light', hp: 1200, atk: 88, def: 70, exp: 800, goldMin: 300,
                    goldMax: 400, loot: [{ id: 'world_core', chance: 0.4 }, { id: 'divine_essence', chance: 0.4 }] }
            };

            const EQUIPMENT_POOL = {
                weapon: [
                    { id: 'w_d', name: '木劍', grade: 'D', atk: 6 }, { id: 'w_c', name: '鐵劍', grade: 'C', atk: 14 },
                    { id: 'w_b', name: '鋼刃', grade: 'B', atk: 24 }, { id: 'w_a', name: '龍牙', grade: 'A', atk: 36 },
                    { id: 'w_s', name: '惡魔之牙', grade: 'S', atk: 50, element: 'dark' }, { id: 'w_ss', name: '聖光槍',
                        grade: 'SS', atk: 68, element: 'light' }
                ],
                armor: [
                    { id: 'a_d', name: '皮甲', grade: 'D', def: 5 }, { id: 'a_c', name: '鎖子甲', grade: 'C', def: 11 },
                    { id: 'a_b', name: '板甲', grade: 'B', def: 18 }, { id: 'a_a', name: '龍鱗甲', grade: 'A', def: 27 },
                    { id: 'a_s', name: '暗影斗篷', grade: 'S', def: 22, spd: 15 }, { id: 'a_ss', name: '神聖長袍',
                        grade: 'SS', def: 32, mdef: 15 }
                ],
                accessory: [
                    { id: 'ac_d', name: '力量戒指', grade: 'D', atk: 4 }, { id: 'ac_d2', name: '敏捷戒指', grade: 'D',
                    spd: 4 },
                    { id: 'ac_c', name: '疾風護符', grade: 'C', spd: 14 }, { id: 'ac_c2', name: '智力護符', grade: 'C',
                    matk: 8 },
                    { id: 'ac_b', name: '賢者之石', grade: 'B', matk: 12 }, { id: 'ac_b2', name: '生命寶珠', grade: 'B',
                    hp: 35 },
                    { id: 'ac_a', name: '龍心', grade: 'A', hp: 65 }, { id: 'ac_a2', name: '魔法水晶', grade: 'A',
                    matk: 14 },
                    { id: 'ac_s', name: '暗夜之星', grade: 'S', atk: 14, matk: 14 }, { id: 'ac_s2', name: '疾風之羽',
                        grade: 'S', spd: 20 },
                    { id: 'ac_ss', name: '神之淚', grade: 'SS', all: 10 }, { id: 'ac_ss2', name: '永恆之戒', grade: 'SS',
                        hp: 80, mp: 40 }
                ]
            };

            const ZONE_MERCHANT_GRADES = {
                forest: ['D', 'C'],
                cave: ['D', 'C', 'B'],
                castle: ['C', 'B', 'A'],
                dragon_lair: ['B', 'A', 'S'],
                sea: ['A', 'S'],
                heaven: ['S', 'SS']
            };

            const CRAFT_RECIPES = {
                D: { needs: { common: 3 }, cost: 50 },
                C: { needs: { common: 5, uncommon: 2 }, cost: 120 },
                B: { needs: { uncommon: 4, rare: 2 }, cost: 250 },
                A: { needs: { rare: 5, epic: 1 }, cost: 400 },
                S: { needs: { epic: 3, legendary: 1 }, cost: 600 },
                SS: { needs: { legendary: 3 }, cost: 1000 }
            };

            const LEVEL_CONDITIONS = [
                { type: 'kill', target: 5, desc: '擊敗5隻怪物' },
                { type: 'collect', target: 3, desc: '收集3個任意掉落物' },
                { type: 'boss', target: 1, desc: '擊敗任意Boss' },
                { type: 'explore', target: 2, desc: '探索2個不同區域' }
            ];

            const START_ZONE = 'forest',
                START_POS = { x: 0, y: 0 },
                BOSS_POS = { x: 5, y: 5 };

            // ==================== 遊戲狀態 ====================
            const state = {
                race: null,
                player: null,
                enemy: null,
                voice: "",
                battle: false,
                dead: false,
                scene: 'tutorial',
                zone: START_ZONE,
                pos: { ...START_POS },
                maps: {},
                inv: [],
                buffs: { atk: 0, spd: 0, def: 0, shield: 0, weakDebuff: false },
                bossDefeated: new Set(),
                levelCondition: null,
                conditionProgress: 0,
                bossCooldown: 0,
                equipment: { weapon: null, armor: null, accessory: null },
                equipInv: [],
                escapeCounter: 0,
                altarReturn: null,
                merchantBuyCount: 0,
            };

            // ==================== 核心邏輯 ====================
            function initPlayer(raceKey) {
                const race = RACES[raceKey];
                state.race = raceKey;
                const startForm = Object.keys(EVOLUTION_TREE[raceKey])[0];
                state.player = {
                    form: startForm,
                    lv: 1,
                    exp: 0,
                    gold: 150,
                    hp: race.baseHP,
                    maxHp: race.baseHP,
                    mp: race.baseMP,
                    maxMp: race.baseMP,
                    atk: race.atk,
                    def: race.def,
                    matk: race.matk,
                    mdef: race.mdef,
                    spd: race.spd,
                    potions: { hp: 3, mp: 2, speed: 1, atk: 1, weak: 1 }
                };
                if (raceKey === 'dragon') {
                    state.player.maxHp = Math.floor(state.player.maxHp * 1.35);
                    state.player.maxMp = Math.floor(state.player.maxMp * 1.35);
                }
                applyForm();
                state.player.hp = state.player.maxHp;
                state.player.mp = state.player.maxMp;
                generateLevelCondition();
            }

            function applyForm() {
                const f = EVOLUTION_TREE[state.race][state.player.form];
                if (!f) return;
                Object.assign(state.player, {
                    maxHp: f.hp,
                    maxMp: f.mp,
                    atk: f.atk,
                    def: f.def,
                    matk: f.matk,
                    mdef: f.mdef,
                    spd: f.spd
                });
            }

            function stats() {
                const p = state.player;
                const eq = { atk: 0, def: 0, spd: 0, matk: 0, mdef: 0, hp: 0, mp: 0 };
                Object.values(state.equipment).forEach(e => {
                    if (!e) return;
                    if (e.atk) eq.atk += e.atk;
                    if (e.def) eq.def += e.def;
                    if (e.spd) eq.spd += e.spd;
                    if (e.matk) eq.matk += e.matk;
                    if (e.mdef) eq.mdef += e.mdef;
                    if (e.hp) eq.hp += e.hp;
                    if (e.mp) eq.mp += e.mp;
                    if (e.all) {
                        eq.atk += e.all;
                        eq.def += e.all;
                        eq.spd += e.all;
                        eq.matk += e.all;
                        eq.mdef += e.all;
                    }
                });
                return {
                    atk: p.atk + state.buffs.atk + eq.atk,
                    def: p.def + state.buffs.def + eq.def,
                    spd: p.spd + state.buffs.spd + eq.spd,
                    matk: p.matk + eq.matk,
                    mdef: p.mdef + eq.mdef,
                    maxHp: p.maxHp + eq.hp,
                    maxMp: p.maxMp + eq.mp
                };
            }

            function generateLevelCondition() {
                state.levelCondition = { ...LEVEL_CONDITIONS[Math.floor(Math.random() * LEVEL_CONDITIONS.length)] };
                state.conditionProgress = 0;
                setVoice(`升級條件：${state.levelCondition.desc}`);
            }

            function genMaps() {
                for (let z of Object.keys(ZONES)) {
                    state.maps[z] = {
                        grid: Array(10).fill().map(() => Array(10).fill().map(() => ZONES[z].terrains[Math.floor(Math
                            .random() * 4)])),
                        special: {}
                    };
                    for (let i = 0; i < 3; i++) {
                        let sx, sy;
                        do {
                            sx = Math.floor(Math.random() * 10);
                            sy = Math.floor(Math.random() * 10);
                        } while ((sx === BOSS_POS.x && sy === BOSS_POS.y) || (sx === START_POS.x && sy === START_POS
                            .y));
                        state.maps[z].special[`${sx},${sy}`] = ['chest', 'merchant', 'portal'][Math.floor(Math.random() *
                            3)];
                    }
                }
            }

            function move(dx, dy) {
                if (state.battle || state.dead || state.scene !== 'map') return;
                let nx = state.pos.x + dx,
                    ny = state.pos.y + dy;
                if (nx < 0 || nx >= 10 || ny < 0 || ny >= 10) {
                    const adj = { forest: { south: 'cave' }, cave: { north: 'forest', south: 'castle' }, castle: { north: 'cave',
                            south: 'dragon_lair' }, dragon_lair: { north: 'castle', south: 'sea' }, sea: { north: 'dragon_lair',
                            south: 'heaven' }, heaven: { north: 'sea' } };
                    const next = adj[state.zone]?.[dx < 0 ? 'west' : dx > 0 ? 'east' : dy < 0 ? 'north' : dy > 0 ?
                    'south' : null];
                    if (next) {
                        state.zone = next;
                        state.pos = { x: dx < 0 ? 9 : dx > 0 ? 0 : nx, y: dy < 0 ? 9 : dy > 0 ? 0 : ny };
                    } else return;
                } else { state.pos.x = nx;
                    state.pos.y = ny; }
                if (state.bossCooldown > 0) state.bossCooldown--;
                const key = `${state.pos.x},${state.pos.y}`;
                if (state.pos.x === BOSS_POS.x && state.pos.y === BOSS_POS.y) {
                    if (!state.bossDefeated.has(state.zone) || state.bossCooldown <= 0) startBoss();
                    else renderMap();
                } else if (state.maps[state.zone].special[key]) handleSpecial(state.maps[state.zone].special[key]);
                else if (Math.random() < 0.28) startBattle();
                else if (Math.random() < 0.18) triggerEvent();
                else renderMap();
            }

            function handleSpecial(type) {
                if (type === 'chest') {
                    state.player.gold += Math.floor(Math.random() * 60) + 40;
                    addEquip('weapon', 'D');
                    setVoice('📦 打開寶箱！獲得金幣與裝備');
                    delete state.maps[state.zone].special[`${state.pos.x},${state.pos.y}`];
                } else if (type === 'merchant') {
                    state.merchantBuyCount = 0;
                    setVoice('遇到流浪商人(85折)');
                    state.scene = 'merchantShop';
                    renderMerchantShop();
                    return;
                } else if (type === 'portal') {
                    state.altarReturn = { zone: state.zone, x: state.pos.x, y: state.pos.y };
                    state.scene = 'altar';
                    renderAltar();
                    return;
                }
                renderMap();
            }

            function startBattle() {
                const pool = MONSTERS[state.zone] || MONSTERS.forest;
                const m = pool[Math.floor(Math.random() * pool.length)];
                state.enemy = { ...m, maxHp: m.hp };
                state.battle = true;
                state.dead = false;
                state.scene = 'battle';
                state.buffs = { atk: 0, spd: 0, def: 0, shield: 0, weakDebuff: false };
                state.escapeCounter = 0;
                setVoice(`⚔️ ${m.name} 出現了！`);
                renderBattle();
            }

            function startBoss() {
                const boss = BOSSES[state.zone];
                state.enemy = { ...boss, maxHp: boss.hp, isBoss: true };
                state.battle = true;
                state.dead = false;
                state.scene = 'battle';
                state.buffs = { atk: 0, spd: 0, def: 0, shield: 0, weakDebuff: false };
                state.escapeCounter = 0;
                setVoice(`👑 Boss ${boss.name}！`);
                renderBattle();
            }

            function dmgCalc(atk, def, power = 1, atkEl, defEl, isPlayer = false) {
                let base = Math.max(1, Math.floor(atk * power) - def);
                if (atkEl && defEl && atkEl !== 'none' && defEl !== 'none') {
                    if (ELEMENT_WEAKNESS[atkEl] === defEl) base = Math.floor(base * 1.3);
                    else if (ELEMENT_WEAKNESS[defEl] === atkEl) base = Math.floor(base * 0.7);
                }
                let result = Math.max(1, base + Math.floor(Math.random() * 8));
                if (isPlayer && state.race === 'demon') result = Math.floor(result * 1.20);
                if (!isPlayer && state.buffs.weakDebuff) result = Math.floor(result * 1.2);
                return result;
            }

            function showDamage(el, dmg, col = '#ff4d4d') {
                if (!el) return;
                const d = document.createElement('div');
                d.className = 'pop-damage';
                d.textContent = dmg;
                d.style.color = col;
                el.style.position = 'relative';
                el.appendChild(d);
                setTimeout(() => d.remove(), 700);
            }

            function shakeEl(id) {
                const el = document.getElementById(id);
                if (el) { el.classList.add('shake');
                    setTimeout(() => el.classList.remove('shake'), 400); }
            }

            function playerAtk() {
                if (state.dead || !state.battle) return;
                const f = EVOLUTION_TREE[state.race][state.player.form];
                const dmg = dmgCalc(stats().atk, state.enemy.def, 1, f.element, state.enemy.el, true);
                state.enemy.hp -= dmg;
                setVoice(`造成 ${dmg} 傷害`);
                shakeEl('enemy-card');
                showDamage(document.getElementById('enemy-card'), dmg);
                checkEnd();
            }

            function playerSkill(id) {
                if (state.dead || !state.battle) return;
                const sk = SKILLS[id];
                if (!sk || state.player.mp < sk.mp) return;
                if ((sk.attr === 'heal' || sk.heal) && state.race !== 'god') { setVoice('只有神族可使用治癒！'); return; }
                state.player.mp -= sk.mp;
                if (sk.attr === 'heal' || sk.heal) {
                    const heal = sk.heal || 18;
                    state.player.hp = Math.min(state.player.maxHp, state.player.hp + heal);
                    setVoice(`❤️ 回復${heal}HP`);
                    showDamage(document.getElementById('player-card'), heal, '#4dff4d');
                } else if (sk.attr === 'buff') setVoice('🛡️ 增益');
                else {
                    const f = EVOLUTION_TREE[state.race][state.player.form];
                    const dmg = dmgCalc(stats().atk, state.enemy.def, sk.power || 1, sk.element || f.element, state.enemy
                        .el, true);
                    state.enemy.hp -= dmg;
                    setVoice(`✨ ${sk.name}！ ${dmg} 傷害`);
                    shakeEl('enemy-card');
                    showDamage(document.getElementById('enemy-card'), dmg);
                }
                checkEnd();
            }

            function playerDodge() {
                if (state.dead || !state.battle || state.player.mp < 3) return;
                state.player.mp -= 3;
                if (Math.random() < 0.8) {
                    setVoice('💨 閃避成功！');
                    state.escapeCounter++;
                    if (state.escapeCounter >= 3) setVoice('已可逃跑');
                } else setVoice('閃避失敗…');
                checkEnd();
            }

            function tryRun() {
                if (state.dead || !state.battle) return;
                if (state.escapeCounter < 3) { setVoice(`需累積閃避3次 (${state.escapeCounter}/3)`); return; }
                setVoice('🏃 逃跑成功！');
                state.battle = false;
                state.enemy = null;
                state.scene = 'map';
                renderMap();
            }

            function usePotion(type) {
                const p = state.player,
                    bonus = state.race === 'god' ? 1.5 : 1;
                if (type === 'hp') { p.hp = Math.min(p.maxHp, p.hp + Math.floor(30 * bonus));
                    p.potions.hp--; } else if (type === 'mp') { p.mp = Math.min(p.maxMp, p.mp + Math.floor(18 * bonus));
                    p.potions.mp--; } else if (type === 'speed') { state.buffs.spd += Math.floor(14 * bonus);
                    p.potions.speed--; } else if (type === 'atk') { state.buffs.atk += Math.floor(14 * bonus);
                    p.potions.atk--; } else if (type === 'weak' && state.enemy) { state.buffs.weakDebuff = true;
                    p.potions.weak--;
                    setVoice('敵人虛弱，受傷+20%'); } else if (type === 'weak') setVoice('無敵方');
                setVoice('藥水生效');
                renderBattle();
            }

            function enemyTurn() {
                if (!state.enemy || state.enemy.hp <= 0 || state.dead) return;
                const dmg = dmgCalc(state.enemy.atk, stats().def, 1, state.enemy.el, EVOLUTION_TREE[state.race][state
                    .player.form].element);
                state.player.hp -= dmg;
                setVoice(`${state.enemy.name} 造成 ${dmg} 傷害`);
                shakeEl('player-card');
                showDamage(document.getElementById('player-card'), dmg);
                if (state.player.hp <= 0) { playerDeath(); return; }
                renderBattle();
            }

            function playerDeath() {
                state.player.hp = 0;
                state.dead = true;
                state.battle = false;
                setVoice('被擊倒…返回起點');
                const overlay = document.createElement('div');
                overlay.className = 'death-overlay';
                document.body.appendChild(overlay);
                setTimeout(() => overlay.remove(), 1200);
                setTimeout(() => {
                    if (state.race !== 'human') {
                        state.player.potions = { hp: 3, mp: 2, speed: 1, atk: 1, weak: 1 };
                        state.equipment = { weapon: null, armor: null, accessory: null };
                        state.equipInv = [];
                    }
                    state.player.hp = state.player.maxHp;
                    state.player.mp = state.player.maxMp;
                    state.dead = false;
                    state.zone = START_ZONE;
                    state.pos = { ...START_POS };
                    state.scene = 'map';
                    renderMap();
                }, 1500);
                renderBattle();
            }

            function addEquip(type, grade) {
                const pool = EQUIPMENT_POOL[type].filter(e => e.grade === grade);
                if (pool.length) {
                    const eq = { ...pool[Math.floor(Math.random() * pool.length)], type };
                    state.equipInv.push(eq);
                    setVoice(`獲得${eq.name}`);
                }
            }

            function addToInv(id) {
                const existing = state.inv.find(i => i.id === id);
                if (existing) existing.qty++;
                else state.inv.push({ id, name: LOOT_ITEMS[id].name, qty: 1 });
            }

            function dropLootFromPool(pool) {
                if (!pool || !pool.length) return;
                for (let entry of pool) {
                    if (Math.random() < entry.chance) {
                        addToInv(entry.id);
                        setVoice(`獲得 ${LOOT_ITEMS[entry.id].name} [${LOOT_RARITY[LOOT_ITEMS[entry.id].rarity]}]`);
                        break;
                    }
                }
            }

            function checkEnd() {
                if (state.enemy.hp <= 0) {
                    state.enemy.hp = 0;
                    let gold = Math.floor(Math.random() * (state.enemy.goldMax - state.enemy.goldMin + 1)) + state.enemy
                        .goldMin;
                    if (state.race === 'human') gold = Math.floor(gold * 1.30);
                    state.player.gold += gold;
                    if (state.enemy.isBoss) {
                        dropLootFromPool(state.enemy.loot);
                        if (Math.random() < 0.5) {
                            const grades = [
                                ['C', 'B'],
                                ['B', 'A'],
                                ['A', 'S'],
                                ['S', 'SS'],
                                ['S', 'SS'],
                                ['SS']
                            ][['forest', 'cave', 'castle', 'dragon_lair', 'sea', 'heaven'].indexOf(state.zone)];
                            addEquip(['weapon', 'armor', 'accessory'][Math.floor(Math.random() * 3)], grades[Math.floor(
                                Math.random() * grades.length)]);
                        }
                        state.bossDefeated.add(state.zone);
                        state.bossCooldown = 12;
                    } else {
                        dropLootFromPool(state.enemy.loot);
                        if (Math.random() < 0.2) addEquip(['weapon', 'armor', 'accessory'][Math.floor(Math.random() * 3)],
                            'D');
                    }
                    updateConditionProgress();
                    levelUp();
                    state.battle = false;
                    state.dead = false;
                    state.scene = 'map';
                    setTimeout(() => renderMap(), 500);
                } else enemyTurn();
            }

            function updateConditionProgress() {
                if (!state.levelCondition) return;
                const c = state.levelCondition;
                if (c.type === 'kill') state.conditionProgress++;
                else if (c.type === 'boss' && state.enemy?.isBoss) state.conditionProgress++;
                else if (c.type === 'collect') state.conditionProgress = state.inv.length;
                else if (c.type === 'explore') state.conditionProgress = new Set([...state.bossDefeated, state.zone])
                    .size;
            }

            function levelUp() {
                if (!state.levelCondition) return;
                const c = state.levelCondition;
                let ok = false;
                if (c.type === 'kill' && state.conditionProgress >= c.target) ok = true;
                else if (c.type === 'boss' && state.conditionProgress >= c.target) ok = true;
                else if (c.type === 'collect' && state.conditionProgress >= c.target) ok = true;
                else if (c.type === 'explore' && state.conditionProgress >= c.target) ok = true;
                if (ok) {
                    state.player.lv++;
                    state.player.maxHp += 16;
                    state.player.maxMp += 8;
                    state.player.atk += 4;
                    state.player.def += 3;
                    state.player.hp = state.player.maxHp;
                    state.player.mp = state.player.maxMp;
                    setVoice(`🎉 升級！ Lv.${state.player.lv}`);
                    generateLevelCondition();
                    if (state.player.lv % 5 === 0 && EVOLUTION_TREE[state.race][state.player.form].evolutions?.length)
                        setVoice('可進化！');
                }
            }

            function forceLevelUp(t) {
                for (let i = 0; i < t; i++) {
                    state.player.lv++;
                    state.player.maxHp += 16;
                    state.player.maxMp += 8;
                    state.player.atk += 4;
                    state.player.def += 3;
                }
                state.player.hp = state.player.maxHp;
                state.player.mp = state.player.maxMp;
                setVoice(`升級藥水：+${t}級`);
            }

            function evolve(id) {
                state.player.form = id;
                state.player.lv = 1;
                applyForm();
                state.player.hp = state.player.maxHp;
                state.player.mp = state.player.maxMp;
                setVoice(`進化！${EVOLUTION_TREE[state.race][id].name}`);
                state.scene = 'map';
                renderMap();
            }

            function setVoice(m) { state.voice = `神之聲：${m}`; }

            function updateStatusBar() {
                const p = state.player,
                    f = EVOLUTION_TREE[state.race][p.form];
                document.getElementById('status-bar').innerHTML =
                    `<span>${RACES[state.race].icon} ${f.name} Lv.${p.lv}</span><span>❤️${p.hp}/${p.maxHp}</span><span>💧${p.mp}/${p.maxMp}</span><span>💰${p.gold}</span>`;
            }

            // ==================== 畫面渲染 ====================
            function renderMap() {
                updateStatusBar();
                const f = EVOLUTION_TREE[state.race][state.player.form];
                const canEvo = state.player.lv % 5 === 0 && f.evolutions?.length;
                const map = state.maps[state.zone];
                let grid = '';
                for (let y = 0; y < 10; y++)
                    for (let x = 0; x < 10; x++) {
                        const isP = x === state.pos.x && y === state.pos.y;
                        const isBoss = x === BOSS_POS.x && y === BOSS_POS.y;
                        const ba = !state.bossDefeated.has(state.zone) || state.bossCooldown <= 0;

                            icon = map.grid[y][x];

                            icon = ba ? '👑' : '💤'; } else if (sp) {
                            if (sp === 'chest') { cls = 'chest-cell';
                                icon = '📦'; } else if (sp === 'merchant') { cls = 'merchant-cell';
                                icon = '🏪'; } else if (sp === 'portal') { cls = 'portal-cell';
                                icon = '🌀'; }
                        }
                        grid +=
                        `<div class="map-cell ${cls}" data-x="${x}" data-y="${y}">${icon}</div>`;
                    }
                const cond = state.levelCondition;
                const prog = cond ? `${state.conditionProgress}/${cond.target}` : '0/0';
                document.getElementById('game-view').innerHTML = `
            <div class="panel">
            <h3>${ZONES[state.zone].icon} ${ZONES[state.zone].name}</h3>
            <div class="map-grid" id="mapGrid">${grid}</div>
            <div style="display:flex;justify-content:space-between;flex-wrap:wrap;">
            <span>📊 Lv.${state.player.lv} | 進化需${Math.ceil(state.player.lv/5)*5}級</span>
            <span>🎯 ${cond?cond.desc:''}: ${prog}</span>
            </div>
            <div class="god-voice">${state.voice}</div>
            <div class="flex-row">
            <button class="btn small" id="statusBtn">📋狀態</button>

            <button class="btn small" id="shopBtn">🛒商店</button>
            <button class="btn small" id="craftBtn">🔨打造</button>
            ${canEvo?`<button class="btn small primary" id="evoBtn">✨進化</button>`:''}
            </div></div>`;
                bindMapEvents();
                document.getElementById('statusBtn').onclick = () => { state.scene = 'status';
                    renderStatus(); };

                    renderEquip(); };
                document.getElementById('shopBtn').onclick = () => { state.scene = 'shop';
                renderShop(); };
                document.getElementById('craftBtn').onclick = () => { state.scene = 'craft';
                renderCraft(); };

                    renderEvo(); };

            function bindMapEvents() {
                document.querySelectorAll('.map-cell').forEach(cell => {
                    cell.onclick = (e) => {
                        if (state.battle || state.dead || state.scene !== 'map') return;
                        const tx = parseInt(e.currentTarget.dataset.x);
                        const ty = parseInt(e.currentTarget.dataset.y);
                        const dx = tx - state.pos.x;
                        const dy = ty - state.pos.y;
                        if (Math.abs(dx) + Math.abs(dy) === 1) move(dx, dy);
                    };
                });
                const mapGrid = document.getElementById('mapGrid');
                if (!mapGrid) return;
                let startX, startY;
                mapGrid.ontouchstart = e => {
                    startX = e.touches[0].clientX;
                    startY = e.touches[0].clientY;
                };
                mapGrid.ontouchend = e => {
                    if (state.battle || state.dead || state.scene !== 'map') return;
                    const dx = e.changedTouches[0].clientX - startX;
                    const dy = e.changedTouches[0].clientY - startY;
                    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 25) move(dx > 0 ? 1 : -1, 0);
                    else if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 25) move(0, dy > 0 ? 1 : -1);
                };
            }

            function renderBattle() {
                updateStatusBar();
                const e = state.enemy,
                    p = state.player,
                    f = EVOLUTION_TREE[state.race][p.form];
                const skills = f.skills || [];
                let skillBtns = skills.map(sid => {
                    const sk = SKILLS[sid];
                    if (!sk || ((sk.attr === 'heal' || sk.heal) && state.race !== 'god')) return '';
                    return `<button class="btn small" ${p.mp<sk.mp||state.dead?'disabled':''} id="sk_${sid}">${sk.name}(${sk.mp}MP)</button>`;

                const potDisabled = Object.values(p.potions).every(v => v === 0) || state.dead;
                const hpP = Math.max(0, e.hp / e.maxHp * 100);
                document.getElementById('game-view').innerHTML = `
            <div class="panel ${e.isBoss?'boss-bg':''}">
            <div id="enemy-card" style="position:relative;background:#2a1028;border-radius:12px;padding:10px;">
            <span style="font-size:2rem;">${e.icon}</span><b>${e.name}</b>

            <div class="flex-row">

            <button class="btn" id="runBtn" ${state.dead?'disabled':''}>🏃逃跑(${state.escapeCounter}/3)</button>
            <button class="btn" id="potBtn" ${potDisabled?'disabled':''}>🧪藥水</button></div>
            <div class="god-voice">${state.voice}</div>${state.dead?'<p style="color:#ff8080;">倒下中…</p>':''}</div>`;
                document.getElementById('atkBtn').onclick = playerAtk;
                skills.forEach(sid => { const btn = document.getElementById(`sk_${sid}`); if (btn) btn.onclick = () =>
                        playerSkill(sid); });

                document.getElementById('runBtn').onclick = tryRun;
                document.getElementById('potBtn').onclick = showPotions;
            }

            function showPotions() {
                const p = state.player;
                let html = '<div class="panel"><h3>🧪 藥水</h3>';
                const add = (l, k, q) => { if (q > 0) html +=
                        `<button class="btn small" id="use_${k}">${l} (${q})</button>`; };
                add('❤️生命', 'hp', p.potions.hp);
                add('💧魔力', 'mp', p.potions.mp);

                document.getElementById('game-view').innerHTML = html;
                ['hp', 'mp', 'speed', 'atk', 'weak'].forEach(k => { const btn = document.getElementById(`use_${k}`); if (

                document.querySelectorAll('.sellEquip').forEach(b => b.onclick = e => {

                    const eq = state.equipment[s];

                        state.equipment[s] = null;
                        renderEquip(); }
                });
                document.querySelectorAll('.equipIt').forEach(b => b.onclick = e => {
                    const i = parseInt(e.target.dataset.idx);
                    const eq = state.equipInv.splice(i, 1)[0];
                    if (state.equipment[eq.type]) state.equipInv.push(state.equipment[eq.type]);
                    state.equipment[eq.type] = eq;
                    renderEquip();
                });
                document.querySelectorAll('.sellInv').forEach(b => b.onclick = e => {
                    const i = parseInt(e.target.dataset.idx);

            function renderShop() {
                const p = state.player;
                let invHtml = state.inv.map((it, i) =>
                    `<div class="item-row"><span>${it.name} x${it.qty}</span><button class="btn small" id="sell_${i}">賣25G</button></div>`
                ).join('');
                document.getElementById('game-view').innerHTML = `
            <div class="panel"><h3>🛒 商店</h3><p>💰 ${p.gold}G</p>
            <div class="shop-grid">
            <div class="shop-card">❤️生命藥水 (30HP) 100G <button class="btn small" id="buyHp">買</button></div>
            <div class="shop-card">💧魔力藥水 (18MP) 80G <button class="btn small" id="buyMp">買</button></div>
            <div class="shop-card">💨速度藥水 +14 130G <button class="btn small" id="buySpd">買</button></div>
            <div class="shop-card">⚔️攻擊藥水 +14 140G <button class="btn small" id="buyAtk">買</button></div>
            <div class="shop-card">☠️虛弱藥水 110G <button class="btn small" id="buyWeak">買</button></div>
            <div class="shop-card">⭐升級藥水 +3級 500G <button class="btn small" id="buyLevel">買</button></div></div>
            <h4>掉落物</h4>${invHtml||'無'}<button class="btn" id="closeShop">關閉</button></div>`;
                document.getElementById('buyHp').onclick = () => { if (p.gold >= 100) { p.gold -= 100;
                        p.potions.hp++;
                        renderShop(); } };
                document.getElementById('buyMp').onclick = () => { if (p.gold >= 80) { p.gold -= 80;
                        p.potions.mp++;
                        renderShop(); } };
                document.getElementById('buySpd').onclick = () => { if (p.gold >= 130) { p.gold -= 130;
                        p.potions.speed++;
                        renderShop(); } };
                document.getElementById('buyAtk').onclick = () => { if (p.gold >= 140) { p.gold -= 140;
                        p.potions.atk++;
                        renderShop(); } };
                document.getElementById('buyWeak').onclick = () => { if (p.gold >= 110) { p.gold -= 110;
                        p.potions.weak++;
                        renderShop(); } };
                document.getElementById('buyLevel').onclick = () => { if (p.gold >= 500) { p.gold -= 500;
                        forceLevelUp(3);
                        renderShop(); } };
                state.inv.forEach((_, i) => { const btn = document.getElementById(`sell_${i}`); if (btn) btn.onclick =
                        () => { const it = state.inv[i];
                        p.gold += 25;
                        it.qty--; if (it.qty <= 0) state.inv.splice(i, 1);
                        renderShop(); }; });
                document.getElementById('closeShop').onclick = () => { state.scene = 'map';
                    renderMap(); };

            function renderMerchantShop() {
                const p = state.player;
                const gradePrice = { D: 35, C: 70, B: 140, A: 210, S: 350, SS: 550 };
                const allowedGrades = ZONE_MERCHANT_GRADES[state.zone] || ['D', 'C'];
                let items = '';
                for (let i = 0; i < 3; i++) {
                    const type = ['weapon', 'armor', 'accessory'][i];
                    const grade = allowedGrades[Math.floor(Math.random() * allowedGrades.length)];
                    const pool = EQUIPMENT_POOL[type].filter(e => e.grade === grade);
                    if (pool.length) {
                        const eq = pool[Math.floor(Math.random() * pool.length)];
                        const price = Math.floor(gradePrice[grade] * 0.85);
                        items +=
                            `<div class="shop-card"><span>${eq.name} (${grade})</span><p class="price">${price}G</p><button class="btn small buyMerch" data-type="${type}" data-grade="${grade}" data-price="${price}">購買</button></div>`;
                    }
                }
                document.getElementById('game-view').innerHTML = `
            <div class="panel"><h3>🏪 流浪商人 (85折) 已買${state.merchantBuyCount}/3</h3>
            <p style="font-size:0.7rem;color:#c0a0d0;">📍 ${ZONES[state.zone].name} - 最高${allowedGrades[allowedGrades.length-1]}級</p>
            <p>💰 ${p.gold}G</p><div class="shop-grid">${items}</div><button class="btn" id="closeMerchant">離開</button></div>`;
                document.querySelectorAll('.buyMerch').forEach(b => b.onclick = e => {
                    if (state.merchantBuyCount >= 3) return;
                    const price = parseInt(e.target.dataset.price);
                    if (p.gold < price) return;
                    p.gold -= price;
                    addEquip(e.target.dataset.type, e.target.dataset.grade);
                    state.merchantBuyCount++;
                    if (state.merchantBuyCount >= 3) {
                        delete state.maps[state.zone].special[`${state.pos.x},${state.pos.y}`];
                        state.scene = 'map';
                        renderMap();
                    } else renderMerchantShop();
                });
                document.getElementById('closeMerchant').onclick = () => { state.scene = 'map';
                    renderMap(); };
            }

            function renderCraft() {
                const invCounts = {};
                state.inv.forEach(i => { const r = LOOT_ITEMS[i.id].rarity;
                    invCounts[r] = (invCounts[r] || 0) + i.qty; });
                let html =
                    `<div class="panel"><h3>🔨 鍛造 (材料分級)</h3><p>材料: `;
                for (let r in LOOT_RARITY) html += `${LOOT_RARITY[r]}:${invCounts[r]||0} `;
                html += `| 💰${state.player.gold}</p><div class="flex-row">`;
                for (let grade in CRAFT_RECIPES) {
                    const rec = CRAFT_RECIPES[grade];
                    let can = true,
                        missing = [];
                    for (let r in rec.needs) if ((invCounts[r] || 0) < rec.needs[r]) { can = false;
                        missing.push(`${LOOT_RARITY[r]}缺${rec.needs[r]-(invCounts[r]||0)}`); }
                    if (state.player.gold < rec.cost) { can = false;
                        missing.push('金幣不足'); }
                    html +=
                        `<button class="btn small craftGrade" data-grade="${grade}" ${!can?'disabled':''}>${grade}級 ${rec.cost}G ${missing.length?'('+missing.join(',')+')':''}</button>`;
                }
                html += '</div><button class="btn" id="closeCraft">返回</button></div>';
                document.getElementById('game-view').innerHTML = html;
                document.querySelectorAll('.craftGrade').forEach(b => b.onclick = e => {
                    const grade = e.target.dataset.grade;
                    const rec = CRAFT_RECIPES[grade];
                    if (state.player.gold < rec.cost) return;
                    for (let r in rec.needs) {
                        let need = rec.needs[r];
                        for (let i = state.inv.length - 1; i >= 0 && need > 0; i--) {
                            if (LOOT_ITEMS[state.inv[i].id].rarity === r) {
                                const take = Math.min(state.inv[i].qty, need);
                                state.inv[i].qty -= take;
                                need -= take;
                                if (state.inv[i].qty <= 0) state.inv.splice(i, 1);
                            }
                        }
                        if (need > 0) return;
                    }
                    state.player.gold -= rec.cost;
                    addEquip(['weapon', 'armor', 'accessory'][Math.floor(Math.random() * 3)], grade);
                    renderCraft();
                });
                document.getElementById('closeCraft').onclick = () => { state.scene = 'map';
                    renderMap(); };
            }

                document.getElementById('game-view').innerHTML = `
            <div class="panel"><h3>選擇種族</h3><div class="flex-row">${Object.entries(RACES).map(([k,r])=>`<div class="race-card" data-race="${k}"><span style="font-size:2.5rem;">${r.icon}</span><h4>${r.name}</h4><p>${r.desc}</p></div>`).join('')}</div></div>`;
                document.querySelectorAll('.race-card').forEach(c => c.onclick = e => {
                    initPlayer(e.currentTarget.dataset.race);
                    genMaps();
                    state.bossDefeated.clear();
                    state.inv = [];
                    state.equipInv = [];
                    state.equipment = { weapon: null, armor: null, accessory: null };
                    state.scene = 'map';
                    state.zone = START_ZONE;
                    state.pos = { ...START_POS };
                    setupControls();
                    renderMap();
                });
            }
            showTutorial();
        })();
    </script>
</body>
</html>
